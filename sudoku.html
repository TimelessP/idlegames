<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<link rel="manifest" href="manifest.webmanifest">
<meta name="application-name" content="IdleGames">
<script src="assets/js/pwa.js" defer></script>
<meta name="theme-color" content="#141414">
<title>Neon Sudoku</title>
<meta name="description" content="A neon-lit Sudoku puzzle on a volcanic charcoal backdrop. Tap candidates, drag the popup, and solve at your own pace.">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background-color:#141414}
html,body{width:100%;height:100%;overflow:hidden;background:#141414;font-family:'Segoe UI',system-ui,sans-serif;color:#e0e0e0;touch-action:manipulation;user-select:none;-webkit-user-select:none}

:root{
  --bg:#141414;--cell:42px;--gap:1px;--box-gap:3px;
  --toolbar-h:48px;--pad:16px;
  --neon-cyan:#00f5ff;--neon-pink:#ff2dff;--neon-green:#39ff14;
  --neon-orange:#ff6b2b;--neon-yellow:#ffe74c;--neon-blue:#4d79ff;
  --lava-red:#ff3b1d;--lava-orange:#ff8c00;--lava-gold:#ffd700;
  --charcoal:#1e1e1e;--charcoal-light:#2a2a2a;--charcoal-dark:#111;
}

/* Layout */
#app{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;height:100%;width:100%;position:relative;overflow:hidden;padding:var(--pad) var(--pad) var(--pad);background:var(--bg)}

/* Background SVG canvas */
#bg-art{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;contain:strict;display:none}
.bg-layer{position:fixed;top:-1px;left:-1px;width:calc(100% + 2px);height:calc(100% + 2px);z-index:0;pointer-events:none;object-fit:cover;opacity:0;transition:opacity 3s ease-in}

/* Toolbar */
#toolbar{position:relative;z-index:10;display:flex;gap:12px;margin-bottom:12px;align-items:center}
.tool-btn{
  background:rgba(30,30,30,.85);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:8px 16px;color:#ccc;font-size:14px;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:all .2s;
}
.tool-btn:hover,.tool-btn:focus-visible{border-color:var(--neon-cyan);color:#fff;box-shadow:0 0 12px rgba(0,245,255,.25)}
.tool-btn svg{width:18px;height:18px;fill:currentColor}

/* Board container */
#board-wrap{position:relative;z-index:5;display:inline-block;flex-shrink:0}
#board{
  display:grid;
  grid-template-columns:repeat(9,var(--cell));
  grid-template-rows:repeat(9,var(--cell));
  gap:var(--gap);
  background:transparent;
  padding:4px;
  border-radius:6px;
  position:relative;
}

/* Cells */
.cell{
  width:var(--cell);height:var(--cell);
  display:flex;align-items:center;justify-content:center;
  font-size:var(--cell-font,22px);font-weight:700;
  background:rgba(22,22,22,.75);
  border:1px solid rgba(255,255,255,.06);
  cursor:pointer;position:relative;
  transition:background .15s,border-color .15s,box-shadow .15s;
  border-radius:2px;
}
.cell:hover{background:rgba(40,40,40,.85);border-color:rgba(255,255,255,.15)}
.cell:focus-visible{outline:2px solid var(--neon-cyan);outline-offset:-2px;z-index:2}
.cell.given{color:var(--neon-cyan);text-shadow:0 0 8px rgba(0,245,255,.5),0 0 20px rgba(0,245,255,.2)}
.cell.user{color:var(--neon-pink);text-shadow:0 0 8px rgba(255,45,255,.5),0 0 20px rgba(255,45,255,.2)}
.cell.error{color:var(--lava-red);text-shadow:0 0 10px rgba(255,59,29,.6);animation:pulse-error 1s ease-in-out infinite}
.cell.highlight{background:rgba(0,245,255,.06);border-color:rgba(0,245,255,.2)}
.cell.selected{background:rgba(0,245,255,.1);border-color:var(--neon-cyan);box-shadow:0 0 12px rgba(0,245,255,.2)}
.cell .candidates{
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  width:100%;height:100%;font-size:var(--cand-font,9px);font-weight:400;
  line-height:1;padding:0;gap:0;
}
.cell .candidates.cand-single{color:var(--neon-green);text-shadow:0 0 4px rgba(57,255,20,.4)}
.cell .candidates.cand-multi{color:#bf5fff;text-shadow:0 0 4px rgba(191,95,255,.3)}
.cell .candidates span{display:flex;align-items:center;justify-content:center}
.cell .candidates span.cand-conflict-given{color:var(--lava-red);text-shadow:0 0 4px rgba(255,59,29,.5)}
.cell .candidates span.cand-invalid{color:var(--neon-orange);text-shadow:0 0 4px rgba(255,107,43,.5)}

/* Box borders (3Г—3) */
.cell.box-right{border-right:2px solid rgba(0,245,255,.25)}
.cell.box-bottom{border-bottom:2px solid rgba(0,245,255,.25)}

/* Candidate popup */
#popup{
  position:absolute;z-index:100;
  width:140px;height:140px;
  background:rgba(20,20,20,.92);
  border:2px solid rgba(0,245,255,.35);
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,245,255,.15),0 8px 32px rgba(0,0,0,.6);
  backdrop-filter:blur(12px);
  display:none;
  flex-direction:column;
  padding:6px;
  cursor:grab;
  touch-action:none;
}
#popup.open{display:flex}
#popup.dragging{cursor:grabbing;backdrop-filter:none;box-shadow:none;will-change:transform}
#popup.dragging .popup-num{transition:none}
#popup-grid{
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:3px;flex:1;
}
.popup-num{
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;
  border-radius:6px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  transition:all .15s;
  color:rgba(255,255,255,.25);
}
.popup-num:hover{background:rgba(0,245,255,.1);border-color:rgba(0,245,255,.3)}
.popup-num.on-single{
  color:var(--neon-green);
  text-shadow:0 0 8px rgba(57,255,20,.5);
  background:rgba(57,255,20,.08);
  border-color:rgba(57,255,20,.3);
}
.popup-num.on-multi{
  color:#bf5fff;
  text-shadow:0 0 8px rgba(191,95,255,.5);
  background:rgba(191,95,255,.08);
  border-color:rgba(191,95,255,.3);
}
.popup-num.locked{
  color:var(--neon-cyan);
  text-shadow:0 0 10px rgba(0,245,255,.6),0 0 20px rgba(0,245,255,.3);
  font-size:28px;
  background:rgba(0,245,255,.06);
  border-color:rgba(0,245,255,.4);
  cursor:default;
  grid-column:1/-1;grid-row:1/-1;
}

/* Win overlay */
#win-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
}
#win-overlay.show{display:flex}
#win-msg{
  text-align:center;padding:32px 36px;
  background:rgba(20,20,20,.9);border:2px solid var(--neon-green);
  border-radius:16px;box-shadow:0 0 40px rgba(57,255,20,.2);
  max-width:400px;width:90%;
}
#win-msg h2{font-size:28px;color:var(--neon-green);text-shadow:0 0 20px rgba(57,255,20,.5);margin-bottom:12px}
#win-msg p{color:#aaa;margin-bottom:20px}
#win-buttons{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
#win-buttons .tool-btn{padding:10px 18px;font-size:14px}
#win-buttons .tool-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#win-buttons #btn-win-new{border-color:var(--neon-green);color:var(--neon-green)}
#share-status{color:var(--neon-green);font-size:13px;min-height:1.2em;margin-top:12px}

/* Timer */
#timer{color:rgba(255,255,255,.4);font-size:13px;font-variant-numeric:tabular-nums;margin-left:4px}

@keyframes pulse-error{0%,100%{opacity:1}50%{opacity:.6}}

/* Responsive вЂ” cell size set dynamically by JS; keep popup/font tweaks */
@media(max-width:500px){
  #popup{width:120px;height:120px}
  .popup-num{font-size:16px}
  .popup-num.locked{font-size:24px}
  .tool-btn{padding:6px 10px;font-size:12px}
}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div id="app">
  <!-- Background art (SVG) -->
  <svg id="bg-art" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs>
      <!-- Lava glow radial gradients -->
      <radialGradient id="lava1" cx="30%" cy="60%" r="40%">
        <stop offset="0%" stop-color="#ff3b1d" stop-opacity=".18"/>
        <stop offset="100%" stop-color="#ff3b1d" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="lava2" cx="70%" cy="40%" r="35%">
        <stop offset="0%" stop-color="#ff8c00" stop-opacity=".14"/>
        <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="lava3" cx="50%" cy="80%" r="45%">
        <stop offset="0%" stop-color="#ffd700" stop-opacity=".1"/>
        <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
      </radialGradient>

      <!-- Neon bubble gradients -->
      <radialGradient id="bubble1"><stop offset="0%" stop-color="#00f5ff" stop-opacity=".35"/><stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/></radialGradient>
      <radialGradient id="bubble2"><stop offset="0%" stop-color="#ff2dff" stop-opacity=".3"/><stop offset="100%" stop-color="#ff2dff" stop-opacity="0"/></radialGradient>
      <radialGradient id="bubble3"><stop offset="0%" stop-color="#39ff14" stop-opacity=".25"/><stop offset="100%" stop-color="#39ff14" stop-opacity="0"/></radialGradient>
      <radialGradient id="bubble4"><stop offset="0%" stop-color="#ff6b2b" stop-opacity=".3"/><stop offset="100%" stop-color="#ff6b2b" stop-opacity="0"/></radialGradient>
      <radialGradient id="bubble5"><stop offset="0%" stop-color="#4d79ff" stop-opacity=".28"/><stop offset="100%" stop-color="#4d79ff" stop-opacity="0"/></radialGradient>
      <radialGradient id="bubble6"><stop offset="0%" stop-color="#ffe74c" stop-opacity=".22"/><stop offset="100%" stop-color="#ffe74c" stop-opacity="0"/></radialGradient>

      <!-- Turbulence filter for rock texture -->
      <filter id="rock-tex" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency=".035" numOctaves="6" seed="42" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
        <feComponentTransfer in="grey" result="contrast">
          <feFuncR type="discrete" tableValues="0 .08 .12 .16 .12 .08"/>
          <feFuncG type="discrete" tableValues="0 .07 .11 .14 .11 .07"/>
          <feFuncB type="discrete" tableValues="0 .06 .1 .13 .1 .06"/>
        </feComponentTransfer>
        <feBlend in="SourceGraphic" in2="contrast" mode="screen"/>
      </filter>

      <!-- Crack glow filter -->
      <filter id="crack-glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- Swirl filter -->
      <filter id="swirl-blur" x="-10%" y="-10%" width="120%" height="120%">
        <feGaussianBlur stdDeviation="18"/>
      </filter>
    </defs>

    <!-- Base charcoal rock field -->
    <rect width="100%" height="100%" fill="#141414"/>
    <rect width="100%" height="100%" filter="url(#rock-tex)" opacity=".8"/>

    <!-- Low-poly rock facets -->
    <g id="rock-facets" opacity=".6"></g>

    <!-- Lava crack network -->
    <g id="lava-cracks"></g>

    <!-- Lava glow underlays -->
    <rect width="100%" height="100%" fill="url(#lava1)"/>
    <rect width="100%" height="100%" fill="url(#lava2)"/>
    <rect width="100%" height="100%" fill="url(#lava3)"/>

    <!-- Neon swirl layer -->
    <g id="swirl-layer" filter="url(#swirl-blur)" opacity=".45"></g>

    <!-- Neon bubbles -->
    <g id="neon-bubbles"></g>
  </svg>

  <div id="toolbar">
    <button class="tool-btn" id="btn-new" aria-label="New Game">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4a8 8 0 108 8h-2a6 6 0 11-1.76-4.24l-2.12 2.12H20V4l-2.35 2.35z"/></svg>
      New Game
    </button>
    <button class="tool-btn" id="btn-fs" aria-label="Full Screen">
      <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
    <span id="timer">00:00</span>
  </div>

  <div id="board-wrap">
    <div id="board" role="grid" aria-label="Sudoku board"></div>
  </div>

  <div id="popup" role="dialog" aria-label="Candidate selector">
    <div id="popup-grid"></div>
  </div>

  <div id="win-overlay">
    <div id="win-msg">
      <h2>Solved!</h2>
      <p id="win-time"></p>
      <div id="win-buttons">
        <button class="tool-btn" id="btn-win-view" aria-label="View board" title="View">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          View
        </button>
        <button class="tool-btn" id="btn-win-share" aria-label="Share" title="Share">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share
        </button>
        <button class="tool-btn" id="btn-win-new" aria-label="New Game" title="New Game">
          <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9"/><polyline points="21 3 21 9 15 9"/><path d="M21 9l-3.5-3.5"/></svg>
          New Game
        </button>
      </div>
      <div id="share-status" aria-live="polite"></div>
    </div>
  </div>
</div>

<script>
(()=>{
'use strict';

/* ===== SUDOKU ENGINE ===== */
const S = {
  /* Create empty 81-element grid */
  empty(){ return new Uint8Array(81) },

  /* Row/Col/Box helpers */
  row(i){ return Math.floor(i/9) },
  col(i){ return i%9 },
  box(i){ return Math.floor(S.row(i)/3)*3+Math.floor(S.col(i)/3) },

  /* Get peers (indices sharing row/col/box) */
  peers: (()=>{
    const p = [];
    for(let i=0;i<81;i++){
      const s = new Set();
      const r=Math.floor(i/9), c=i%9, br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
      for(let j=0;j<9;j++){
        s.add(r*9+j);
        s.add(j*9+c);
      }
      for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++) s.add((br+dr)*9+(bc+dc));
      s.delete(i);
      p.push([...s]);
    }
    return p;
  })(),

  /* Get candidates at cell i in grid */
  candidates(grid, i){
    if(grid[i]) return [];
    const used = new Set();
    for(const p of S.peers[i]) if(grid[p]) used.add(grid[p]);
    const c=[];
    for(let n=1;n<=9;n++) if(!used.has(n)) c.push(n);
    return c;
  },

  /* Solve via backtracking, returns first solution or null */
  solve(grid){
    const g = Uint8Array.from(grid);
    return S._bt(g) ? g : null;
  },

  _bt(g){
    let best=-1, bestLen=10;
    for(let i=0;i<81;i++){
      if(g[i]) continue;
      const c = S.candidates(g,i);
      if(c.length===0) return false;
      if(c.length<bestLen){ best=i; bestLen=c.length; }
    }
    if(best===-1) return true; // solved
    const cands = S.candidates(g,best);
    for(const n of cands){
      g[best]=n;
      if(S._bt(g)) return true;
      g[best]=0;
    }
    return false;
  },

  /* Count solutions (up to limit) */
  countSolutions(grid, limit=2){
    const g = Uint8Array.from(grid);
    return S._countBT(g, {count:0}, limit);
  },
  _countBT(g, ref, limit){
    let best=-1, bestLen=10;
    for(let i=0;i<81;i++){
      if(g[i]) continue;
      const c = S.candidates(g,i);
      if(c.length===0) return ref.count;
      if(c.length<bestLen){ best=i; bestLen=c.length; }
    }
    if(best===-1){ ref.count++; return ref.count; }
    const cands = S.candidates(g,best);
    for(const n of cands){
      g[best]=n;
      S._countBT(g,ref,limit);
      g[best]=0;
      if(ref.count>=limit) return ref.count;
    }
    return ref.count;
  },

  /* Generate a full valid random grid */
  generateFull(){
    const g = S.empty();
    S._fillRandom(g);
    return g;
  },
  _fillRandom(g){
    let best=-1, bestLen=10;
    for(let i=0;i<81;i++){
      if(g[i]) continue;
      const c = S.candidates(g,i);
      if(c.length===0) return false;
      if(c.length<bestLen){ best=i; bestLen=c.length; }
    }
    if(best===-1) return true;
    const cands = S.candidates(g,best);
    /* Shuffle */
    for(let i=cands.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [cands[i],cands[j]]=[cands[j],cands[i]];
    }
    for(const n of cands){
      g[best]=n;
      if(S._fillRandom(g)) return true;
      g[best]=0;
    }
    return false;
  },

  /* Can a cell's value be deduced by logic alone? */
  canDeduce(grid, idx){
    /* Naked single: only one candidate */
    const c = S.candidates(grid, idx);
    if(c.length===1) return true;
    /* Hidden single: candidate appears only once in row/col/box */
    const r=S.row(idx), co=S.col(idx), b=S.box(idx);
    for(const n of c){
      /* Check row */
      let count=0;
      for(let j=0;j<9;j++){const ii=r*9+j; if(ii!==idx && !grid[ii] && S.candidates(grid,ii).includes(n)) count++;}
      if(count===0) return true;
      /* Check col */
      count=0;
      for(let j=0;j<9;j++){const ii=j*9+co; if(ii!==idx && !grid[ii] && S.candidates(grid,ii).includes(n)) count++;}
      if(count===0) return true;
      /* Check box */
      count=0;
      const br=Math.floor(r/3)*3, bc=Math.floor(co/3)*3;
      for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++){
        const ii=(br+dr)*9+(bc+dc);
        if(ii!==idx && !grid[ii] && S.candidates(grid,ii).includes(n)) count++;
      }
      if(count===0) return true;
    }
    return false;
  },

  /* Generate puzzle: remove clues while deducible */
  generatePuzzle(){
    const solution = S.generateFull();
    const puzzle = Uint8Array.from(solution);
    /* Randomized cell order for removal */
    const order = Array.from({length:81},(_,i)=>i);
    for(let i=80;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [order[i],order[j]]=[order[j],order[i]];
    }
    for(const idx of order){
      const val = puzzle[idx];
      if(!val) continue;
      puzzle[idx] = 0;
      /* Check unique solution */
      if(S.countSolutions(puzzle, 2) !== 1){
        puzzle[idx] = val; // restore
        continue;
      }
    }
    return { puzzle, solution };
  }
};


/* ===== GAME STATE ===== */
let puzzle, solution, grid, candidates, givens;
let selectedCell = -1;
let timerStart = 0, timerInterval = null, elapsed = 0, won = false;

const SAVE_KEY = 'idlegames-sudoku';

function saveGame(){
  try{
    const data = {
      puzzle: Array.from(puzzle),
      solution: Array.from(solution),
      grid: Array.from(grid),
      candidates: candidates.map(s=>[...s]),
      givens: [...givens],
      elapsed, won
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e){/* quota exceeded вЂ” silent */}
}

function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const d = JSON.parse(raw);
    if(!d.puzzle||!d.solution||!d.grid||d.grid.length!==81) return false;
    puzzle = Uint8Array.from(d.puzzle);
    solution = Uint8Array.from(d.solution);
    grid = Uint8Array.from(d.grid);
    candidates = d.candidates.map(a=> new Set(a));
    givens = new Set(d.givens);
    elapsed = d.elapsed||0;
    won = !!d.won;
    return true;
  } catch(e){ return false; }
}

function resumeGame(){
  document.getElementById('win-overlay').classList.remove('show');
  closePopup();
  selectedCell = -1;
  if(timerInterval) clearInterval(timerInterval);
  if(!won){
    timerStart = Date.now() - elapsed*1000;
    timerInterval = setInterval(updateTimer, 1000);
  }
  updateTimer();
  renderBoard();
  fitBoard();
  if(won){
    document.getElementById('win-time').textContent = `Time: ${formatTime(elapsed)}`;
    document.getElementById('win-overlay').classList.add('show');
  }
}

function newGame(){
  won = false;
  document.getElementById('win-overlay').classList.remove('show');
  closePopup();
  localStorage.removeItem(SAVE_KEY);

  /* Defer heavy puzzle generation off the click handler */
  setTimeout(()=>{
    const gen = S.generatePuzzle();
    puzzle = gen.puzzle;
    solution = gen.solution;
    grid = Uint8Array.from(puzzle);
    candidates = Array.from({length:81},()=> new Set());
    givens = new Set();
    for(let i=0;i<81;i++) if(puzzle[i]) givens.add(i);

    selectedCell = -1;
    elapsed = 0;
    if(timerInterval) clearInterval(timerInterval);
    timerStart = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    updateTimer();

    renderBoard();
    fitBoard();
    saveGame();
  }, 0);
}

function updateTimer(){
  if(won) return;
  elapsed = Math.floor((Date.now()-timerStart)/1000);
  const m=String(Math.floor(elapsed/60)).padStart(2,'0');
  const s=String(elapsed%60).padStart(2,'0');
  document.getElementById('timer').textContent=m+':'+s;
}

function formatTime(sec){
  const m=Math.floor(sec/60), s=sec%60;
  return m ? `${m}m ${s}s` : `${s}s`;
}


/* ===== RENDERING ===== */
const boardEl = document.getElementById('board');

function renderBoard(){
  boardEl.innerHTML='';
  for(let i=0;i<81;i++){
    const el = document.createElement('div');
    el.className = 'cell';
    el.tabIndex = 0;
    el.dataset.idx = i;
    el.setAttribute('role','gridcell');

    /* Box borders */
    const c = i%9, r = Math.floor(i/9);
    if(c===2||c===5) el.classList.add('box-right');
    if(r===2||r===5) el.classList.add('box-bottom');

    updateCell(el, i);
    boardEl.appendChild(el);
  }
}

function updateCell(el, i){
  el.classList.remove('given','user','error');
  if(grid[i]){
    el.textContent = grid[i];
    el.classList.add(givens.has(i)?'given':'user');
    /* Check conflict against placed peers AND peer candidates */
    if(!givens.has(i)){
      for(const p of S.peers[i]){
        if((grid[p] && grid[p]===grid[i]) || candidates[p].has(grid[i])){
          el.classList.add('error'); break;
        }
      }
    }
    el.setAttribute('aria-label', `Row ${S.row(i)+1}, Column ${S.col(i)+1}: ${grid[i]}`);
  } else {
    el.textContent='';
    /* Show candidates */
    if(candidates[i].size){
      /* Classify peer conflicts */
      const givenNums = new Set();
      const userNums = new Set();
      for(const p of S.peers[i]){
        if(grid[p]){
          (givens.has(p) ? givenNums : userNums).add(grid[p]);
        }
        for(const cn of candidates[p]) userNums.add(cn);
      }

      const g=document.createElement('div');
      g.className='candidates ' + (candidates[i].size===1 ? 'cand-single' : 'cand-multi');
      for(let n=1;n<=9;n++){
        const sp=document.createElement('span');
        if(candidates[i].has(n)){
          sp.textContent=n;
          if(givenNums.has(n)) sp.classList.add('cand-conflict-given');
          else if(userNums.has(n)) sp.classList.add('cand-invalid');
        }
        g.appendChild(sp);
      }
      el.appendChild(g);
    }
    el.setAttribute('aria-label', `Row ${S.row(i)+1}, Column ${S.col(i)+1}: empty`);
  }
}

function refreshCell(i){
  const el = boardEl.children[i];
  if(!el) return;
  el.innerHTML='';
  updateCell(el, i);
}

function highlightRelated(idx){
  if(!boardEl.children.length) return;
  for(let i=0;i<81;i++){
    boardEl.children[i].classList.remove('highlight','selected');
  }
  if(idx<0) return;
  boardEl.children[idx].classList.add('selected');
  for(const p of S.peers[idx]) boardEl.children[p].classList.add('highlight');
}


/* ===== POPUP (candidate toggle) ===== */
const popup = document.getElementById('popup');
const popupGrid = document.getElementById('popup-grid');
let popupCell = -1;
let popupDragOff = null;
let isDragging = false;
let bgBlobUrl = null;

function openPopup(cellIdx){
  if(won) return;
  const alreadyOpen = popup.classList.contains('open') && popupCell === cellIdx;
  popupCell = cellIdx;
  popupGrid.innerHTML='';
  const isGiven = givens.has(cellIdx);

  if(isGiven){
    /* Show locked number */
    const d=document.createElement('div');
    d.className='popup-num locked';
    d.textContent=grid[cellIdx];
    popupGrid.appendChild(d);
  } else {
    for(let n=1;n<=9;n++){
      const d=document.createElement('div');
      d.className='popup-num';
      d.textContent=n;
      d.dataset.num=n;

      const candCount = candidates[cellIdx].size + (grid[cellIdx]?1:0);
      if(grid[cellIdx]===n){
        /* Placed state вЂ“ shown as sole green */
        d.classList.add('on-single');
      } else if(candidates[cellIdx].has(n)){
        /* Candidate: green if sole, violet if multiple */
        d.classList.add(candCount===1 ? 'on-single' : 'on-multi');
      }

      popupGrid.appendChild(d);
    }
  }

  if(!alreadyOpen){
    /* Position near cell */
    const cellEl = boardEl.children[cellIdx];
    const cellRect = cellEl.getBoundingClientRect();
    const appRect = document.getElementById('app').getBoundingClientRect();
    let left = cellRect.left - appRect.left + cellRect.width + 8;
    let top = cellRect.top - appRect.top - 20;

    /* Keep on screen */
    const pw=140, ph=140;
    if(left+pw > appRect.width) left = cellRect.left - appRect.left - pw - 8;
    if(top+ph > appRect.height) top = appRect.height - ph - 8;
    if(top < 0) top = 8;
    if(left < 0) left = 8;

    popup.style.left = left+'px';
    popup.style.top = top+'px';
  }

  popup.classList.add('open');

  highlightRelated(cellIdx);
}

function closePopup(){
  popup.classList.remove('open');
  popupCell = -1;
  isDragging = false;
  popupDragOff = null;
  highlightRelated(-1);
}

function toggleCandidate(cellIdx, num){
  if(givens.has(cellIdx)) return;

  if(grid[cellIdx]===num){
    /* Placed this number в†’ clear back to empty */
    grid[cellIdx]=0;
  } else if(grid[cellIdx]){
    /* Different number placed в†’ unplace it, add both as candidates */
    const prev=grid[cellIdx];
    grid[cellIdx]=0;
    candidates[cellIdx].add(prev);
    candidates[cellIdx].add(num);
  } else if(candidates[cellIdx].has(num)){
    /* Candidate on в†’ toggle off */
    candidates[cellIdx].delete(num);
    /* If exactly one candidate remains, auto-commit it */
    if(candidates[cellIdx].size===1){
      grid[cellIdx]=[...candidates[cellIdx]][0];
      candidates[cellIdx].clear();
    }
  } else {
    /* Off в†’ add as candidate */
    /* If a number is currently placed (sole), unplace it and add both */
    candidates[cellIdx].add(num);
    /* If we now have only one candidate total and nothing placed в†’ place it */
    if(candidates[cellIdx].size===1 && !grid[cellIdx]){
      grid[cellIdx]=num;
      candidates[cellIdx].clear();
    }
  }

  refreshCell(cellIdx);
  /* Refresh ALL peers вЂ” placed numbers need error class updated, candidates need conflict colors */
  for(const p of S.peers[cellIdx]) refreshCell(p);
  /* Refresh popup */
  openPopup(cellIdx);
  checkWin();
  saveGame();
}

/* Popup dragging вЂ” works from anywhere on the popup including number buttons */
let dragStartPos = null;
let dragStartTarget = null;
const DRAG_THRESHOLD = 6; // px movement before it counts as a drag

popup.addEventListener('pointerdown', e=>{
  const rect = popup.getBoundingClientRect();
  const appRect = document.getElementById('app').getBoundingClientRect();
  popupDragOff = { x: e.clientX - rect.left, y: e.clientY - rect.top, appLeft: appRect.left, appTop: appRect.top };
  dragStartPos = { x: e.clientX, y: e.clientY };
  dragStartTarget = e.target;
  isDragging = false;
  popup.setPointerCapture(e.pointerId);
});
let lastDragT = 0;
const DRAG_INTERVAL = 50; // 20 FPS cap
popup.addEventListener('pointermove', e=>{
  if(!popupDragOff) return;
  if(!isDragging){
    const dx = e.clientX - dragStartPos.x, dy = e.clientY - dragStartPos.y;
    if(Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
    isDragging = true;
    popup.classList.add('dragging');
    popup.style.willChange = 'transform';
    lastDragT = 0; // allow first frame immediately
  }
  const now = performance.now();
  if(now - lastDragT < DRAG_INTERVAL) return;
  lastDragT = now;
  const tx = e.clientX - dragStartPos.x;
  const ty = e.clientY - dragStartPos.y;
  popup.style.transform = `translate(${tx}px,${ty}px)`;
});
popup.addEventListener('pointerup', e=>{
  if(!isDragging && popupDragOff){
    /* It was a tap, not a drag вЂ” check if it hit a number button */
    const btn = dragStartTarget?.closest('.popup-num');
    if(btn && btn.dataset.num && popupCell >= 0){
      toggleCandidate(popupCell, parseInt(btn.dataset.num));
    }
  }
  if(isDragging){
    /* Bake transform into left/top */
    const rect = popup.getBoundingClientRect();
    const appRect = document.getElementById('app').getBoundingClientRect();
    popup.style.left = (rect.left - appRect.left) + 'px';
    popup.style.top = (rect.top - appRect.top) + 'px';
    popup.style.transform = '';
    popup.style.willChange = '';
  }
  isDragging = false;
  popupDragOff = null;
  dragStartPos = null;
  dragStartTarget = null;
  popup.classList.remove('dragging');
});
popup.addEventListener('lostpointercapture', ()=>{
  isDragging = false;
  popupDragOff = null;
  dragStartPos = null;
  dragStartTarget = null;
  popup.classList.remove('dragging');
});

/* Keyboard navigation */
document.addEventListener('keydown', e=>{
  if(won){
    if(e.key==='Escape'){
      const ov=document.getElementById('win-overlay');
      ov.classList.toggle('show');
    }
    return;
  }
  const active = document.activeElement;
  const cell = active?.closest('.cell');
  let idx = cell ? parseInt(cell.dataset.idx) : selectedCell;
  if(idx<0 || isNaN(idx)) idx=0;

  switch(e.key){
    case 'ArrowUp':
      e.preventDefault();
      if(S.row(idx)>0){ idx-=9; boardEl.children[idx].focus(); selectedCell=idx; openPopup(idx); }
      break;
    case 'ArrowDown':
      e.preventDefault();
      if(S.row(idx)<8){ idx+=9; boardEl.children[idx].focus(); selectedCell=idx; openPopup(idx); }
      break;
    case 'ArrowLeft':
      e.preventDefault();
      if(S.col(idx)>0){ idx--; boardEl.children[idx].focus(); selectedCell=idx; openPopup(idx); }
      break;
    case 'ArrowRight':
      e.preventDefault();
      if(S.col(idx)<8){ idx++; boardEl.children[idx].focus(); selectedCell=idx; openPopup(idx); }
      break;
    case '1':case '2':case '3':case '4':case '5':case '6':case '7':case '8':case '9':
      if(selectedCell>=0 && !givens.has(selectedCell)){
        e.preventDefault();
        toggleCandidate(selectedCell, parseInt(e.key));
      }
      break;
    case 'Backspace':case 'Delete':
      if(selectedCell>=0 && !givens.has(selectedCell)){
        e.preventDefault();
        grid[selectedCell]=0;
        candidates[selectedCell].clear();
        refreshCell(selectedCell);
        openPopup(selectedCell);
      }
      break;
    case 'Escape':
      closePopup();
      break;
    case 'h':case 'H':
      /* Debug: flash solution for 1 second */
      e.preventDefault();
      for(let i=0;i<81;i++){
        const el=boardEl.children[i];
        el.innerHTML='';
        el.className='cell given';
        el.textContent=solution[i];
        const c=i%9,r=Math.floor(i/9);
        if(c===2||c===5) el.classList.add('box-right');
        if(r===2||r===5) el.classList.add('box-bottom');
      }
      setTimeout(()=>{ renderBoard(); fitBoard(); highlightRelated(selectedCell); }, 1000);
      break;
  }
});

/* ===== BACKGROUND ART ===== */
function generateArt(){
  const svg = document.getElementById('bg-art');
  const w = window.innerWidth, h = window.innerHeight;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);

  /* Low-poly rock facets */
  const facets = document.getElementById('rock-facets');
  facets.innerHTML='';
  const pts = [];
  const gridSize = 80;
  for(let y=-gridSize;y<h+gridSize;y+=gridSize){
    for(let x=-gridSize;x<w+gridSize;x+=gridSize){
      pts.push([x+(Math.random()-.5)*gridSize*.8, y+(Math.random()-.5)*gridSize*.8]);
    }
  }
  /* Simple triangulation by grid quads */
  const cols = Math.ceil((w+gridSize*2)/gridSize);
  for(let gy=0; gy<Math.ceil((h+gridSize*2)/gridSize)-1; gy++){
    for(let gx=0; gx<cols-1; gx++){
      const i = gy*cols+gx;
      if(i+cols+1>=pts.length) continue;
      const a=pts[i],b=pts[i+1],c=pts[i+cols],d=pts[i+cols+1];
      const shade1 = 16+Math.floor(Math.random()*14);
      const shade2 = 16+Math.floor(Math.random()*14);
      const t1=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      t1.setAttribute('points',`${a[0]},${a[1]} ${b[0]},${b[1]} ${c[0]},${c[1]}`);
      t1.setAttribute('fill',`rgb(${shade1},${shade1},${shade1})`);
      t1.setAttribute('stroke',`rgb(${shade1+2},${shade1+2},${shade1+2})`);
      t1.setAttribute('stroke-width','0.5');
      facets.appendChild(t1);
      const t2=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      t2.setAttribute('points',`${b[0]},${b[1]} ${d[0]},${d[1]} ${c[0]},${c[1]}`);
      t2.setAttribute('fill',`rgb(${shade2},${shade2},${shade2})`);
      t2.setAttribute('stroke',`rgb(${shade2+2},${shade2+2},${shade2+2})`);
      t2.setAttribute('stroke-width','0.5');
      facets.appendChild(t2);
    }
  }

  /* Lava cracks вЂ” variable-width polygons that look like real cracks */
  const cracks = document.getElementById('lava-cracks');
  cracks.innerHTML='';
  const neonColors = ['#ff3b1d','#ff8c00','#ffd700','#ff2dff','#00f5ff','#39ff14','#ff6b2b','#4d79ff'];

  /* Build a polygon outline from a centerline with varying half-widths */
  function crackPoly(pts, widths){
    const left=[], right=[];
    for(let i=0;i<pts.length;i++){
      let nx, ny;
      if(i===0){
        nx=pts[1][0]-pts[0][0]; ny=pts[1][1]-pts[0][1];
      } else if(i===pts.length-1){
        nx=pts[i][0]-pts[i-1][0]; ny=pts[i][1]-pts[i-1][1];
      } else {
        nx=pts[i+1][0]-pts[i-1][0]; ny=pts[i+1][1]-pts[i-1][1];
      }
      const len=Math.sqrt(nx*nx+ny*ny)||1;
      /* Perpendicular (normalised) */
      const px=-ny/len, py=nx/len;
      const hw=widths[i];
      left.push([Math.round(pts[i][0]+px*hw), Math.round(pts[i][1]+py*hw)]);
      right.push([Math.round(pts[i][0]-px*hw), Math.round(pts[i][1]-py*hw)]);
    }
    right.reverse();
    return left.concat(right).map(p=>p[0]+','+p[1]).join(' ');
  }

  function addCrackPoly(pts, widths, col, op){
    const polyPts = crackPoly(pts, widths);
    /* Glow layer */
    const glow=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    const glowWidths = widths.map(w=>w*2.5);
    glow.setAttribute('points', crackPoly(pts, glowWidths));
    glow.setAttribute('fill',col);
    glow.setAttribute('opacity',(op*.3).toFixed(3));
    glow.setAttribute('shape-rendering','geometricPrecision');
    cracks.appendChild(glow);
    /* Core polygon */
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points', polyPts);
    poly.setAttribute('fill',col);
    poly.setAttribute('opacity',op.toFixed(3));
    poly.setAttribute('shape-rendering','geometricPrecision');
    cracks.appendChild(poly);
    /* Bright centerline for hot core */
    if(pts.length>=2){
      let d='M'+pts[0][0]+','+pts[0][1];
      for(let i=1;i<pts.length;i++) d+=' L'+pts[i][0]+','+pts[i][1];
      const core=document.createElementNS('http://www.w3.org/2000/svg','path');
      core.setAttribute('d',d);
      core.setAttribute('fill','none');
      core.setAttribute('stroke','#fff');
      core.setAttribute('stroke-width','0.5');
      core.setAttribute('opacity',(op*.6).toFixed(3));
      core.setAttribute('stroke-linecap','round');
      core.setAttribute('stroke-linejoin','round');
      core.setAttribute('shape-rendering','geometricPrecision');
      cracks.appendChild(core);
    }
  }

  for(let i=0;i<18;i++){
    let x=Math.round(Math.random()*w), y=Math.round(Math.random()*h);
    const pts=[[x,y]];
    /* Starting width: taper from 0 at tips, swell in the middle */
    const segs=8+Math.floor(Math.random()*12);
    const col = neonColors[Math.floor(Math.random()*neonColors.length)];
    const op = .15+Math.random()*.2;
    const maxW = 2+Math.random()*6; // max half-width in pixels

    for(let s=0;s<segs;s++){
      const dx=Math.round((Math.random()-.5)*120), dy=Math.round((Math.random()-.5)*120);
      x+=dx; y+=dy;
      pts.push([x,y]);
      /* Branch crack */
      if(Math.random()<.35){
        const bpts=[[x,y]];
        let bx=x, by=y;
        const bSegs=2+Math.floor(Math.random()*4);
        const bMaxW=1+Math.random()*3;
        for(let bs=0;bs<bSegs;bs++){
          bx+=Math.round((Math.random()-.5)*60);
          by+=Math.round((Math.random()-.5)*60);
          bpts.push([bx,by]);
        }
        /* Taper branch: wide at root, pointed at tip */
        const bWidths=bpts.map((_,bi)=>{
          const t=bi/(bpts.length-1);
          return bMaxW*(1-t)*(0.5+Math.random()*0.5);
        });
        bWidths[bWidths.length-1]=0;
        const bc = neonColors[Math.floor(Math.random()*neonColors.length)];
        addCrackPoly(bpts, bWidths, bc, .12+Math.random()*.18);
      }
    }
    /* Generate varying widths: taper at both ends, random swell in between */
    const widths=pts.map((_,pi)=>{
      const t=pi/(pts.length-1);
      /* Envelope: 0 at tips, 1 in middle */
      const env=Math.sin(t*Math.PI);
      /* Random jag */
      const jag=0.3+Math.random()*0.7;
      return maxW*env*jag;
    });
    widths[0]=0;
    widths[widths.length-1]=0;
    addCrackPoly(pts, widths, col, op);
  }

  /* Swirl layer вЂ“ large drifting colour blobs */
  const swirls = document.getElementById('swirl-layer');
  swirls.innerHTML='';
  const swirlColors = ['#00f5ff','#ff2dff','#39ff14','#ff6b2b','#4d79ff','#ffe74c','#ff3b1d'];
  for(let i=0;i<8;i++){
    const cx=Math.random()*w, cy=Math.random()*h;
    const r=80+Math.random()*200;
    const el=document.createElementNS('http://www.w3.org/2000/svg','circle');
    el.setAttribute('cx',cx);el.setAttribute('cy',cy);el.setAttribute('r',r);
    el.setAttribute('fill',swirlColors[i%swirlColors.length]);
    el.setAttribute('opacity',(.15+Math.random()*.15).toFixed(2));
    swirls.appendChild(el);
  }

  /* Neon bubbles */
  const bubbles = document.getElementById('neon-bubbles');
  bubbles.innerHTML='';
  const bubbleGrads = ['bubble1','bubble2','bubble3','bubble4','bubble5','bubble6'];
  for(let i=0;i<30;i++){
    const cx=Math.random()*w, cy=Math.random()*h;
    const r=8+Math.random()*35;
    const el=document.createElementNS('http://www.w3.org/2000/svg','circle');
    el.setAttribute('cx',cx);el.setAttribute('cy',cy);el.setAttribute('r',r);
    el.setAttribute('fill',`url(#${bubbleGrads[i%bubbleGrads.length]})`);
    el.setAttribute('opacity',(.3+Math.random()*.4).toFixed(2));
    bubbles.appendChild(el);
  }

  /* Rasterize SVG to a static background image with crossfade */
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg);
  const svgDataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
  const srcImg = new Image();
  srcImg.onload = ()=>{
    const canvas = document.createElement('canvas');
    canvas.width = w * devicePixelRatio;
    canvas.height = h * devicePixelRatio;
    const ctx = canvas.getContext('2d');
    ctx.scale(devicePixelRatio, devicePixelRatio);
    ctx.drawImage(srcImg, 0, 0, w, h);
    canvas.toBlob(cBlob=>{
      const oldUrl = bgBlobUrl;
      bgBlobUrl = URL.createObjectURL(cBlob);
      const layer = new Image();
      layer.className = 'bg-layer';
      layer.src = bgBlobUrl;
      const app = document.getElementById('app');
      const oldLayer = app.querySelector('.bg-layer');
      if(oldLayer) oldLayer.after(layer);
      else app.insertBefore(layer, app.firstChild);
      /* Force layout so transition triggers */
      layer.offsetWidth;
      layer.style.opacity = '1';
      layer.addEventListener('transitionend', ()=>{
        if(oldLayer){ oldLayer.remove(); }
        if(oldUrl) URL.revokeObjectURL(oldUrl);
      }, {once:true});
    }, 'image/png');
  };
  srcImg.src = svgDataUrl;
}


/* ===== SIZING ===== */
function fitBoard(){
  const pad = 16;                       // --pad
  const toolbarH = document.getElementById('toolbar').offsetHeight || 44;
  const gapPx = 1;                      // --gap
  const boardPad = 4;                   // board padding each side
  const extraBorders = 4 * 2;           // 2px box-borders Г— 4 internal lines (approx)

  const availW = window.innerWidth - pad * 2;
  const availH = window.innerHeight - pad * 2 - toolbarH - 12; // 12 = toolbar margin-bottom

  const boardOverhead = gapPx * 8 + boardPad * 2 + extraBorders;
  const maxCellW = Math.floor((availW - boardOverhead) / 9);
  const maxCellH = Math.floor((availH - boardOverhead) / 9);
  const cell = Math.max(24, Math.min(maxCellW, maxCellH));

  document.documentElement.style.setProperty('--cell', cell + 'px');

  /* Scale font proportionally via CSS custom properties (cascade to new elements) */
  const fontSize = Math.max(12, Math.round(cell * 0.52));
  const candFont = Math.max(7, Math.round(cell * 0.30));
  const root = document.documentElement.style;
  root.setProperty('--cell-font', fontSize + 'px');
  root.setProperty('--cand-font', candFont + 'px');
}

/* ===== INIT ===== */
let resizeTimer = 0;
function onResize(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{ fitBoard(); generateArt(); }, 150);
}
function init(){
  fitBoard();
  generateArt();
  window.addEventListener('resize', onResize);
  if(loadGame()) resumeGame();
  else newGame();
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
