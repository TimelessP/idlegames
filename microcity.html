    trackpadZoom.active = false;
    return;
  }

  zoomAt(trackpadZoom.x, trackpadZoom.y, Math.exp(trackpadZoom.velocity * dtSec));
  trackpadZoom.velocity += (0 - trackpadZoom.velocity) * legacyBlend(0.22, dtSec);
}

// Pointer events (unified mouse + touch)
let pointerDownTime = 0;
let pointerMoved = false;

canvas.addEventListener('pointerdown', (e) => {
  if (e.pointerType === 'touch' && e.isPrimary === false) return; // handle via touch events for pinch
  unlockAudio();
  clearActionCam();
  drag.active = true;
  drag.startX = e.clientX;
  drag.startY = e.clientY;
  drag.camStartX = cam.x;
  drag.camStartY = cam.y;
  pointerDownTime = performance.now();
  pointerMoved = false;
  canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', (e) => {
  const w = screenToWorld(e.clientX, e.clientY);
  cursorWorld.x = w.x;
  cursorWorld.y = w.y;

  if (drag.active) {
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) pointerMoved = true;
    cam.x = drag.camStartX - dx / cam.zoom;
    cam.y = drag.camStartY - dy / cam.zoom;
    clampCam();
  }

  // Update status bar with tile info
  const tx = Math.floor(w.x / TILE);
  const ty = Math.floor(w.y / TILE);
  if (tx >= 0 && tx < MAP_W && ty >= 0 && ty < MAP_H) {
    hoveredTile = { x: tx, y: ty };
    updateStatusBar(w.x, w.y, tx, ty);
  }
});

canvas.addEventListener('pointerup', (e) => {
  if (drag.active) {
    drag.active = false;
    canvas.classList.remove('dragging');

    // Click detection: short press + didn't move much
    const elapsed = performance.now() - pointerDownTime;
    if (elapsed < 300 && !pointerMoved) {
      const w = screenToWorld(e.clientX, e.clientY);
      interact(w.x, w.y);
    }
  }
});

canvas.addEventListener('pointercancel', () => {
  drag.active = false;
  canvas.classList.remove('dragging');
});

// Wheel zoom
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  clearActionCam();
  if (isTrackpadWheelEvent(e)) {
    trackpadZoom.x = e.clientX;
    trackpadZoom.y = e.clientY;
    trackpadZoom.velocity += clamp(-e.deltaY * 0.02, -0.8, 0.8);
    trackpadZoom.active = true;
    return;
  }
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

// Pinch zoom
let lastTouchDist = 0;
let lastTouchCenter = { x: 0, y: 0 };

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    clearActionCam();
    drag.active = false; // cancel pan during pinch
    const t0 = e.touches[0];
    const t1 = e.touches[1];
    lastTouchDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    lastTouchCenter = { x: (t0.clientX + t1.clientX) / 2, y: (t0.clientY + t1.clientY) / 2 };
    pinch.active = true;
    pinch.startZoom = cam.zoom;
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinch.active) {
    e.preventDefault();
    const t0 = e.touches[0];
    const t1 = e.touches[1];
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    const center = { x: (t0.clientX + t1.clientX) / 2, y: (t0.clientY + t1.clientY) / 2 };

    // Zoom
    const factor = dist / lastTouchDist;
    zoomAt(center.x, center.y, factor);

    // Pan
    cam.x -= (center.x - lastTouchCenter.x) / cam.zoom;
    cam.y -= (center.y - lastTouchCenter.y) / cam.zoom;
    clampCam();

    lastTouchDist = dist;
    lastTouchCenter = center;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) {
    pinch.active = false;
  }
});

// Keyboard
const keysDown = new Set();
document.addEventListener('keydown', (e) => {
  unlockAudio();
  keysDown.add(e.key);
  switch (e.key) {
    case 'ArrowLeft': case 'a': clearActionCam(); e.preventDefault(); break;
    case 'ArrowRight': case 'd': clearActionCam(); e.preventDefault(); break;
    case 'ArrowUp': case 'w': clearActionCam(); e.preventDefault(); break;
    case 'ArrowDown': case 's': clearActionCam(); e.preventDefault(); break;
    case '+': case '=': clearActionCam(); zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1.2); e.preventDefault(); break;
    case '-': case '_': clearActionCam(); zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1 / 1.2); e.preventDefault(); break;
    case '0': clearActionCam(); resetZoom(); e.preventDefault(); break;
    case 'r': case 'R':
      clearActionCam();
      cam.x = PX_W / 2; cam.y = PX_H / 2; cam.zoom = 2; e.preventDefault(); break;
    case 'Enter': case ' ':
      interact(cursorWorld.x, cursorWorld.y); e.preventDefault(); break;
    case '?':
      toggleHelp(); e.preventDefault(); break;
    case 'Escape':
      const hp = document.getElementById('help-panel');
      if (hp.classList.contains('open')) { toggleHelp(); e.preventDefault(); }
      break;
  }
});
document.addEventListener('keyup', (e) => keysDown.delete(e.key));

function updateStatusBar(wx, wy, tx, ty) {
  const tile = map[ty][tx];
  const names = { [T.GRASS]: 'Grass', [T.ROAD_H]: 'Road', [T.ROAD_V]: 'Road', [T.ROAD_X]: 'Intersection',
    [T.SIDEWALK]: 'Sidewalk', [T.BUILDING]: 'Building', [T.TREE]: 'Tree', [T.WATER]: 'Water',
    [T.PARK]: 'Park', [T.PARKING]: 'Parking' };
  const name = names[tile] || 'Unknown';

  // Check for specific entities
  for (const b of buildings) {
    if (wx >= b.x && wx < b.x + b.w && wy >= b.y && wy < b.y + b.h) {
      document.getElementById('status-text').textContent = `${b.signText || b.type} — click to interact`;
      return;
    }
  }
  for (const car of cars) {
    if (Math.abs(car.x - wx) < 8 && Math.abs(car.y - wy) < 8) {
      document.getElementById('status-text').textContent = `Car ${car.stopped ? '(stopped)' : '(moving)'} — click to honk`;
      return;
    }
  }
  for (const p of people) {
    if (Math.abs(p.x - wx) < 8 && Math.abs(p.y - wy) < 8) {
      document.getElementById('status-text').textContent = `Person (${p.state}) — click to wave`;
      return;
    }
  }
  for (const tl of trafficLights) {
    if (Math.abs(tl.x - wx) < 10 && Math.abs(tl.y - wy) < 10) {
      document.getElementById('status-text').textContent = `Traffic light (${tl.state}) — click to toggle`;
      return;
    }
  }

  document.getElementById('status-text').textContent = `${name} — click to interact`;
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), 2000);
}

// ═══════════════════════════════════════════════════════
// HELP
// ═══════════════════════════════════════════════════════
function toggleHelp() {
  const panel = document.getElementById('help-panel');
  const btn = document.getElementById('help-btn');
  const isOpen = panel.classList.toggle('open');
  btn.setAttribute('aria-expanded', isOpen);
}
document.getElementById('help-btn').addEventListener('click', toggleHelp);
document.getElementById('mute-btn').addEventListener('click', () => {
  unlockAudio();
  const effectivelyMuted = audioState.muted || audioState.volume <= 0.0001;
  if (effectivelyMuted) {
    if (audioState.volume <= 0.0001) setAudioVolume(audioState.lastAudibleVolume || 0.65);
    setMuted(false);
    return;
  }
  setMuted(true);
});
document.getElementById('volume-range').addEventListener('input', (event) => {
  unlockAudio();
  const value = Number(event.target.value) / 100;
  setAudioVolume(value);
  if (value > 0 && audioState.muted) setMuted(false);
  if (value <= 0 && !audioState.muted) setMuted(true);
});

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
function frame(now) {
  const dt = lastTime ? Math.min(now - lastTime, 100) : LEGACY_FRAME_MS;
  lastTime = now;
  const dtSec = dt / 1000;

  // Continuous keyboard panning
  const PAN_SPEED = legacySpeed(3) * dtSec / cam.zoom;
  if (keysDown.has('ArrowLeft') || keysDown.has('a')) { cam.x -= PAN_SPEED; clampCam(); }
  if (keysDown.has('ArrowRight') || keysDown.has('d')) { cam.x += PAN_SPEED; clampCam(); }
  if (keysDown.has('ArrowUp') || keysDown.has('w')) { cam.y -= PAN_SPEED; clampCam(); }
  if (keysDown.has('ArrowDown') || keysDown.has('s')) { cam.y += PAN_SPEED; clampCam(); }

  update(dt);
  render();
  requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('resize', resize);
resize();
loadAudioPreferences();
syncAudioControls();
generateMap();
updateIncidentBanner();
syncActionCamButtons();
requestAnimationFrame(frame);

})();
</script>
