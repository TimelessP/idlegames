<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<link rel="manifest" href="manifest.webmanifest">
<meta name="application-name" content="IdleGames">
<meta name="theme-color" content="#2d5a1e">
<meta name="description" content="Micro City — a living pixel city you can poke, prod, and watch evolve. Click buildings, cars, trees, and people to trigger cascading chain reactions in a delightfully pixelated top-down world.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" href="assets/appicons/idle-games-512x512px.png">
<link rel="apple-touch-icon" href="assets/appicons/idle-games-512x512px.png">
<title>Micro City</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}

:root{
  --bg:#e8e4d8;--fg:#1a1a1a;--hud-bg:rgba(232,228,216,0.92);--hud-fg:#1a1a1a;
  --accent:#c03030;--accent2:#2e7d32;--badge:#ffc107;
  --shadow:rgba(0,0,0,0.15);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--fg:#e0ddd4;--hud-bg:rgba(30,30,30,0.94);--hud-fg:#e0ddd4;
    --accent:#e05050;--accent2:#4caf50;--badge:#ffca28;
    --shadow:rgba(0,0,0,0.4);
  }
}

body{background:var(--bg);color:var(--fg);user-select:none;-webkit-user-select:none}

canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:grab}
canvas.dragging{cursor:grabbing}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:var(--hud-bg);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:10;pointer-events:none;gap:10px;min-height:40px;flex-wrap:wrap}
#hud>*{pointer-events:auto}

.hud-stats{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hud-controls{display:flex;align-items:center;gap:10px;margin-left:auto;min-height:32px}

.hud-stat{display:flex;align-items:center;gap:4px;font-size:0.82rem;font-weight:600;color:var(--hud-fg);white-space:nowrap}
.hud-stat svg{width:18px;height:18px;flex-shrink:0}

.icon-button{appearance:none;border:0;background:transparent;color:var(--hud-fg);width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.icon-button svg{width:18px;height:18px;display:block}
.volume-wrap{display:flex;align-items:center;gap:8px;min-width:148px}
.volume-wrap label{font-size:0.76rem;font-weight:600;color:var(--hud-fg);white-space:nowrap}
.volume-wrap input[type="range"]{width:92px;accent-color:var(--accent2)}

#status-bar{position:fixed;bottom:0;left:0;right:0;padding:6px 12px;
  background:var(--hud-bg);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:10;text-align:center;font-size:0.78rem;color:var(--hud-fg);
  pointer-events:none;min-height:32px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}

#incident-text{font-weight:700;color:var(--accent)}

.toast{position:fixed;left:50%;bottom:52px;transform:translateX(-50%);
  background:var(--accent);color:#fff;padding:6px 16px;font-size:0.82rem;font-weight:600;
  opacity:0;transition:opacity 0.3s;z-index:20;pointer-events:none;max-width:90vw;text-align:center}
.toast.visible{opacity:1}

/* Skip-link */
.skip-link{position:absolute;left:-9999px;top:0;z-index:100;background:var(--bg);color:var(--fg);padding:8px 12px}
.skip-link:focus{left:8px;top:8px}

/* Reduced-motion */
@media(prefers-reduced-motion:reduce){
  .toast{transition:none}
}

/* Controls hint */
#controls-hint{position:fixed;bottom:42px;right:12px;z-index:10;pointer-events:auto}
#controls-hint button{background:var(--hud-bg);color:var(--hud-fg);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.1rem;backdrop-filter:blur(6px)}
#help-panel{display:none;position:fixed;bottom:80px;right:12px;z-index:20;
  background:var(--hud-bg);backdrop-filter:blur(6px);color:var(--hud-fg);
  padding:12px 16px;max-width:280px;font-size:0.78rem;line-height:1.5}
#help-panel.open{display:block}
#help-panel kbd{background:var(--fg);color:var(--bg);padding:1px 5px;font-size:0.72rem;font-family:inherit}

#action-cam-panel{position:fixed;right:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:12;pointer-events:auto;align-items:stretch}
.action-cam-btn{appearance:none;border:0;background:var(--hud-bg);color:var(--hud-fg);padding:8px 10px;
  font-size:0.76rem;font-weight:700;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  box-shadow:0 4px 18px var(--shadow);min-width:92px;text-align:left}
.action-cam-btn.active{background:var(--accent2);color:#fff}
.action-cam-btn:disabled{opacity:0.38;cursor:default;box-shadow:none;filter:saturate(0.55)}
@media (max-width:720px){
  #action-cam-panel{left:12px;right:12px;top:auto;bottom:82px;transform:none;flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:stretch;overflow:visible}
  .action-cam-btn{flex:1 1 calc(50% - 8px);min-width:126px;text-align:center;white-space:normal}
}
</style>
</head>

      <svg id="mute-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M14 4v16l-5-4H5V8h4l5-4zm3.2 4.2 1.4-1.4L21 9.2l2.4-2.4 1.4 1.4-2.4 2.4 2.4 2.4-1.4 1.4L21 12l-2.4 2.4-1.4-1.4L19.6 10l-2.4-1.8z" transform="translate(-1 0)"/></svg>
    </button>
    <div class="volume-wrap">
      <label for="volume-range">Sound</label>
      <input id="volume-range" type="range" min="0" max="100" step="1" value="65" aria-label="Sound volume">
    </div>
  </div>
</div>

<canvas id="game-canvas" role="img" aria-label="Micro City — interactive pixel city. Click on buildings, cars, trees, and people to interact." tabindex="0"></canvas>

<div id="status-bar">
  <span id="status-text">Click anything to interact</span>
  <span id="incident-text"></span>
</div>

<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<div id="controls-hint">
  <button id="help-btn" aria-label="Show controls" aria-expanded="false" aria-controls="help-panel">?</button>
</div>
<div id="action-cam-panel" aria-label="Action cameras"></div>
<div id="help-panel" role="dialog" aria-label="Controls">
  <strong>Controls</strong><br>
  <kbd>Drag</kbd> or <kbd>Arrow keys</kbd> Pan<br>

<script>
'use strict';
(() => {
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const TILE = 16; // pixel size of one tile
const MAP_W = 96; // tiles wide
const MAP_H = 96; // tiles tall
const PX_W = MAP_W * TILE;
const PX_H = MAP_H * TILE;

// Tile types
const T = {
  GRASS: 0, ROAD_H: 1, ROAD_V: 2, ROAD_X: 3, SIDEWALK: 4,
  BUILDING: 5, TREE: 6, WATER: 7, PARK: 8, PARKING: 9,
  ROAD_MARK_H: 10, ROAD_MARK_V: 11
};

// Colors (retro GTA1/2 aesthetic — pixel-art flat colors)
const PAL = {
  grass:     ['#2d8a2e','#258a26','#349a34','#2b7a2b'],
  grassDark: ['#1e6b1f','#1a5e1a'],
  road:      '#5a5a52',
  roadMark:  '#c8c8a0',
  roadEdge:  '#4a4a42',
  sidewalk:  '#a8a498',
  brickRed:  ['#b03030','#a02828','#c03838'],
  brickDark: '#701818',
  wallNeutral:['#8b8177','#968a7d','#7d756d','#a49788'],
  wallCool:  ['#7b8793','#6f7a86','#9099a4','#5e6873'],
  wallWarm:  ['#9f7663','#ad816d','#8d6757','#b98d77'],
  roofGrey:  ['#888880','#787870'],
  roofTan:   ['#b0a890','#a09880'],
  window:    ['#c8d8e8','#fffff0','#e8e0d0'],
  windowDark:'#384048',
  door:      '#3a2a1a',
  tree:      ['#1e6b1f','#2d8a2e','#1a5e1a','#349a34'],
  treeTrunk: '#5a3a1a',
  water:     ['#2870a8','#2060a0','#3080b0'],
  park:      '#40a840',
  parking:   '#686860',
  parkLine:  '#c8c8a0',
  car:       ['#c03030','#3050b0','#c0b030','#e0e0d0','#30a050','#a03080','#e08020'],
  person:    ['#e8c8a8','#c8a888','#a08060','#604830'],
  shirt:     ['#e03030','#3060c0','#30a060','#c0c020','#c06020','#8030a0','#e0e0e0','#303030'],
  bankSign:  '#c0a020',
  neon:      '#ff4060',
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let W = 0, H = 0; // canvas device pixels
const cam = { x: PX_W / 2, y: PX_H / 2, zoom: 2, minZoom: 0.5, maxZoom: 8 };
const drag = { active: false, startX: 0, startY: 0, camStartX: 0, camStartY: 0 };
const pinch = { active: false, startZoom: 0 };
const trackpadZoom = { velocity: 0, x: 0, y: 0, active: false };

let map = [];        // 2D tile array [y][x]
let buildings = [];   // { x, y, w, h, type, color, roofColor, hasSign, signText, floors, ... }
let cars = [];        // { x, y, dir, speed, color, waiting, destX, destY }
let people = [];      // { x, y, dx, dy, skin, shirt, state }
let trees = [];       // { x, y, size, color, hasbird }
let birds = [];       // { x, y, dx, dy, fromTree, settling, targetX, targetY }
let effects = [];     // { x, y, type, age, maxAge, ... }
let trafficLights = []; // { x, y, state:'red'|'green', timer }

let stats = { pop: 0, buildings: 0, cars: 0, trees: 0, happy: 50 };
let worldTime = 0;
let lastTime = 0;
let hoveredTile = null;
let cursorWorld = { x: 0, y: 0 };
let toastTimer = null;
let pedestrianTiles = [];
let parkTiles = [];
let nextPersonId = 1;
const CIVIC_BUILDING_SPECS = {
  hospital: {
    type: 'hospital',
    signText: 'HOSP',
    color: '#d8dde6',
    roofColor: '#f4f7fb',
    preferredTypes: ['office', 'bank', 'brick']
  },
  policeStation: {
    type: 'police-station',
    signText: 'POLICE',
    color: '#6d7f93',
    roofColor: '#c7d7e7',
    preferredTypes: ['office', 'brick', 'bank']
  },
  fireStation: {
    type: 'fire-station',
    signText: 'FIRE',
    color: '#b94a3a',
    roofColor: '#f0cdc4',
    preferredTypes: ['brick', 'shop', 'office']
  }
};
const BUILDING_STYLE_PRESETS = {
  brick: { wallPalette: PAL.brickRed, roofPalette: PAL.roofGrey, roofRatio: [0.38, 0.48], signChance: 0.18, brandMode: 'civic-block', rooftopDensity: 1.15 },
  office: { wallPalette: PAL.wallCool, roofPalette: PAL.roofGrey, roofRatio: [0.42, 0.52], signChance: 0.32, brandMode: 'tower', rooftopDensity: 1.45 },
  shop: { wallPalette: PAL.wallWarm, roofPalette: PAL.roofTan, roofRatio: [0.34, 0.42], signChance: 1, brandMode: 'retail', rooftopDensity: 0.9 },
  bank: { wallPalette: ['#a89878', '#9c8e73', '#b2a184'], roofPalette: PAL.roofGrey, roofRatio: [0.4, 0.48], signChance: 1, brandMode: 'bank', rooftopDensity: 1.1 },
  house: { wallPalette: ['#b98d77', '#c79c84', '#a97d68', '#8f6d5c'], roofPalette: ['#8b8276', '#7c756b', '#9a8f80'], roofRatio: [0.3, 0.38], signChance: 0, brandMode: 'residential', rooftopDensity: 0.45 },
  hospital: { wallPalette: ['#d8dde6'], roofPalette: ['#f4f7fb'], roofRatio: [0.42, 0.5], signChance: 1, brandMode: 'hospital', rooftopDensity: 1.35 },
  'police-station': { wallPalette: ['#6d7f93'], roofPalette: ['#c7d7e7'], roofRatio: [0.4, 0.48], signChance: 1, brandMode: 'police', rooftopDensity: 1.2 },
  'fire-station': { wallPalette: ['#b94a3a'], roofPalette: ['#f0cdc4'], roofRatio: [0.38, 0.44], signChance: 1, brandMode: 'fire', rooftopDensity: 1.1 },
};
const civicBuildings = { hospital: null, policeStation: null, fireStation: null };
const ACTION_CAM_SLOTS = [
  { id: 'police', label: 'Cam: Chase' },
  { id: 'medical', label: 'Cam: Ambulance' },
  { id: 'fire', label: 'Cam: Fire' },
  { id: 'rally', label: 'Cam: Rally' },
  { id: 'gathering', label: 'Cam: Gathering' },
];
const actionCam = { incidentId: null, uiKey: '', buttons: new Map() };
const cadenceIntervals = {
  carSpawn: 300 / 60,
  personSpawn: 500 / 60,
  serviceFleet: 180 / 60,
  stats: 60 / 60,
};
const cadence = { ...cadenceIntervals };
let civicRally = { active: false, phase: 'idle', x: 0, y: 0, phaseTimer: 0, noteTimer: 0, recruitTimer: 0, performanceTimer: 0, cooldown: 700 / 60 };
let streetGathering = { active: false, phase: 'idle', x: 0, y: 0, hostId: null, phaseTimer: 0, effectTimer: 0, recruitTimer: 0, mainTimer: 0, cooldown: 0 };
let emergencies = {
  police: null,
  medical: null,
  fire: null,
  policeCooldown: 900 / 60,
  medicalCooldown: 1200 / 60,
  fireCooldown: 1500 / 60,
};
const audioState = {
  ctx: null,
  master: null,
  emitters: new Set(),
  volume: 0.65,
  lastAudibleVolume: 0.65,
  muted: false,
  unlocked: false,
  noiseBuffer: null,
  chatterCooldown: 0,
};

// ═══════════════════════════════════════════════════════
// SEEDED RANDOM
// ═══════════════════════════════════════════════════════
let seed = Date.now() % 100000;
function rng() {
  seed = (seed * 16807 + 0) % 2147483647;
  return (seed - 1) / 2147483646;
}
function rngInt(min, max) { return Math.floor(rng() * (max - min + 1)) + min; }
  assignCivicBuildings();
function pick(arr) { return arr[rngInt(0, arr.length - 1)]; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
const LEGACY_FPS = 60;
const LEGACY_FRAME_MS = 1000 / LEGACY_FPS;
function framesToSeconds(frames) { return frames / LEGACY_FPS; }
function randomDuration(minFrames, maxFrames) { return framesToSeconds(rngInt(minFrames, maxFrames)); }
function legacySpeed(unitsPerFrame) { return unitsPerFrame * LEGACY_FPS; }
function legacyChance(probPerFrame, dtSec) {
  return rng() < 1 - Math.pow(1 - probPerFrame, dtSec * LEGACY_FPS);
}
function legacyBlend(frameFactor, dtSec) {
  return 1 - Math.pow(1 - frameFactor, dtSec * LEGACY_FPS);
}
function getEffectMaxAge(effect) {
  if (!Number.isFinite(effect.maxAgeSec)) effect.maxAgeSec = framesToSeconds(effect.maxAge ?? 60);
  return effect.maxAgeSec;
}

function loadAudioPreferences() {
  const savedVolume = Number(localStorage.getItem('microcity-audio-volume'));
  const savedMuted = localStorage.getItem('microcity-audio-muted');
  if (Number.isFinite(savedVolume)) {
    audioState.volume = Math.max(0, Math.min(1, savedVolume));
    if (audioState.volume > 0) audioState.lastAudibleVolume = audioState.volume;
  }
  if (savedMuted !== null) {
    audioState.muted = savedMuted === '1';
  }
}

function syncAudioControls() {
  const slider = document.getElementById('volume-range');
  const button = document.getElementById('mute-btn');
  const icon = document.getElementById('mute-icon');
  const effectivelyMuted = audioState.muted || audioState.volume <= 0.0001;
  slider.value = String(Math.round(audioState.volume * 100));
  button.setAttribute('aria-pressed', effectivelyMuted ? 'true' : 'false');
  button.setAttribute('aria-label', effectivelyMuted ? 'Unmute sound' : 'Mute sound');
  icon.innerHTML = effectivelyMuted
    ? '<path d="M14 4v16l-5-4H5V8h4l5-4zm3.1 4.5 1.4-1.4 6.3 6.3-1.4 1.4-6.3-6.3zm6.3 0 1.4 1.4-6.3 6.3-1.4-1.4 6.3-6.3z"/>'
    : '<path d="M14 4v16l-5-4H5V8h4l5-4zm4.5 2.2c1.7 1.4 2.8 3.5 2.8 5.8s-1.1 4.4-2.8 5.8l-1.2-1.5c1.4-1.1 2.2-2.7 2.2-4.3s-.8-3.2-2.2-4.3l1.2-1.5zm-2.7 2.6c1 .8 1.6 2 1.6 3.2s-.6 2.4-1.6 3.2l-1.2-1.5c.6-.4.9-1 .9-1.7s-.3-1.3-.9-1.7l1.2-1.5z"/>';
}

function initAudioContext() {
  if (audioState.ctx) return audioState.ctx;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return null;
  const ctx = new AudioCtx();
  const master = ctx.createGain();
  master.gain.value = audioState.muted ? 0 : audioState.volume;
  master.connect(ctx.destination);
  audioState.ctx = ctx;
  audioState.master = master;
  audioState.noiseBuffer = createNoiseBuffer(ctx);
  return ctx;
}

function unlockAudio() {
  const ctx = initAudioContext();
  if (!ctx) return;
  audioState.unlocked = true;
  if (ctx.state === 'suspended') ctx.resume();
}

function createNoiseBuffer(ctx) {
  const buffer = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / data.length * 0.15);
  }
  return buffer;
}

function setAudioVolume(value, persist = true) {
  audioState.volume = Math.max(0, Math.min(1, value));
  if (audioState.volume > 0) audioState.lastAudibleVolume = audioState.volume;
  if (audioState.master) {
    audioState.master.gain.setTargetAtTime(audioState.muted ? 0 : audioState.volume, audioState.ctx.currentTime, 0.03);
  }
  if (persist) localStorage.setItem('microcity-audio-volume', String(audioState.volume));
  syncAudioControls();
}

function setMuted(muted, persist = true) {
  audioState.muted = muted;
  if (audioState.master) {
    audioState.master.gain.setTargetAtTime(muted ? 0 : audioState.volume, audioState.ctx.currentTime, 0.03);
  }
  if (persist) localStorage.setItem('microcity-audio-muted', muted ? '1' : '0');
  syncAudioControls();
}

function getListenerAltitude() {
  return 260 / Math.max(0.35, cam.zoom);
}

function getSoundGainAt(x, y, baseVolume = 0.2, falloff = 240) {
  if (!audioState.ctx || !audioState.unlocked || audioState.muted) return 0;
  const dx = x - cam.x;
  const dy = y - cam.y;
  const altitude = getListenerAltitude();
  const falloffSq = falloff * falloff;
  const distSq = dx * dx + dy * dy + altitude * altitude;
  return Math.max(0, Math.min(1, audioState.volume * baseVolume * (falloffSq / (falloffSq + distSq))));
}

function registerAudioEmitter(emitter) {
  audioState.emitters.add(emitter);
  return emitter;
}

function removeAudioEmitter(emitter) {
  if (!audioState.emitters.has(emitter)) return;
  audioState.emitters.delete(emitter);
  emitter.stop?.();
}

function updateAudioEmitters() {
  if (!audioState.ctx || !audioState.unlocked) return;
  for (const emitter of [...audioState.emitters]) {
    if (emitter.dead) {
      removeAudioEmitter(emitter);
      continue;
    }
    emitter.update?.();
  }
}

function playToneAt(x, y, { frequency = 440, endFrequency = frequency, type = 'square', duration = 0.12, baseVolume = 0.15, falloff = 220 } = {}) {
  const ctx = initAudioContext();
  if (!ctx || !audioState.unlocked) return;
  const gainValue = getSoundGainAt(x, y, baseVolume, falloff);
  if (gainValue <= 0.0005) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(endFrequency, ctx.currentTime + duration);
  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(gainValue, ctx.currentTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  osc.connect(gain).connect(audioState.master);
  osc.start();
  osc.stop(ctx.currentTime + duration + 0.02);
}

function playNoiseAt(x, y, { duration = 0.18, baseVolume = 0.12, falloff = 200, filterFrequency = 1600 } = {}) {
  const ctx = initAudioContext();
  if (!ctx || !audioState.unlocked || !audioState.noiseBuffer) return;
  const gainValue = getSoundGainAt(x, y, baseVolume, falloff);
  if (gainValue <= 0.0005) return;
  const source = ctx.createBufferSource();
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();
  source.buffer = audioState.noiseBuffer;
  filter.type = 'bandpass';
  filter.frequency.value = filterFrequency;
  filter.Q.value = 0.8;
  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(gainValue, ctx.currentTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  source.connect(filter).connect(gain).connect(audioState.master);
  source.start();
  source.stop(ctx.currentTime + duration + 0.03);
}

function playChatterAt(x, y, intensity = 1) {
  playToneAt(x, y, { frequency: 180 + rng() * 140, endFrequency: 150 + rng() * 70, type: 'triangle', duration: 0.08 + rng() * 0.06, baseVolume: 0.03 + intensity * 0.015, falloff: 180 });
  if (rng() < 0.45) playNoiseAt(x, y, { duration: 0.07, baseVolume: 0.02 + intensity * 0.01, filterFrequency: 1000 + rng() * 800, falloff: 180 });
}

function playHonkAt(x, y) {
  const ctx = initAudioContext();
  if (!ctx || !audioState.unlocked) return;
  const gainValue = getSoundGainAt(x, y, 0.18, 280);
  if (gainValue <= 0.0005) return;

  const now = ctx.currentTime;
  const pressDuration = 0.16 + rng() * 0.28;
  const releaseDuration = 0.08 + rng() * 0.08;
  const totalDuration = pressDuration + releaseDuration;
  const masterGain = ctx.createGain();
  const lowpass = ctx.createBiquadFilter();
  const bandpass = ctx.createBiquadFilter();
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  const voices = [
    { type: 'square', frequency: 392 + rng() * 12, endFrequency: 378 + rng() * 10, gain: 0.68 },
    { type: 'sawtooth', frequency: 494 + rng() * 12, endFrequency: 476 + rng() * 10, gain: 0.26 },
    { type: 'triangle', frequency: 588 + rng() * 10, endFrequency: 570 + rng() * 8, gain: 0.12 },
  ];

  lowpass.type = 'lowpass';
  lowpass.frequency.setValueAtTime(1180, now);
  lowpass.Q.value = 0.8;
  bandpass.type = 'bandpass';
  bandpass.frequency.setValueAtTime(720, now);
  bandpass.Q.value = 0.45;

  masterGain.gain.setValueAtTime(0.0001, now);
  masterGain.gain.exponentialRampToValueAtTime(gainValue, now + 0.018);
  masterGain.gain.setTargetAtTime(gainValue * (0.76 + rng() * 0.1), now + 0.04, 0.06);
  masterGain.gain.setValueAtTime(gainValue * (0.62 + rng() * 0.14), now + pressDuration);
  masterGain.gain.exponentialRampToValueAtTime(0.0001, now + totalDuration);

  lfo.type = 'sine';
  lfo.frequency.setValueAtTime(6.5 + rng() * 1.5, now);
  lfoGain.gain.setValueAtTime(24, now);
  lfo.connect(lfoGain).connect(lowpass.frequency);

  lowpass.connect(bandpass).connect(masterGain).connect(audioState.master);
  lfo.start(now);
  lfo.stop(now + totalDuration + 0.04);

  for (const voice of voices) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = voice.type;
    osc.frequency.setValueAtTime(voice.frequency, now);
    osc.frequency.linearRampToValueAtTime(voice.endFrequency, now + pressDuration);
    gain.gain.setValueAtTime(voice.gain, now);
    osc.connect(gain).connect(lowpass);
    osc.start(now);
    osc.stop(now + totalDuration + 0.02);
  }

  if (audioState.noiseBuffer && rng() < 0.65) {
    const noise = ctx.createBufferSource();
    const noiseFilter = ctx.createBiquadFilter();
    const noiseGain = ctx.createGain();
    noise.buffer = audioState.noiseBuffer;
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.setValueAtTime(1400, now);
    noiseFilter.Q.value = 0.8;
    noiseGain.gain.setValueAtTime(0.0001, now);
    noiseGain.gain.exponentialRampToValueAtTime(gainValue * 0.06, now + 0.01);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + Math.min(0.18, pressDuration * 0.55));
    noise.connect(noiseFilter).connect(noiseGain).connect(audioState.master);
    noise.start(now);
    noise.stop(now + Math.min(0.2, pressDuration * 0.6) + 0.02);
  }
}

function playScreechAt(x, y) {
  playNoiseAt(x, y, { duration: 0.22, baseVolume: 0.16, filterFrequency: 2200, falloff: 260 });
}

function playArrestAt(x, y) {
  playToneAt(x, y, { frequency: 820, endFrequency: 420, type: 'square', duration: 0.22, baseVolume: 0.18, falloff: 260 });
}

function playMedicalAt(x, y) {
  playToneAt(x, y, { frequency: 560, endFrequency: 700, type: 'sine', duration: 0.18, baseVolume: 0.12, falloff: 220 });
}

function createSirenEmitter(source, kind = 'police') {
  const ctx = initAudioContext();
  if (!ctx || !audioState.unlocked) return null;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = kind === 'fire' ? 'sawtooth' : 'square';
  gain.gain.value = 0.0001;
  osc.connect(gain).connect(audioState.master);
  osc.start();
  return registerAudioEmitter({
    update() {
      const pos = source();
      if (!pos) { this.dead = true; return; }
      const t = ctx.currentTime;
      const cycle = kind === 'ambulance' ? 0.38 : kind === 'fire' ? 0.55 : 0.42;
      const phase = (t / cycle) % 2;
      const pair = kind === 'ambulance' ? [640, 980] : kind === 'fire' ? [520, 740] : [720, 1040];
      osc.frequency.setTargetAtTime(phase < 1 ? pair[0] : pair[1], t, 0.03);
      gain.gain.setTargetAtTime(getSoundGainAt(pos.x, pos.y, kind === 'fire' ? 0.2 : 0.18, 320), t, 0.05);
    },
    stop() {
      gain.gain.cancelScheduledValues(ctx.currentTime);
      gain.gain.setTargetAtTime(0.0001, ctx.currentTime, 0.03);
      osc.stop(ctx.currentTime + 0.08);
    }
  });
}

function createFireEmitter(source) {
  const ctx = initAudioContext();
  if (!ctx || !audioState.unlocked || !audioState.noiseBuffer) return null;
  const noise = ctx.createBufferSource();
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();
  noise.buffer = audioState.noiseBuffer;
  noise.loop = true;
  filter.type = 'bandpass';
  filter.frequency.value = 900;
  filter.Q.value = 0.6;
  gain.gain.value = 0.0001;
  noise.connect(filter).connect(gain).connect(audioState.master);
  noise.start();
  return registerAudioEmitter({
    update() {
      const pos = source();
      if (!pos) { this.dead = true; return; }
      filter.frequency.setTargetAtTime(700 + Math.sin(ctx.currentTime * 11) * 180, ctx.currentTime, 0.05);
      gain.gain.setTargetAtTime(getSoundGainAt(pos.x, pos.y, 0.16, 300), ctx.currentTime, 0.06);
    },
    stop() {
      gain.gain.cancelScheduledValues(ctx.currentTime);
      gain.gain.setTargetAtTime(0.0001, ctx.currentTime, 0.05);
      noise.stop(ctx.currentTime + 0.1);
    }
  });
}

function updateIncidentBanner() {
  const labels = [];
  if (emergencies.police) labels.push('Police chase');
  if (emergencies.medical) labels.push('Ambulance responding');
  if (emergencies.fire) labels.push('Fire response');
  document.getElementById('incident-text').textContent = labels.join(' • ');
  syncActionCamButtons();
}

function getActiveGatheringTarget() {
  if (streetGathering.active) {
    return { x: streetGathering.x, y: streetGathering.y };
  }
  let best = null;
  for (const anchor of people) {
    if (anchor.state === 'inside' || anchor.gathering) continue;
    let count = 0;
    let hostCount = 0;
    let socialCount = 0;
    let sumX = 0;
    let sumY = 0;
    for (const person of people) {
      if (person.state === 'inside' || person.gathering) continue;
      if (distanceSq(anchor, person) > 34 * 34) continue;
      count++;
      sumX += person.x;
      sumY += person.y;
      if (person.purpose === 'hosting') hostCount++;
      if (person.state === 'chatting' || person.purpose === 'greet-friend' || person.purpose === 'waiting-friend' || person.friend) {
        socialCount++;
      }
    }
    if (count < 3 || (hostCount === 0 && socialCount < 2)) continue;
    if (!best || count > best.count || (count === best.count && socialCount > best.socialCount)) {
      best = { x: sumX / count, y: sumY / count, count, socialCount };
    }
  }
  return best ? { x: best.x, y: best.y } : null;
}

function getIncidentTarget(incidentId) {
  switch (incidentId) {
    case 'police':
      if (!emergencies.police) return null;
      if (emergencies.police.phase === 'dispatch' || emergencies.police.phase === 'chase' || emergencies.police.phase === 'intercept') {
        if (emergencies.police.policeCar) return { x: emergencies.police.policeCar.x, y: emergencies.police.policeCar.y };
      }
      if (emergencies.police.phase === 'officer-approach' || emergencies.police.phase === 'escorting' || emergencies.police.phase === 'boarding') {
        if (emergencies.police.officer && emergencies.police.hijacker) {
          return {
            x: (emergencies.police.officer.x + emergencies.police.hijacker.x) / 2,
            y: (emergencies.police.officer.y + emergencies.police.hijacker.y) / 2,
          };
        }
        if (emergencies.police.officer) return { x: emergencies.police.officer.x, y: emergencies.police.officer.y };
      }
      if (emergencies.police.suspectCar) return { x: emergencies.police.suspectCar.x, y: emergencies.police.suspectCar.y };
      if (emergencies.police.policeCar) return { x: emergencies.police.policeCar.x, y: emergencies.police.policeCar.y };
      return null;
    case 'medical':
      if (!emergencies.medical) return null;
      if (emergencies.medical.ambulance) return { x: emergencies.medical.ambulance.x, y: emergencies.medical.ambulance.y };
      if (emergencies.medical.patient) return { x: emergencies.medical.patient.x, y: emergencies.medical.patient.y };
      return null;
    case 'fire':
      if (!emergencies.fire) return null;
      if (emergencies.fire.phase === 'dispatch' || emergencies.fire.phase === 'arriving') {
        if (emergencies.fire.fireTruck) return { x: emergencies.fire.fireTruck.x, y: emergencies.fire.fireTruck.y };
      }
      if (emergencies.fire.building) {
        return {
          x: emergencies.fire.building.x + emergencies.fire.building.w / 2,
          y: emergencies.fire.building.y + emergencies.fire.building.h / 2,
        };
      }
      if (emergencies.fire.fireTruck) return { x: emergencies.fire.fireTruck.x, y: emergencies.fire.fireTruck.y };
      return null;
    case 'rally':
      if (!civicRally.active) return null;
      return { x: civicRally.x, y: civicRally.y };
    case 'gathering':
      return getActiveGatheringTarget();
    default:
      return null;
  }
}

function getRoadDistanceBetweenTiles(a, b) {
  if (!a || !b) return Infinity;
  return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
}

function getCarRoadTile(car) {
  return getCarAnchorTile(car);
}

function findNearestRoadExact(px, py, maxRadius = 12) {
  const sx = Math.floor(px / TILE);
  const sy = Math.floor(py / TILE);
  let best = null;
  let bestDist = Infinity;
  for (let r = 0; r <= maxRadius; r++) {
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const x = sx + dx;
        const y = sy + dy;
        if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H || !isRoadTile(map[y][x])) continue;
        const center = tileCenter(x, y);
        const dist = (center.x - px) ** 2 + (center.y - py) ** 2;
        if (dist < bestDist) {
          best = { x, y };
          bestDist = dist;
        }
      }
    }
    if (best) return best;
  }
  return null;
}

function getBuildingFacadePoint(building) {
  const door = getDoorPoint(building);
  switch (building.exitSide) {
    case 'top':
      return { x: door.x, y: building.y - 10 };
    case 'left':
      return { x: building.x - 10, y: door.y };
    case 'right':
      return { x: building.x + building.w + 10, y: door.y };
    default:
      return { x: door.x, y: building.y + building.h + 10 };
  }
}

function getBuildingSceneRoadTile(building) {
  if (!building.sceneRoad || !isRoadTile(map[building.sceneRoad.y]?.[building.sceneRoad.x])) {
    const samples = [
      getBuildingFacadePoint(building),
      getDoorPoint(building),
      { x: building.x + building.w / 2, y: building.y + building.h / 2 },
    ];
    let bestRoad = null;
    let bestDist = Infinity;
    for (const sample of samples) {
      const road = findNearestRoadExact(sample.x, sample.y, 12);
      if (!road) continue;
      const center = tileCenter(road.x, road.y);
      const dist = (center.x - sample.x) ** 2 + (center.y - sample.y) ** 2;
      if (dist < bestDist) {
        bestRoad = road;
        bestDist = dist;
      }
    }
    building.sceneRoad = bestRoad;
  }
  return building.sceneRoad;
}

function getBuildingServiceStagePoint(building) {
  const road = getBuildingSceneRoadTile(building);
  return road ? tileCenter(road.x, road.y) : { x: building.x + building.w / 2, y: building.y + building.h / 2 };
}

function getBuildingFireStagePoint(building) {
  return getBuildingServiceStagePoint(building);
}

function getBuildingFireApproachPoint(building) {
  const stagePoint = getBuildingFireStagePoint(building);
  const roadTiles = getRoadTilesNearPoint(stagePoint, 14).filter(tile => tile.distance >= 46 * 46 && tile.distance <= 130 * 130);
  if (!roadTiles.length) return stagePoint;
  const sample = roadTiles[Math.min(roadTiles.length - 1, Math.max(0, Math.floor(roadTiles.length / 2) + rngInt(-2, 2)))];
  return tileCenter(sample.x, sample.y);
}

function getCivicBuildingForVehicleType(vehicleType) {
  switch (vehicleType) {
    case 'ambulance':
      return civicBuildings.hospital;
    case 'police':
      return civicBuildings.policeStation;
    case 'fire':
      return civicBuildings.fireStation;
    default:
      return null;
  }
}

function getRoadTilesNearPoint(point, maxRadius = 10) {
  const origin = worldToTile(point.x, point.y);
  const seen = new Set();
  const tiles = [];
  for (let r = 0; r <= maxRadius; r++) {
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const tx = origin.x + dx;
        const ty = origin.y + dy;
        const key = `${tx},${ty}`;
        if (seen.has(key) || tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) continue;
        seen.add(key);
        if (!isRoadTile(map[ty][tx])) continue;
        tiles.push({ x: tx, y: ty, distance: (tileCenter(tx, ty).x - point.x) ** 2 + (tileCenter(tx, ty).y - point.y) ** 2 });
      }
    }
  }
  tiles.sort((a, b) => a.distance - b.distance);
  return tiles;
}

function pickRoadPatrolTarget(car, minRoadDistance = 18) {
  const anchor = getCarRoadTile(car) || findRoadSpawn();
  if (!anchor) return null;

  let best = null;
  let bestScore = -Infinity;
  for (let attempt = 0; attempt < 24; attempt++) {
    const candidate = findRoadSpawn();
    if (!candidate) continue;
    const roadDistance = getRoadDistanceBetweenTiles(anchor, candidate);
    if (roadDistance < minRoadDistance) continue;
    const score = roadDistance + rng() * 8;
    if (score > bestScore) {
      best = candidate;
      bestScore = score;
    }
  }

  if (!best) best = findRoadSpawn();
  return best ? tileCenter(best.x, best.y) : null;
}

function assignFirePatrolTarget(car, minRoadDistance = 18) {
  if (!car || car.vehicleType !== 'fire' || car.incidentId) return false;
  const point = pickRoadPatrolTarget(car, minRoadDistance);
  if (!point) return false;
  car.mode = 'patrol';
  car.targetPoint = point;
  car.eventTimer = randomDuration(900, 1800);
  car.stopped = false;
  car.stopReason = null;
  clearCarWaypoints(car);
  clearCarRoute(car);
  return true;
}

function findRoadSpawnNearBuilding(building, preferredIndex = 0) {
  if (!building) return null;
  const tiles = getRoadTilesNearPoint(getBuildingServiceStagePoint(building), 10);
  if (!tiles.length) return getBuildingSceneRoadTile(building);
  return tiles[Math.min(preferredIndex, tiles.length - 1)];
}

function getEmergencyVehicleSpawn(type) {
  const building = getCivicBuildingForVehicleType(type);
  return building ? findRoadSpawnNearBuilding(building, countVehiclesByType(type)) || findRoadSpawn() : findRoadSpawn();
}

function getServiceReturnPoint(vehicleType) {
  const building = getCivicBuildingForVehicleType(vehicleType);
  return building ? getBuildingServiceStagePoint(building) : null;
}

function sendVehicleToServiceBase(vehicle) {
  if (!vehicle) return false;
  const point = getServiceReturnPoint(vehicle.vehicleType);
  if (!point) return false;
  vehicle.mode = 'service-return';
  vehicle.targetPoint = point;
  vehicle.stopped = false;
  vehicle.stopReason = null;
  clearCarWaypoints(vehicle);
  clearCarRoute(vehicle);
  return true;
}

function stopBuildingFire(building) {
  if (!building) return;
  building.onFire = false;
  if (building.fireEmitter) {
    removeAudioEmitter(building.fireEmitter);
    building.fireEmitter = null;
  }
}

function pickReachableCandidate(vehicle, candidates, getTile, maxDistanceTiles) {
  const origin = getCarRoadTile(vehicle);
  if (!origin) return null;
  let best = null;
  let bestDistance = Infinity;
  for (const candidate of candidates) {
    const tile = getTile(candidate);
    const distance = getRoadDistanceBetweenTiles(origin, tile);
    if (distance > maxDistanceTiles || distance >= bestDistance) continue;
    best = candidate;
    bestDistance = distance;
  }
  return best;
}

function getActionCamIncidents() {
  const incidents = [];
  if (emergencies.police) incidents.push({ id: 'police', label: 'Cam: Chase' });
  if (emergencies.medical) incidents.push({ id: 'medical', label: 'Cam: Ambulance' });
  if (emergencies.fire) incidents.push({ id: 'fire', label: 'Cam: Fire' });
  if (civicRally.active) incidents.push({ id: 'rally', label: 'Cam: Rally' });
  if (getActiveGatheringTarget()) incidents.push({ id: 'gathering', label: 'Cam: Gathering' });
  return incidents;
}

function clearActionCam() {
  if (!actionCam.incidentId) return;
  actionCam.incidentId = null;
  syncActionCamButtons();
}

function setActionCam(incidentId) {
  const activeIds = new Set(getActionCamIncidents().map(incident => incident.id));
  if (incidentId && !activeIds.has(incidentId)) return;
  actionCam.incidentId = actionCam.incidentId === incidentId ? null : incidentId;
  const target = actionCam.incidentId ? getIncidentTarget(actionCam.incidentId) : null;
  if (target) {
    cam.x = target.x;
    cam.y = target.y;
    clampCam();
  }
  syncActionCamButtons();
}

function syncActionCamButtons() {
  const panel = document.getElementById('action-cam-panel');
  const incidents = getActionCamIncidents();
  const activeIds = new Set(incidents.map(incident => incident.id));
  if (actionCam.incidentId && !activeIds.has(actionCam.incidentId)) {
    actionCam.incidentId = null;
  }
  if (!panel.dataset.initialized) {
    panel.textContent = '';
    actionCam.buttons.clear();
    for (const slot of ACTION_CAM_SLOTS) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'action-cam-btn';
      button.textContent = slot.label;
      button.dataset.incidentId = slot.id;
      button.setAttribute('aria-pressed', 'false');
      button.disabled = true;
      button.addEventListener('click', () => setActionCam(slot.id));
      panel.appendChild(button);
      actionCam.buttons.set(slot.id, button);
    }
    panel.dataset.initialized = 'true';
  }
  const nextKey = `${ACTION_CAM_SLOTS.map(slot => `${slot.id}:${activeIds.has(slot.id) ? 1 : 0}`).join(',')}|${actionCam.incidentId || ''}`;
  if (actionCam.uiKey === nextKey) return;
  actionCam.uiKey = nextKey;
  for (const slot of ACTION_CAM_SLOTS) {
    const button = actionCam.buttons.get(slot.id);
    if (!button) continue;
    const enabled = activeIds.has(slot.id);
    button.disabled = !enabled;
    button.className = `action-cam-btn${actionCam.incidentId === slot.id ? ' active' : ''}`;
    button.setAttribute('aria-pressed', actionCam.incidentId === slot.id ? 'true' : 'false');
  }
}

// ═══════════════════════════════════════════════════════
// MAP GENERATION
// ═══════════════════════════════════════════════════════
function generateMap() {
  map = Array.from({ length: MAP_H }, () => new Uint8Array(MAP_W).fill(T.GRASS));

  // Lay road grid — varying block sizes for organic feel
  const roadCols = [];
  const roadRows = [];
  let cx = 4 + rngInt(0, 3);
  while (cx < MAP_W - 4) {
    const w = rngInt(0, 1) ? 2 : 2; // 2-wide roads
    for (let i = 0; i < w && cx + i < MAP_W; i++) roadCols.push(cx + i);
    cx += w + rngInt(8, 16);
  }
  let cy = 4 + rngInt(0, 3);
  while (cy < MAP_H - 4) {
    const h = rngInt(0, 1) ? 2 : 2;
    for (let i = 0; i < h && cy + i < MAP_H; i++) roadRows.push(cy + i);
    cy += h + rngInt(8, 16);
  }

  // Paint roads
  for (const c of roadCols) {
    for (let y = 0; y < MAP_H; y++) map[y][c] = T.ROAD_V;
  }
  for (const r of roadRows) {
    for (let x = 0; x < MAP_W; x++) {
      if (map[r][x] === T.ROAD_V) map[r][x] = T.ROAD_X;
      else map[r][x] = T.ROAD_H;
    }
  }

  // Sidewalks along roads
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (map[y][x] >= T.ROAD_H && map[y][x] <= T.ROAD_X) continue;
      let adjRoad = false;
      for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
          const t = map[ny][nx];
          if (t >= T.ROAD_H && t <= T.ROAD_X) { adjRoad = true; break; }
        }
      }
      if (adjRoad) map[y][x] = T.SIDEWALK;
    }
  }

  // Traffic lights at intersections
  for (let y = 2; y < MAP_H - 2; y++) {
    for (let x = 2; x < MAP_W - 2; x++) {
      if (map[y][x] === T.ROAD_X) {
        // Place traffic light near intersection
        if (rng() < 0.3) {
          trafficLights.push({ x: x * TILE + 8, y: y * TILE + 8, state: rng() < 0.5 ? 'red' : 'green', timer: randomDuration(120, 300) });
        }
      }
    }
  }

  // Place buildings in blocks
  placeBuildings(roadCols, roadRows);

  // Scatter trees on remaining grass
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (map[y][x] === T.GRASS && rng() < 0.06) {
        trees.push({ x: x * TILE + rngInt(2, 12), y: y * TILE + rngInt(2, 12), size: rngInt(4, 7), color: pick(PAL.tree), hasbird: rng() < 0.15 });
        map[y][x] = T.TREE;
      }
    }
  }

  // Water features (small ponds)
  for (let i = 0; i < rngInt(2, 5); i++) {
    const wx = rngInt(10, MAP_W - 10);
    const wy = rngInt(10, MAP_H - 10);
    const wr = rngInt(2, 4);
    for (let dy = -wr; dy <= wr; dy++) {
      for (let dx = -wr; dx <= wr; dx++) {
        if (dx * dx + dy * dy <= wr * wr) {
          const mx = wx + dx, my = wy + dy;
          if (mx >= 0 && mx < MAP_W && my >= 0 && my < MAP_H && map[my][mx] === T.GRASS) {
            map[my][mx] = T.WATER;
          }
        }
      }
    }
  }

  // Parks
  for (let i = 0; i < rngInt(3, 6); i++) {
    const px = rngInt(5, MAP_W - 8);
    const py = rngInt(5, MAP_H - 8);
    const pw = rngInt(3, 5);
    const ph = rngInt(3, 5);
    for (let dy = 0; dy < ph; dy++) {
      for (let dx = 0; dx < pw; dx++) {
        const mx = px + dx, my = py + dy;
        if (mx < MAP_W && my < MAP_H && (map[my][mx] === T.GRASS || map[my][mx] === T.TREE)) {
          map[my][mx] = T.PARK;
        }
      }
    }
  }

  refreshDestinationTiles();

  // Spawn cars on roads
  spawnInitialCars();

  // Spawn people on sidewalks
  spawnInitialPeople();

  updateStats();
}

function generateBuildingBrandName(mode) {
  if (mode === 'bank') return 'BANK';
  if (mode === 'hospital') return 'HOSP';
  if (mode === 'police') return 'POLICE';
  if (mode === 'fire') return 'FIRE';
  if (mode === 'retail') return pick(['BODEGA', 'METRO', 'CAFE', 'MARKET', 'VIDEO', 'DINER', 'CORNER']);
  if (mode === 'residential') return '';

  const prefixes = mode === 'tower'
    ? ['METRO', 'CIVIC', 'UNION', 'NOVA', 'SKY', 'GRAND']
    : ['EAST', 'WEST', 'CITY', 'RIVER', 'PARK', 'SUN'];
  const suffixes = mode === 'tower'
    ? ['GROUP', 'WORKS', 'PLAZA', 'POINT', 'LABS', 'CENTER']
    : ['BLOCK', 'MART', 'DEPOT', 'HOUSE', 'PLACE', 'HALL'];
  return `${pick(prefixes)} ${pick(suffixes)}`;
}

function generateRoofFeatures(building, roofHeight, density) {
  const usableWidth = Math.max(8, building.w - 8);
  const usableHeight = Math.max(4, roofHeight - 5);
  const featureCount = Math.max(1, Math.min(4, Math.round((building.tw * building.th) / 4 * density)));
  const features = [];
  for (let i = 0; i < featureCount; i++) {
    const kind = pick(['vent', 'ac', 'duct']);
    const width = kind === 'duct' ? rngInt(6, Math.max(6, Math.min(usableWidth - 2, 10))) : rngInt(4, 6);
    const height = kind === 'ac' ? rngInt(3, 4) : rngInt(2, 3);
    const x = building.x + 3 + rngInt(0, Math.max(0, usableWidth - width));
    const y = building.y + 2 + rngInt(0, Math.max(0, usableHeight - height));
    features.push({ kind, x, y, w: width, h: height, tone: rngInt(-12, 12) });
  }
  return features;
}

function applyBuildingVisualStyle(building, overrides = {}) {
  const resolvedType = overrides.type || building.type;
  const preset = BUILDING_STYLE_PRESETS[resolvedType] || BUILDING_STYLE_PRESETS.brick;
  const wallColor = overrides.color || pick(preset.wallPalette);
  const roofColor = overrides.roofColor || pick(preset.roofPalette);
  const roofMin = preset.roofRatio[0];
  const roofMax = preset.roofRatio[1];
  const roofHeight = clamp(Math.round(building.h * (roofMin + rng() * (roofMax - roofMin))), 6, Math.max(6, building.h - 8));
  const faceHeight = Math.max(8, building.h - roofHeight);
  const floors = overrides.floors ?? Math.max(1, Math.min(4, Math.round(faceHeight / 8)));
  const windowRows = overrides.windowRows ?? Math.max(1, Math.min(4, floors));
  const windowCols = overrides.windowCols ?? Math.max(1, Math.floor((building.w - 8) / 7));
  const hasSign = overrides.forceSign ?? (overrides.signText ? true : rng() < preset.signChance);
  const signText = hasSign ? (overrides.signText || generateBuildingBrandName(preset.brandMode)) : '';

  building.type = resolvedType;
  building.color = wallColor;
  building.roofColor = roofColor;
  building.floors = floors;
  building.hasSign = !!signText;
  building.signText = signText;
  building.windowRows = windowRows;
  building.windowCols = windowCols;
  building.roomOccupied = Array.from({ length: windowRows * windowCols }, () => rng() < 0.6);
  building.roomTint = Array.from({ length: windowRows * windowCols }, () => rngInt(0, PAL.window.length - 1));
  building.roomTimer = building.roomTimer || randomDuration(80, 220);
  building.visualStyle = {
    wallColor,
    wallShadow: darkenColor(wallColor, 22),
    wallHighlight: lightenColor(wallColor, 20),
    roofColor,
    roofShade: darkenColor(roofColor, 18),
    roofHighlight: lightenColor(roofColor, 16),
    sillColor: darkenColor(wallColor, 28),
    frameColor: darkenColor(wallColor, 38),
    signPanel: resolvedType === 'bank'
      ? PAL.bankSign
      : resolvedType === 'hospital'
        ? '#eef7ff'
        : resolvedType === 'police-station'
          ? '#c7dbef'
          : resolvedType === 'fire-station'
            ? '#ffd8cc'
            : '#e0ddd4',
    signBorder: darkenColor(resolvedType === 'bank' ? PAL.bankSign : wallColor, 26),
    roofHeight,
    roofFeatures: generateRoofFeatures(building, roofHeight, preset.rooftopDensity),
  };
}

function placeBuildings(roadCols, roadRows) {

  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (map[y][x] !== T.GRASS) continue;

      let bw = rngInt(2, 5);
      let bh = rngInt(2, 4);

      if (bw >= 2 && bh >= 2 && canPlaceBuildingLot(x, y, bw, bh)) {
        carveBuildingWalkways(x, y, bw, bh);
        const exits = findExitSides(x, y, bw, bh);
        if (exits.length === 0) continue;

        const type = pick(['brick', 'office', 'shop', 'bank', 'house']);
        const building = {
          x: x * TILE, y: y * TILE,
          w: bw * TILE, h: bh * TILE,
          tw: bw, th: bh,
          type,
          exitSide: pick(exits),
          roomTimer: randomDuration(80, 220),
          active: false, glowing: false, glowTimer: 0
        };
        applyBuildingVisualStyle(building);
        buildings.push(building);

        for (let dy = 0; dy < bh; dy++) {
          for (let dx = 0; dx < bw; dx++) {
            map[y + dy][x + dx] = T.BUILDING;
          }
        }
      }
    }
  }
}

function scoreCivicBuildingCandidate(building, preferredTypes) {
  let score = building.tw * building.th * 14 + (building.floors || 1) * 4;
  if (preferredTypes.includes(building.type)) score += 24;
  if (building.hasSign) score += 4;
  if (getBuildingSceneRoadTile(building)) score += 18;
  return score;
}

function applyCivicBuildingSpec(building, civicKey, spec) {
  if (!building) return;
  building.originalType = building.originalType || building.type;
  building.civicKey = civicKey;
  applyBuildingVisualStyle(building, { type: spec.type, color: spec.color, roofColor: spec.roofColor, signText: spec.signText, forceSign: true });
  building.sceneRoad = null;
  civicBuildings[civicKey] = building;
}

function assignCivicBuildings() {
  civicBuildings.hospital = null;
  civicBuildings.policeStation = null;
  civicBuildings.fireStation = null;

  const candidates = buildings.filter(building => building.tw >= 3 && building.th >= 2);
  const used = new Set();

  for (const [civicKey, spec] of Object.entries(CIVIC_BUILDING_SPECS)) {
    const best = candidates
      .filter(building => !used.has(building))
      .sort((a, b) => scoreCivicBuildingCandidate(b, spec.preferredTypes) - scoreCivicBuildingCandidate(a, spec.preferredTypes))[0];
    if (!best) continue;
    used.add(best);
    applyCivicBuildingSpec(best, civicKey, spec);
  }
}

function canPlaceBuildingLot(tx, ty, tw, th) {
  if (tx <= 0 || ty <= 0 || tx + tw >= MAP_W - 1 || ty + th >= MAP_H - 1) return false;

  let connectedToNetwork = false;
  for (let y = ty - 1; y <= ty + th; y++) {
    for (let x = tx - 1; x <= tx + tw; x++) {
      const inside = x >= tx && x < tx + tw && y >= ty && y < ty + th;
      const tile = map[y][x];
      if (inside) {
        if (tile !== T.GRASS) return false;
        continue;
      }
      if (tile !== T.GRASS && tile !== T.SIDEWALK) return false;
      if (tile === T.SIDEWALK) connectedToNetwork = true;
    }
  }

  return connectedToNetwork;
}

function carveBuildingWalkways(tx, ty, tw, th) {
  for (let y = ty - 1; y <= ty + th; y++) {
    for (let x = tx - 1; x <= tx + tw; x++) {
      const inside = x >= tx && x < tx + tw && y >= ty && y < ty + th;
      if (!inside && map[y][x] === T.GRASS) {
        map[y][x] = T.SIDEWALK;
      }
    }
  }
}

// Check which sides of a building footprint (in tile coords) have walkable neighbours
function findExitSides(tx, ty, tw, th) {
  const walkable = t => t === T.SIDEWALK || t === T.GRASS || t === T.PARK;
  const sides = [];
  // bottom
  if (ty + th < MAP_H) {
    for (let dx = 0; dx < tw; dx++) { if (walkable(map[ty + th][tx + dx])) { sides.push('bottom'); break; } }
  }
  // top
  if (ty > 0) {
    for (let dx = 0; dx < tw; dx++) { if (walkable(map[ty - 1][tx + dx])) { sides.push('top'); break; } }
  }
  // right
  if (tx + tw < MAP_W) {
    for (let dy = 0; dy < th; dy++) { if (walkable(map[ty + dy][tx + tw])) { sides.push('right'); break; } }
  }
  // left
  if (tx > 0) {
    for (let dy = 0; dy < th; dy++) { if (walkable(map[ty + dy][tx - 1])) { sides.push('left'); break; } }
  }
  return sides;
}

function isWalkableTileForPerson(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
  const tile = map[ty][tx];
  return tile === T.SIDEWALK || tile === T.GRASS || tile === T.PARK ||
         tile === T.ROAD_H || tile === T.ROAD_V || tile === T.ROAD_X;
}

function getDoorRect(b) {
  switch (b.exitSide) {
    case 'top':
      return { x: b.x + Math.floor(b.w / 2) - 2, y: b.y, w: 4, h: 4 };
    case 'left':
      return { x: b.x, y: b.y + Math.floor(b.h / 2) - 2, w: 4, h: 4 };
    case 'right':
      return { x: b.x + b.w - 4, y: b.y + Math.floor(b.h / 2) - 2, w: 4, h: 4 };
    default:
      return { x: b.x + Math.floor(b.w / 2) - 2, y: b.y + b.h - 5, w: 4, h: 5 };
  }
}

function getDoorPoint(b) {
  const rect = getDoorRect(b);
  const cx = rect.x + Math.floor(rect.w / 2);
  const cy = rect.y + Math.floor(rect.h / 2);
  switch (b.exitSide) {
    case 'top':
      return { x: cx, y: rect.y - 2 };
    case 'left':
      return { x: rect.x - 2, y: cy };
    case 'right':
      return { x: rect.x + rect.w + 2, y: cy };
    default:
      return { x: cx, y: rect.y + rect.h + 2 };
  }
}

function worldToTile(wx, wy) {
  return {
    x: Math.max(0, Math.min(MAP_W - 1, Math.floor(wx / TILE))),
    y: Math.max(0, Math.min(MAP_H - 1, Math.floor(wy / TILE)))
  };
}

function tileCenter(tx, ty) {
  return { x: tx * TILE + 8, y: ty * TILE + 8 };
}

function findNearbyWalkablePoint(px, py, maxRadius = 5) {
  const origin = worldToTile(px, py);
  let best = null;
  let bestDist = Infinity;
  for (let r = 0; r <= maxRadius; r++) {
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const tx = origin.x + dx;
        const ty = origin.y + dy;
        if (!isWalkableTileForPerson(tx, ty)) continue;
        const point = tileCenter(tx, ty);
        const dist = (point.x - px) ** 2 + (point.y - py) ** 2;
        if (dist < bestDist) {
          best = point;
          bestDist = dist;
        }
      }
    }
    if (best) return best;
  }
  return { x: px, y: py };
}

function findPathTiles(start, goal, maxVisited = MAP_W * MAP_H) {
  if (start.x === goal.x && start.y === goal.y) return [start];

  const q = [start];
  const key = (x, y) => `${x},${y}`;
  const prev = new Map();
  const seen = new Set([key(start.x, start.y)]);
  let qi = 0;
  let visited = 0;

  while (qi < q.length && visited < maxVisited) {
    const cur = q[qi++];
    visited++;
    if (cur.x === goal.x && cur.y === goal.y) break;

    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = cur.x + dx;
      const ny = cur.y + dy;
      const k = key(nx, ny);
      if (seen.has(k)) continue;
      if (!isWalkableTileForPerson(nx, ny)) continue;
      seen.add(k);
      prev.set(k, cur);
      q.push({ x: nx, y: ny });
    }
  }

  const goalKey = key(goal.x, goal.y);
  if (!seen.has(goalKey)) return null;

  const path = [];
  let cur = goal;
  while (cur) {
    path.push(cur);
    if (cur.x === start.x && cur.y === start.y) break;
    cur = prev.get(key(cur.x, cur.y));
  }
  path.reverse();
  return path;
}

function findRoadPathTiles(start, goal, maxVisited = MAP_W * MAP_H) {
  if (!start || !goal) return null;
  if (start.x === goal.x && start.y === goal.y) return [start];

  const q = [start];
  const key = (x, y) => `${x},${y}`;
  const prev = new Map();
  const seen = new Set([key(start.x, start.y)]);
  let qi = 0;
  let visited = 0;

  while (qi < q.length && visited < maxVisited) {
    const cur = q[qi++];
    visited++;
    if (cur.x === goal.x && cur.y === goal.y) break;

    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = cur.x + dx;
      const ny = cur.y + dy;
      const k = key(nx, ny);
      if (seen.has(k)) continue;
      if (!(nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H)) continue;
      if (!isRoadTile(map[ny][nx])) continue;
      seen.add(k);
      prev.set(k, cur);
      q.push({ x: nx, y: ny });
    }
  }

  const goalKey = key(goal.x, goal.y);
  if (!seen.has(goalKey)) return null;

  const path = [];
  let cur = goal;
  while (cur) {
    path.push(cur);
    if (cur.x === start.x && cur.y === start.y) break;
    cur = prev.get(key(cur.x, cur.y));
  }
  path.reverse();
  return path;
}

function getDirectionBetweenTiles(from, to) {
  const dx = to.x - from.x;
  const dy = to.y - from.y;
  if (dx === 1 && dy === 0) return 0;
  if (dx === 0 && dy === 1) return 1;
  if (dx === -1 && dy === 0) return 2;
  if (dx === 0 && dy === -1) return 3;
  return null;
}

function buildPathToDoor(person, b) {
  const door = getDoorPoint(b);
  const startTile = worldToTile(person.x, person.y);
  const goalTile = worldToTile(door.x, door.y);
  const tilePath = findPathTiles(startTile, goalTile);
  if (!tilePath || tilePath.length === 0) return null;
  return {
    points: [...tilePath.map(t => tileCenter(t.x, t.y)), door],
    door,
  };
}

function refreshDestinationTiles() {
  pedestrianTiles = [];
  parkTiles = [];
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const tile = map[y][x];
      if (tile === T.SIDEWALK || tile === T.GRASS || tile === T.PARK) {
        pedestrianTiles.push({ x, y });
      }
      if (tile === T.PARK) {
        parkTiles.push({ x, y });
      }
    }
  }
}

function isRoadTile(tile) {
  return tile === T.ROAD_H || tile === T.ROAD_V || tile === T.ROAD_X;
}

function supportsHorizontalLaneTile(tile) {
  return tile === T.ROAD_H || tile === T.ROAD_X;
}

function supportsVerticalLaneTile(tile) {
  return tile === T.ROAD_V || tile === T.ROAD_X;
}

function pickDirectionForRoadTile(tile) {
  if (tile === T.ROAD_H) return rng() < 0.5 ? 0 : 2;
  if (tile === T.ROAD_V) return rng() < 0.5 ? 1 : 3;
  return pick([0, 1, 2, 3]);
}

function getHorizontalRoadBaseRow(tx, ty) {
  if (ty > 0 && supportsHorizontalLaneTile(map[ty - 1][tx])) return ty - 1;
  if (ty + 1 < MAP_H && supportsHorizontalLaneTile(map[ty + 1][tx])) return ty;
  return ty;
}

function getVerticalRoadBaseCol(tx, ty) {
  if (tx > 0 && supportsVerticalLaneTile(map[ty][tx - 1])) return tx - 1;
  if (tx + 1 < MAP_W && supportsVerticalLaneTile(map[ty][tx + 1])) return tx;
  return tx;
}

function getLaneCenterForRoad(tx, ty, dir) {
  if (dir === 0 || dir === 2) {
    const baseRow = getHorizontalRoadBaseRow(tx, ty);
    if (dir === 0) {
      return { x: tx * TILE + 8, y: (baseRow + 1) * TILE + 4 };
    }
    return { x: tx * TILE + 8, y: baseRow * TILE + 12 };
  }

  const baseCol = getVerticalRoadBaseCol(tx, ty);
  if (dir === 1) {
    return { x: (baseCol + 1) * TILE + 4, y: ty * TILE + 8 };
  }
  return { x: baseCol * TILE + 12, y: ty * TILE + 8 };
}

function getCarLaneDir(car) {
  return Number.isInteger(car.laneDir) ? car.laneDir : car.dir;
}

function clearCarRoute(car) {
  car.routeTiles = null;
  car.routeGoalKey = null;
  car.routeRefreshTimer = 0;
}

function clearCarWaypoints(car) {
  car.waypoints = [];
  car.pendingRoadTx = null;
  car.pendingRoadTy = null;
  car.pendingDir = null;
  car.pendingLaneDir = null;
}

function getResponderPhase(car) {
  return car.mode === 'pursuit' || car.mode === 'intercept' || car.mode === 'medical-response' || car.mode === 'medical-arriving' || car.mode === 'fire-response' || car.mode === 'fire-arriving';
}

function canResponderOvertake(car, originTx, originTy) {
  if (!getResponderPhase(car)) return false;
  const tile = map[originTy]?.[originTx];
  if (!(tile === T.ROAD_H || tile === T.ROAD_V)) return false;
  const altLaneDir = (car.dir + 2) % 4;
  const altLane = getLaneCenterForRoad(originTx, originTy, altLaneDir);
  for (const other of cars) {
    if (other === car) continue;
    if (car.dir === 0 || car.dir === 2) {
      if (Math.abs(other.y - altLane.y) > 2.5) continue;
      const delta = car.dir === 0 ? other.x - car.x : car.x - other.x;
      if (delta > -10 && delta < 64) return false;
      continue;
    }
    if (Math.abs(other.x - altLane.x) > 2.5) continue;
    const delta = car.dir === 1 ? other.y - car.y : car.y - other.y;
    if (delta > -10 && delta < 64) return false;
  }
  return true;
}

function getCarSteeringChance(car, tile) {
  if (tile !== T.ROAD_X) return 0;
  if (car.incidentId) return 1;
  return 0.28;
}

function getCarRouteRefreshInterval(car) {
  if (car.targetCar) return framesToSeconds(18);
  if (car.incidentId) return framesToSeconds(48);
  return framesToSeconds(90);
}

function getCarRouteNextTile(car, anchor, targetTile) {
  if (!targetTile) {
    clearCarRoute(car);
    return null;
  }

  const goalKey = `${targetTile.x},${targetTile.y}`;
  const needsRefresh = !car.routeTiles ||
    car.routeGoalKey !== goalKey ||
    car.routeRefreshTimer <= 0 ||
    !car.routeTiles.some(tile => tile.x === anchor.x && tile.y === anchor.y);

  if (needsRefresh) {
    car.routeTiles = findRoadPathTiles(anchor, targetTile);
    car.routeGoalKey = goalKey;
    car.routeRefreshTimer = getCarRouteRefreshInterval(car);
  }

  if (!car.routeTiles || car.routeTiles.length < 2) return null;
  const routeIndex = car.routeTiles.findIndex(tile => tile.x === anchor.x && tile.y === anchor.y);
  if (routeIndex < 0 || routeIndex >= car.routeTiles.length - 1) return null;
  return car.routeTiles[routeIndex + 1];
}

function getIntersectionTurnWaypoint(tx, ty, fromDir, toDir) {
  if (fromDir === toDir) return null;
  if (toDir === (fromDir + 2) % 4) {
    return getLaneCenterForRoad(tx, ty, toDir);
  }
  const entryLane = getLaneCenterForRoad(tx, ty, fromDir);
  const exitLane = getLaneCenterForRoad(tx, ty, toDir);
  if (fromDir === 0 || fromDir === 2) {
    return { x: exitLane.x, y: entryLane.y };
  }
  return { x: entryLane.x, y: exitLane.y };
}

function makeCarWaypoint(x, y, exitDir, exitLaneDir, roadTx = null, roadTy = null) {
  return { x, y, exitDir, exitLaneDir, roadTx, roadTy };
}

function planCarWaypoints(car) {
  const anchor = getCarAnchorTile(car);
  if (!anchor) return false;
  const tile = map[anchor.y]?.[anchor.x];
  let nextDir = car.dir;
  const { strategy, targetPoint, targetTile, useRoute } = getCarSteeringIntent(car);
  let hasRouteStep = false;
  if (useRoute) {
    const routeStep = getCarRouteNextTile(car, anchor, targetTile);
    const routedDir = routeStep ? getDirectionBetweenTiles(anchor, routeStep) : null;
    if (routedDir !== null) {
      nextDir = routedDir;
      hasRouteStep = true;
    }
  } else {
    clearCarRoute(car);
  }

  if (!hasRouteStep && tile === T.ROAD_X && (targetPoint || rng() < getCarSteeringChance(car, tile))) {
    nextDir = chooseCarTurn(car, targetPoint, strategy, anchor.x, anchor.y);
  } else if (!canDriveDirection(anchor.x, anchor.y, nextDir)) {
    nextDir = chooseCarTurn(car, targetPoint, strategy, anchor.x, anchor.y);
  }

  const currentLaneDir = getCarLaneDir(car);
  let laneDir = currentLaneDir;
  if (laneDir !== car.dir && (tile === T.ROAD_X || !getResponderPhase(car) || car.overtakeTimer <= 0)) {
    laneDir = car.dir;
    car.overtakeTimer = 0;
  }

  if (laneDir === car.dir && car.overtakeTimer > 0 && tile !== T.ROAD_X) {
    laneDir = (car.dir + 2) % 4;
  }

  const [dx, dy] = [[1, 0], [0, 1], [-1, 0], [0, -1]][nextDir];
  const nextTx = anchor.x + dx;
  const nextTy = anchor.y + dy;
  if (!(nextTx >= 0 && nextTx < MAP_W && nextTy >= 0 && nextTy < MAP_H && isRoadTile(map[nextTy][nextTx]))) {
    return false;
  }

  const points = [];
  if (currentLaneDir !== laneDir) {
    const lanePoint = getLaneCenterForRoad(anchor.x, anchor.y, laneDir);
    points.push(makeCarWaypoint(lanePoint.x, lanePoint.y, car.dir, laneDir));
  }
  if (nextDir !== car.dir) {
    const turnPoint = getIntersectionTurnWaypoint(anchor.x, anchor.y, laneDir, nextDir);
    if (turnPoint) points.push(makeCarWaypoint(turnPoint.x, turnPoint.y, nextDir, nextDir));
    laneDir = nextDir;
  }
  const nextLanePoint = getLaneCenterForRoad(nextTx, nextTy, laneDir);
  points.push(makeCarWaypoint(nextLanePoint.x, nextLanePoint.y, nextDir, laneDir, nextTx, nextTy));
  car.waypoints = points;
  car.pendingRoadTx = nextTx;
  car.pendingRoadTy = nextTy;
  car.pendingDir = nextDir;
  car.pendingLaneDir = laneDir;
  return true;
}

function advanceCarAlongRoad(car, distance) {
  let remaining = distance;
  let guard = 0;
  while (remaining > 0.0001 && guard < 6) {
    guard++;
    if (!car.waypoints || !car.waypoints.length) {
      if (!planCarWaypoints(car)) return false;
    }
    const target = car.waypoints[0];
    const dx = target.x - car.x;
    const dy = target.y - car.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist <= remaining + 0.001) {
      car.x = target.x;
      car.y = target.y;
      remaining -= dist;
      car.waypoints.shift();
      if (Number.isInteger(target.exitDir)) car.dir = target.exitDir;
      if (Number.isInteger(target.exitLaneDir)) car.laneDir = target.exitLaneDir;
      if (Number.isInteger(target.roadTx) && Number.isInteger(target.roadTy)) {
        car.roadTx = target.roadTx;
        car.roadTy = target.roadTy;
      }
      if (!car.waypoints.length) clearCarWaypoints(car);
      continue;
    }
    car.x += dx / dist * remaining;
    car.y += dy / dist * remaining;
    remaining = 0;
  }
  return true;
}

function normalizeCarSpeed(car, dtSec) {
  if (!Number.isFinite(car.baseSpeed)) {
    car.baseSpeed = getVehicleBaseSpeed(car.vehicleType || 'civilian', legacySpeed(0.42));
  }
  const boost = car.boostTimer > 0 ? legacySpeed(0.12) : 0;
  const desired = getCarDesiredSpeed(car) + boost;
  if (!Number.isFinite(car.speed)) {
    car.speed = desired;
  }
  car.speed += (desired - car.speed) * legacyBlend(0.18, dtSec);
  car.speed = clamp(car.speed, 0, getCarSpeedCap(car));
}

function buildPathToWorldPoint(person, point) {

}

function getNearestPersonDistanceSq(point, ignorePerson = null) {
  let best = Infinity;
  for (const other of people) {
    if (other === ignorePerson || other.state === 'inside') continue;
    const dx = other.x - point.x;
    const dy = other.y - point.y;
    const distSq = dx * dx + dy * dy;
    if (distSq < best) best = distSq;
  }
  return best;
}

function findCrowdSettlePoint(anchor, person, minRadius = 0, maxRadius = 20) {
  let best = findNearbyWalkablePoint(anchor.x, anchor.y, Math.max(1, Math.ceil(maxRadius / TILE)));
  let bestScore = getNearestPersonDistanceSq(best, person) - distanceSq(best, anchor) * 0.55;
  const sampleCount = 16;
  const baseAngle = ((person.id * 0.61803398875) % 1) * Math.PI * 2;

  for (let i = 0; i < sampleCount; i++) {
    const angle = baseAngle + (i / sampleCount) * Math.PI * 2;
    const radiusMix = ((i * 23 + person.id * 11) % 100) / 100;
    const radius = minRadius + radiusMix * Math.max(0, maxRadius - minRadius);
    const probeX = anchor.x + Math.cos(angle) * radius;
    const probeY = anchor.y + Math.sin(angle) * radius;
    const candidate = findNearbyWalkablePoint(probeX, probeY, 2);
    if (!candidate) continue;
    const nearestDistSq = getNearestPersonDistanceSq(candidate, person);
    const score = Math.min(nearestDistSq, (maxRadius + 8) * (maxRadius + 8)) - distanceSq(candidate, anchor) * 0.55;
    if (score > bestScore) {
      best = candidate;
      bestScore = score;
    }
  }

  return best || anchor;
}

function advancePersonAlongPath(person, speed, dtSec) {
  const followingPath = person.path && person.path.length > 0;
  const targetIndex = Math.min(person.pathIndex || 0, followingPath ? person.path.length - 1 : 0);
  const target = followingPath
    ? person.path[targetIndex]
    : { x: person.targetX ?? person.x, y: person.targetY ?? person.y };
  const isFinalWaypoint = !followingPath || targetIndex >= person.path.length - 1;
  const completionRadius = isFinalWaypoint ? Math.max(2.5, person.routeArrivalRadius || 0) : 2.5;

  const dx = target.x - person.x;
  const dy = target.y - person.y;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  const step = Math.min(speed * dtSec, dist);
  person.x += (dx / dist) * step;
  person.y += (dy / dist) * step;

  if (dist - step <= completionRadius) {
    if (followingPath && targetIndex < person.path.length - 1) {
      person.pathIndex = (person.pathIndex || 0) + 1;
      return false;
    }
    return true;
  }

  return false;
}

function getPersonSeparationRadius(person) {

function getPersonSeparationMobility(person) {

    case 'rallying':

function canPersonOccupyPoint(x, y) {

  return isWalkableTileForPerson(tx, ty);
}

function movePersonSafely(person, dx, dy) {
  const nextX = clamp(person.x + dx, 1, PX_W - 2);
  const nextY = clamp(person.y + dy, 1, PX_H - 2);
  if (canPersonOccupyPoint(nextX, nextY)) {
    person.x = nextX;
    person.y = nextY;
    return true;
  }

  if (canPersonOccupyPoint(nextX, person.y)) {
    person.x = nextX;
    return true;
  }

  if (canPersonOccupyPoint(person.x, nextY)) {
    person.y = nextY;
    return true;
  }

  return false;
}

function resolvePedestrianOverlap() {
  const onFoot = people.filter(person => person.state !== 'inside');
  for (let pass = 0; pass < 2; pass++) {
    for (let i = 0; i < onFoot.length; i++) {
      const first = onFoot[i];
      for (let j = i + 1; j < onFoot.length; j++) {
        const second = onFoot[j];
        const dx = second.x - first.x;
        const dy = second.y - first.y;
        const minGap = Math.max(getPersonSeparationRadius(first), getPersonSeparationRadius(second));
        const distSq = dx * dx + dy * dy;
        if (distSq >= minGap * minGap) continue;

        let nx = dx;
        let ny = dy;
        let dist = Math.sqrt(distSq);
        if (dist < 0.001) {
          const angle = ((first.id * 37 + second.id * 17) % 360) * Math.PI / 180;
          nx = Math.cos(angle);
          ny = Math.sin(angle);
          dist = 1;
        } else {
          nx /= dist;
          ny /= dist;
        }

        const overlap = minGap - dist;
        const firstMobility = getPersonSeparationMobility(first);
        const secondMobility = getPersonSeparationMobility(second);
        const totalMobility = firstMobility + secondMobility;
        if (totalMobility <= 0.0001) continue;

        const firstPush = overlap * (firstMobility / totalMobility);
        const secondPush = overlap * (secondMobility / totalMobility);
        movePersonSafely(first, -nx * firstPush, -ny * firstPush);
        movePersonSafely(second, nx * secondPush, ny * secondPush);
      }
    }
  }
}

      if (extraFilter && !extraFilter(person)) return false;
      return distanceSq(person, point) < radius * radius;

function countCommittedPeople(point, radius, matcher) {
  let count = 0;
  const radiusSq = radius * radius;
  for (const person of people) {
    if (person.state === 'inside' || person.state === 'entering') continue;
    if (!matcher(person)) continue;
    const anchor = getPersonActivityAnchor(person);
    if (distanceSq(person, point) <= radiusSq || distanceSq(anchor, point) <= radiusSq) {
      count++;
    }
  }
  return count;
}

function recruitToCivicRally(limit, radius = 180) {
  if (!civicRally.active || civicRally.phase === 'finale') return 0;

  const recruitBudget = Math.max(0, getCivicRallyCrowdTarget() - getCivicRallyCrowdCount());
  if (recruitBudget <= 0) return 0;

  return recruitPeopleToPoint(
    { x: civicRally.x, y: civicRally.y },
    radius,
    Math.min(limit, recruitBudget),
    'attend-rally',
    null,
    (_, index) => ({
      state: 'walking',
      rallyPoint: { x: civicRally.x, y: civicRally.y },
      stateTimer: randomDuration(720, 1200),
      targetPoint: { x: civicRally.x + (rng() - 0.5) * 18, y: civicRally.y + (rng() - 0.5) * 18 + index }

  );

  return countCommittedPeople({ x: streetGathering.x, y: streetGathering.y }, 76, person => person.state === 'gathering' || person.purpose === 'join-gathering' || person.purpose === 'hosting');
}

function recruitPeopleToPoint(point, radius, limit, purpose, extraFilter = null, optionsFactory = null) {
  let invited = 0;
  for (const person of getPeopleNearPoint(point, radius, candidate => {
    if (candidate.gathering || candidate.state === 'rallying' || candidate.state === 'gathering' || candidate.state === 'attending-medical' || candidate.state === 'kite-prep' || candidate.state === 'kite-flying') return false;
    if (candidate.path && candidate.purpose !== 'idle' && candidate.purpose !== 'go-somewhere' && candidate.purpose !== 'visit-park') return false;
    return extraFilter ? extraFilter(candidate) : true;
  })) {
    const options = optionsFactory ? optionsFactory(person, invited) : {};
    if (!options) continue;
    const target = options.targetPoint || point;
    const routeOptions = { ...options };
    delete routeOptions.targetPoint;
    if (assignPersonRoute(person, target, purpose, routeOptions)) {
      invited++;
      if (invited >= limit) break;
    }
  }
  return invited;
}

function pickErrandBuilding() {

function assignPersonRoute(person, point, purpose, options = {}) {
  const destination = chooseRouteDestinationPoint(person, point, purpose, options);
  const path = buildPathToWorldPoint(person, destination) || (destination !== point ? buildPathToWorldPoint(person, point) : null);
  if (!path) return false;
  person.state = options.state || 'walking';
  person.purpose = purpose;
  person.path = path;
  person.pathIndex = 0;
  person.targetX = path[path.length - 1].x;
  person.targetY = path[path.length - 1].y;
  person.routeArrivalRadius = options.arrivalRadius ?? getPersonRouteArrivalRadius(purpose);
  person.goalBuilding = options.goalBuilding || null;
  person.homeBuilding = options.homeBuilding ?? person.homeBuilding;
  person.doorPoint = options.doorPoint || null;
  person.friend = options.friend || null;
  person.rallyPoint = options.rallyPoint || null;
  person.gathering = false;
  person.stateTimer = options.stateTimer ?? randomDuration(120, 320);
  return true;
}

function pickGreetingFriend(person) {
  const candidates = people.filter(other => {
    if (other === person) return false;
    if (other.state === 'inside' || other.state === 'entering' || other.state === 'chatting') return false;
    if (other.friend && other.friend !== person) return false;
    const dx = other.x - person.x;
    const dy = other.y - person.y;
    return dx * dx + dy * dy < 180 * 180;
  });
  return candidates.length ? pick(candidates) : null;
}

function tryAssignGreeting(person) {
  const friend = pickGreetingFriend(person);
  if (!friend) return false;
  friend.state = 'idle';

function startCivicRally(point = null, duration = randomDuration(320, 560), announce = true) {

function updateCivicRally(dtSec) {
  if (civicRally.active) {
    civicRally.phaseTimer -= dtSec;
    civicRally.noteTimer -= dtSec;
    civicRally.recruitTimer -= dtSec;
    if (civicRally.recruitTimer <= 0) {
      const invited = recruitToCivicRally(civicRally.phase === 'forming' ? 2 : 3, civicRally.phase === 'forming' ? 180 : 220);
      civicRally.recruitTimer += invited > 0 ? framesToSeconds(90) : framesToSeconds(50);
    }
    if (civicRally.noteTimer <= 0) {
      civicRally.noteTimer += civicRally.phase === 'finale' ? framesToSeconds(20) : civicRally.phase === 'performance' ? framesToSeconds(28) : framesToSeconds(45);
      effects.push({ x: civicRally.x + (rng() - 0.5) * 24, y: civicRally.y - 10 + (rng() - 0.5) * 12, type: civicRally.phase === 'forming' ? 'wave' : 'note', age: 0, maxAge: 35 });
      if (civicRally.phase !== 'forming' && rng() < 0.5) {
        effects.push({ x: civicRally.x + (rng() - 0.5) * 20, y: civicRally.y - 14, type: 'music', age: 0, maxAge: 28 });
      }
    }
    if (civicRally.phaseTimer <= 0) {
      if (civicRally.phase === 'forming') {
        civicRally.phase = 'performance';
        civicRally.phaseTimer = civicRally.performanceTimer;
        showToast('🎺 The rally is in full swing');
      } else if (civicRally.phase === 'performance') {
        civicRally.phase = 'finale';
        civicRally.phaseTimer = framesToSeconds(300);
        showToast('👏 The rally reaches its finale');
      } else {
        civicRally.active = false;
        civicRally.phase = 'idle';
      }
    }
  } else {
    civicRally.cooldown -= dtSec;
    if (civicRally.cooldown <= 0 && parkTiles.length) {
      startCivicRally();
    }
  }
}

function updateStreetGathering(dtSec) {
  if (!streetGathering.active) {
    streetGathering.cooldown = Math.max(0, streetGathering.cooldown - dtSec);
    return;
  }

  const host = people.find(person => person.id === streetGathering.hostId && person.state !== 'inside');
  if (host) {
    streetGathering.x = host.x;
    streetGathering.y = host.y;
  }

  streetGathering.phaseTimer -= dtSec;
  streetGathering.effectTimer -= dtSec;
  streetGathering.recruitTimer -= dtSec;

  if (streetGathering.recruitTimer <= 0) {
    const crowdTarget = getStreetGatheringCrowdTarget();
    const crowdCount = getStreetGatheringCrowdCount();
    const recruitBudget = Math.max(0, crowdTarget - crowdCount);
    streetGathering.recruitTimer += recruitBudget > 0 && streetGathering.phase !== 'finale' ? framesToSeconds(70) : framesToSeconds(130);
    if (recruitBudget > 0 && streetGathering.phase !== 'finale') {
      recruitPeopleToPoint({ x: streetGathering.x, y: streetGathering.y }, 96, Math.min(streetGathering.phase === 'forming' ? 2 : 1, recruitBudget), 'join-gathering', person => person.id !== streetGathering.hostId, (_, index) => ({
        state: 'walking',
        rallyPoint: { x: streetGathering.x, y: streetGathering.y },
        stateTimer: randomDuration(600, 1080),
        targetPoint: { x: streetGathering.x + (index - 1) * 7 + (rng() - 0.5) * 6, y: streetGathering.y + (rng() - 0.5) * 12 }
      }));
    }
  }

  if (streetGathering.effectTimer <= 0) {
    streetGathering.effectTimer += streetGathering.phase === 'finale' ? framesToSeconds(18) : framesToSeconds(34);
    effects.push({ x: streetGathering.x + (rng() - 0.5) * 18, y: streetGathering.y - 10 + (rng() - 0.5) * 10, type: streetGathering.phase === 'finale' ? 'music' : 'wave', age: 0, maxAge: 28 });
  }

  if (streetGathering.phaseTimer <= 0) {
    if (streetGathering.phase === 'forming') {
      streetGathering.phase = 'mingling';
      streetGathering.phaseTimer = streetGathering.mainTimer;
      showToast('🫶 The crowd settles into the gathering');
    } else if (streetGathering.phase === 'mingling') {
      streetGathering.phase = 'finale';
      streetGathering.phaseTimer = framesToSeconds(240);
      showToast('🙌 The gathering breaks into a cheer');
    } else {
      endStreetGathering();
    }
  }
}

function planPersonGoal(person) {
  if (person.state === 'inside' || person.state === 'entering' || person.state === 'chatting' || person.path) return false;

  if (civicRally.active && civicRally.phase !== 'finale' && getCivicRallyCrowdCount() < getCivicRallyCrowdTarget() && distanceSq(person, civicRally) < 220 * 220 && rng() < 0.2) {
    return assignPersonRoute(person, { x: civicRally.x, y: civicRally.y }, 'attend-rally', {
      state: 'walking',
      rallyPoint: { x: civicRally.x, y: civicRally.y },
      stateTimer: randomDuration(220, 420)
    });
  }

  if (rng() < 0.22 && tryAssignGreeting(person)) {
    return true;
  }

  if (rng() < 0.45) {
    const building = pickErrandBuilding();
    if (building) {
      const door = getDoorPoint(building);
      if (assignPersonRoute(person, door, 'run-errand', {
        state: 'walking',
        goalBuilding: building,
        homeBuilding: building,
        doorPoint: door,
        stateTimer: randomDuration(220, 420)
      })) {
        return true;
      }
    }
  }

  if (rng() < 0.35) {
    const parkPoint = pickRandomParkPoint();
    if (parkPoint) {
      const purpose = rng() < 0.22 ? 'fly-kite' : 'visit-park';
      return assignPersonRoute(person, parkPoint, purpose, {
        state: 'walking',
        stateTimer: purpose === 'fly-kite' ? randomDuration(900, 1500) : randomDuration(180, 340)
      });
    }
  }

  const commutePoint = pickRandomPedestrianPoint();
  if (commutePoint) {
    return assignPersonRoute(person, commutePoint, 'go-somewhere', {
      state: 'walking',
      stateTimer: randomDuration(180, 320)
    });
  }

  return false;
}

    person.path = null;
