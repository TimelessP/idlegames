  person.state = 'idle';
  person.stateTimer = randomDuration(80, 220);
  person.path = null;
  person.pathIndex = 0;
}

function distanceSq(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx * dx + dy * dy;
}

function canDriveDirection(tx, ty, dir) {
  const deltas = [[1, 0], [0, 1], [-1, 0], [0, -1]][dir];
  const nx = tx + deltas[0];
  const ny = ty + deltas[1];
  return nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H && isRoadTile(map[ny][nx]);
}

function getQueuedCarDistance(car) {
  let best = Infinity;
  for (const other of cars) {
    if (other === car || other.dir !== car.dir) continue;
    if (car.dir === 0 || car.dir === 2) {
      if (Math.abs(other.y - car.y) > 2) continue;
      const delta = car.dir === 0 ? other.x - car.x : car.x - other.x;
      if (delta > 0 && delta < best) best = delta;
      continue;
    }
    if (Math.abs(other.x - car.x) > 2) continue;
    const delta = car.dir === 1 ? other.y - car.y : car.y - other.y;
    if (delta > 0 && delta < best) best = delta;
  }
  return best;
}

function getCarSafeGap(car) {
  if (car.mode === 'intercept' && car.targetCar) return 4.5;
  if (car.mode === 'pursuit' && car.targetCar) return 6.5;
  return 10;
}

function getCarSteeringIntent(car) {
  let strategy = 'random';
  let targetPoint = null;
  let targetTile = null;
  let useRoute = false;
  if (car.mode === 'escape' && emergencies.police?.policeCar) {
    strategy = 'away';
    targetPoint = { x: emergencies.police.policeCar.x, y: emergencies.police.policeCar.y };
  } else if ((car.mode === 'pursuit' || car.mode === 'intercept') && car.targetCar) {
    strategy = 'toward';
    targetPoint = { x: car.targetCar.x, y: car.targetCar.y };
    targetTile = getCarRoadTile(car.targetCar);
    useRoute = true;
  } else if ((car.mode === 'pursuit' || car.mode === 'intercept' || car.mode === 'medical-response' || car.mode === 'medical-arriving' || car.mode === 'medical-departing' || car.mode === 'fire-response' || car.mode === 'fire-arriving' || car.mode === 'service-return' || (car.mode === 'patrol' && car.targetPoint)) && car.targetPoint) {
    strategy = 'toward';
    targetPoint = car.targetPoint;
    targetTile = findNearestRoad(targetPoint.x, targetPoint.y);
    useRoute = true;
  }
  return { strategy, targetPoint, targetTile, useRoute };
}

function getCarAnchorTile(car) {
  if (Number.isInteger(car.roadTx) && Number.isInteger(car.roadTy) && car.roadTx >= 0 && car.roadTx < MAP_W && car.roadTy >= 0 && car.roadTy < MAP_H && isRoadTile(map[car.roadTy][car.roadTx])) {
    return { x: car.roadTx, y: car.roadTy };
  }
  const currentTx = Math.floor(car.x / TILE);
  const currentTy = Math.floor(car.y / TILE);
  if (currentTx >= 0 && currentTx < MAP_W && currentTy >= 0 && currentTy < MAP_H && isRoadTile(map[currentTy][currentTx])) {
    return { x: currentTx, y: currentTy };
  }
  return findNearestRoad(car.x, car.y);
}

function chooseCarTurn(car, targetPoint, strategy = 'random', originTx = Math.floor(car.x / TILE), originTy = Math.floor(car.y / TILE)) {
  const tx = originTx;
  const ty = originTy;
  const candidates = [car.dir, (car.dir + 1) % 4, (car.dir + 3) % 4].filter((dir, idx, arr) => arr.indexOf(dir) === idx && canDriveDirection(tx, ty, dir));
  if (!candidates.length) {
    const reverse = (car.dir + 2) % 4;
    if (canDriveDirection(tx, ty, reverse)) return reverse;
    const anyRoadDir = [0, 1, 2, 3].filter(dir => canDriveDirection(tx, ty, dir));
    return anyRoadDir.length ? pick(anyRoadDir) : car.dir;
  }
  if (strategy === 'random' || !targetPoint) return pick(candidates);

  let bestDir = candidates[0];
  let bestScore = strategy === 'away' ? -Infinity : Infinity;
  for (const dir of candidates) {
    const [dx, dy] = [[1, 0], [0, 1], [-1, 0], [0, -1]][dir];
    const lane = getLaneCenterForRoad(tx + dx, ty + dy, dir);
    const score = (lane.x - targetPoint.x) ** 2 + (lane.y - targetPoint.y) ** 2;
    if ((strategy === 'toward' && score < bestScore) || (strategy === 'away' && score > bestScore)) {
      bestScore = score;
      bestDir = dir;
    }
  }
  return bestDir;
}

function setCarSiren(car, kind = null) {
  if (!car) return;
  if (car.sirenKind === kind && (kind === null || car.sirenEmitter)) return;
  if (car.sirenEmitter) {
    removeAudioEmitter(car.sirenEmitter);
    car.sirenEmitter = null;
  }
  car.sirenKind = kind;
  if (kind && audioState.unlocked) {
    car.sirenEmitter = createSirenEmitter(() => (cars.includes(car) && car.sirenKind ? { x: car.x, y: car.y } : null), kind);
  }
}

function takeEmergencyVehicle(type, targetPoint = null) {
  const candidates = cars.filter(car => car.vehicleType === type && !car.incidentId);
  if (candidates.length) {
    if (!targetPoint) return candidates[0];

    const targetTile = findNearestRoad(targetPoint.x, targetPoint.y);
    let best = candidates[0];
    let bestScore = Infinity;
    for (const candidate of candidates) {
      const anchor = getCarRoadTile(candidate);
      const roadScore = anchor && targetTile ? getRoadDistanceBetweenTiles(anchor, targetTile) : Infinity;
      const distanceScore = distanceSq(candidate, targetPoint);
      const score = Number.isFinite(roadScore) ? roadScore : distanceScore / (TILE * TILE);
      if (score < bestScore) {
        best = candidate;
        bestScore = score;
      }
    }
    return best;
  }

  const spawn = getEmergencyVehicleSpawn(type);
  if (!spawn) return null;
  const vehicle = createCarAtRoad(spawn.x, spawn.y, pickDirectionForRoadTile(map[spawn.y][spawn.x]), undefined, undefined, type);
  cars.push(vehicle);
  if (type === 'fire') {
    assignFirePatrolTarget(vehicle, 22);
  }
  return vehicle;
}

function findNearbyPedestrian(point, radius = 56) {
  return people.find(person => person.state !== 'inside' && person.state !== 'entering' && distanceSq(person, point) < radius * radius) || null;
}

function getVehicleRearPoint(car, distance = 10) {
  switch (car.dir) {
    case 0: return { x: car.x - distance, y: car.y };
    case 1: return { x: car.x, y: car.y - distance };
    case 2: return { x: car.x + distance, y: car.y };
    default: return { x: car.x, y: car.y + distance };
  }
}

function getVehicleDoorPoint(car, side = 1, foreOffset = 0) {
  const lateral = 7 * side;
  switch (car.dir) {
    case 0:
      return { x: car.x + foreOffset, y: car.y + lateral };
    case 2:
      return { x: car.x - foreOffset, y: car.y - lateral };
    case 1:
      return { x: car.x - lateral, y: car.y + foreOffset };
    default:
      return { x: car.x + lateral, y: car.y - foreOffset };
  }
}

function getPoliceEscortPoint(policeCar) {
  return getVehicleDoorPoint(policeCar, 1, 2);
}

function createPoliceOfficerAtCar(policeCar) {
  const point = getVehicleDoorPoint(policeCar, -1, 1);
  return createPerson(point.x, point.y, {
    shirt: '#4050b0',
    state: 'walking',
    purpose: 'police-officer',
    stateTimer: framesToSeconds(900),
    tempActor: true,
  });
}

function ensurePerpAtCar(hijacker, suspectCar) {
  const point = getVehicleDoorPoint(suspectCar, 1, -1);
  if (hijacker) {
    clearPersonRoute(hijacker);
    hijacker.x = point.x;
    hijacker.y = point.y;

    hijacker.dx = 0;

    state: 'walking',
    purpose: 'perp',
    stateTimer: framesToSeconds(900),

  });
}

function removeTemporaryPerson(person) {
  if (!person) return;
  const index = people.indexOf(person);
  if (index >= 0) people.splice(index, 1);
}

function resumePoliceCars(incident) {
  const { suspectCar, policeCar } = incident;
  if (suspectCar) {
    suspectCar.vehicleType = 'civilian';
    suspectCar.color = getVehicleColor('civilian');
    suspectCar.mode = 'cruising';
    suspectCar.incidentId = null;
    suspectCar.stopped = false;
    suspectCar.stopReason = null;
    suspectCar.targetCar = null;
    suspectCar.targetPoint = null;
    suspectCar.baseSpeed = legacySpeed(0.3 + rng() * 0.4);
    suspectCar.speed = suspectCar.baseSpeed;
    suspectCar.waiting = 0;
    clearCarWaypoints(suspectCar);
    clearCarRoute(suspectCar);
  }
  if (policeCar) {
    policeCar.mode = 'patrol';
    policeCar.incidentId = null;
    policeCar.targetCar = null;
    policeCar.targetPoint = null;
    policeCar.speed = policeCar.baseSpeed;
    policeCar.stopReason = null;
    policeCar.stopped = false;
    policeCar.waiting = 0;
    clearCarWaypoints(policeCar);
    clearCarRoute(policeCar);
    setCarSiren(policeCar, null);

}

function beginPoliceArrestSequence(incident) {
  const { policeCar, suspectCar } = incident;
  if (!policeCar || !suspectCar || incident.phase === 'vehicle-stop' || incident.phase === 'officer-approach' || incident.phase === 'escorting' || incident.phase === 'boarding') return;

  incident.phase = 'vehicle-stop';
  incident.phaseTimer = framesToSeconds(40);
  policeCar.mode = 'pull-over';
  policeCar.stopped = true;
  policeCar.stopReason = 'scene';
  policeCar.speed = 0;
  suspectCar.mode = 'pull-over';
  suspectCar.stopped = true;
  suspectCar.stopReason = 'scene';
  suspectCar.speed = 0;
  setCarSiren(policeCar, null);
}

function canStartPoliceArrest(incident) {
  const { policeCar, suspectCar } = incident;
  if (!policeCar || !suspectCar) return false;

  const chaseDistanceSq = distanceSq(policeCar, suspectCar);
  if (chaseDistanceSq > 12 * 12) return false;

  const policeTile = getCarRoadTile(policeCar);
  const suspectTile = getCarRoadTile(suspectCar);
  if (policeTile && suspectTile && getRoadDistanceBetweenTiles(policeTile, suspectTile) > 1) return false;

  return Math.abs(policeCar.x - suspectCar.x) < 9 || Math.abs(policeCar.y - suspectCar.y) < 9;
}

function getMedicalDeparturePoint(ambulance) {
  const hospitalPoint = getServiceReturnPoint('ambulance');
  if (hospitalPoint) return hospitalPoint;
  const origin = getCarRoadTile(ambulance);
  let best = null;
  let bestDistance = -1;
  for (let attempt = 0; attempt < 24; attempt++) {
    const spawn = findRoadSpawn();
    if (!spawn) continue;
    const distance = origin ? getRoadDistanceBetweenTiles(origin, spawn) : 0;
    if (distance > bestDistance) {
      best = spawn;
      bestDistance = distance;
    }
  }
  return best ? tileCenter(best.x, best.y) : { x: ambulance.x, y: ambulance.y };
}

function releaseMedicalHelpers(helpers) {
  for (const helper of helpers || []) {
    if (!helper || helper.state === 'inside') continue;
    helper.state = 'idle';
    helper.stateTimer = randomDuration(80, 180);
    helper.purpose = 'idle';
    helper.gathering = false;
    helper.escortTarget = null;
    clearPersonRoute(helper);
  }
}

function tryStartPoliceIncident() {
  const policeCar = takeEmergencyVehicle('police');
  if (!policeCar) {
    emergencies.policeCooldown = framesToSeconds(180);
    return false;
  }

  const suspectCar = pickReachableCandidate(
    policeCar,
    cars.filter(car => car.vehicleType === 'civilian' && car.stopped && !car.incidentId),
    candidate => getCarRoadTile(candidate),
    28
  );
  if (!suspectCar) {
    emergencies.policeCooldown = framesToSeconds(180);
    return false;
  }

  const hijacker = findNearbyPedestrian(suspectCar, 72);
  if (hijacker) {
    clearPersonRoute(hijacker);
    hijacker.state = 'inside';
    hijacker.stateTimer = framesToSeconds(1500);
    hijacker.purpose = 'hijacking';
    hijacker.homeBuilding = null;
  }

  suspectCar.vehicleType = 'hijacked';
  suspectCar.color = getVehicleColor('hijacked');
  suspectCar.mode = 'escape';
  suspectCar.incidentId = 'police';
  suspectCar.stopped = false;
  suspectCar.stopReason = null;
  suspectCar.waiting = 0;
  suspectCar.baseSpeed = Math.max(suspectCar.baseSpeed, legacySpeed(0.62));
  suspectCar.boostTimer = framesToSeconds(120);

  policeCar.mode = 'pursuit';
  policeCar.incidentId = 'police';
  policeCar.targetCar = suspectCar;
  policeCar.targetPoint = null;
  policeCar.boostTimer = framesToSeconds(120);
  setCarSiren(policeCar, 'police');
  playScreechAt(suspectCar.x, suspectCar.y);
  playHonkAt(suspectCar.x, suspectCar.y);
  showToast('A carjacking at the lights kicks off a police chase');

  emergencies.police = {
    timer: framesToSeconds(1380),
    phase: 'dispatch',
    phaseTimer: 0,
    suspectCar,
    policeCar,
    hijacker,
    officer: null,
  };
  return true;
}

function endPoliceIncident() {
  const incident = emergencies.police;
  if (!incident) return;
  const { hijacker, officer } = incident;
  resumePoliceCars(incident);
  if (hijacker) {
    if (hijacker.tempActor) {
      removeTemporaryPerson(hijacker);
    } else {
      const station = civicBuildings.policeStation;
      if (station) hijacker.homeBuilding = station;
      hijacker.state = 'inside';
      hijacker.stateTimer = framesToSeconds(2400);
      hijacker.purpose = station ? 'booked' : 'detained';
    }
  }
  if (officer) {
    if (officer.tempActor) {
      removeTemporaryPerson(officer);
    } else {
      const station = civicBuildings.policeStation;
      if (station) officer.homeBuilding = station;
      officer.state = 'inside';
      officer.stateTimer = framesToSeconds(1200);
      officer.purpose = 'police-officer';
    }
  }
  playArrestAt(incident.policeCar?.x || incident.suspectCar?.x || cam.x, incident.policeCar?.y || incident.suspectCar?.y || cam.y);
  showToast('Police box in the suspect, make the arrest, and both cars roll back into traffic');
  emergencies.police = null;
  emergencies.policeCooldown = randomDuration(1500, 2400);
}

function updatePoliceIncident(dtSec) {
  const incident = emergencies.police;
  if (!incident) {
    emergencies.policeCooldown -= dtSec;
    if (emergencies.policeCooldown <= 0) tryStartPoliceIncident();
    return;
  }

  incident.timer -= dtSec;
  incident.phaseTimer = Math.max(0, (incident.phaseTimer || 0) - dtSec);
  const { suspectCar, policeCar } = incident;
  if (!suspectCar || !policeCar) {
    endPoliceIncident();
    return;
  }

  const chaseDistance = Math.sqrt(distanceSq(policeCar, suspectCar));
  if (incident.phase === 'dispatch' && chaseDistance < 120) {
    incident.phase = 'chase';
  }
  if ((incident.phase === 'chase' || incident.phase === 'dispatch') && chaseDistance < 44) {
    incident.phase = 'intercept';
    policeCar.mode = 'intercept';
  } else if (!['vehicle-stop', 'officer-approach', 'escorting', 'boarding', 'arrest'].includes(incident.phase)) {
    policeCar.mode = 'pursuit';
  }

  if (incident.phase === 'intercept' && canStartPoliceArrest(incident)) {
    beginPoliceArrestSequence(incident);
  }

  if ((incident.phase === 'chase' || incident.phase === 'intercept') && incident.timer <= framesToSeconds(180)) {
    incident.phase = 'intercept';
    policeCar.mode = 'intercept';
    policeCar.boostTimer = Math.max(policeCar.boostTimer || 0, framesToSeconds(90));
    if (canStartPoliceArrest(incident)) {
      beginPoliceArrestSequence(incident);
    }
  }

  if (incident.phase === 'vehicle-stop') {
    policeCar.targetCar = null;
    policeCar.targetPoint = null;
    if (incident.phaseTimer <= 0) {
      incident.officer = createPoliceOfficerAtCar(policeCar);
      people.push(incident.officer);
      incident.hijacker = ensurePerpAtCar(incident.hijacker, suspectCar);
      if (!people.includes(incident.hijacker)) people.push(incident.hijacker);
      effects.push({ x: incident.officer.x, y: incident.officer.y, type: 'door', age: 0, maxAge: 24 });
      effects.push({ x: incident.hijacker.x, y: incident.hijacker.y, type: 'door', age: 0, maxAge: 24 });
      incident.phase = 'officer-approach';
      incident.phaseTimer = framesToSeconds(220);
      assignPersonRoute(incident.officer, { x: incident.hijacker.x - 5, y: incident.hijacker.y }, 'police-officer', {
        state: 'walking',
        stateTimer: framesToSeconds(320)
      });
      incident.hijacker.state = 'walking';
      incident.hijacker.stateTimer = framesToSeconds(320);
    }
  } else if (incident.phase === 'officer-approach') {
    if (!incident.officer || !incident.hijacker) {
      endPoliceIncident();
      return;
    }
    const onFootDistance = Math.sqrt(distanceSq(incident.officer, incident.hijacker));
    if (onFootDistance < 10 || incident.phaseTimer <= 0) {
      incident.phase = 'escorting';
      incident.phaseTimer = framesToSeconds(260);
      const escortPoint = getPoliceEscortPoint(policeCar);
      assignPersonRoute(incident.officer, escortPoint, 'police-officer', {
        state: 'walking',
        stateTimer: framesToSeconds(340)
      });
      assignPersonRoute(incident.hijacker, { x: escortPoint.x - 5, y: escortPoint.y + 2 }, 'perp', {
        state: 'walking',
        stateTimer: framesToSeconds(340)
      });
    }
  } else if (incident.phase === 'escorting') {
    if (!incident.officer || !incident.hijacker) {
      endPoliceIncident();
      return;
    }
    const escortPoint = getPoliceEscortPoint(policeCar);
    const perpReady = distanceSq(incident.hijacker, escortPoint) < 12 * 12;
    const officerReady = distanceSq(incident.officer, escortPoint) < 12 * 12;
    if ((perpReady && officerReady) || incident.phaseTimer <= 0) {
      incident.phase = 'boarding';
      incident.phaseTimer = framesToSeconds(90);
      incident.hijacker.state = 'inside';
      incident.hijacker.stateTimer = framesToSeconds(2400);
      incident.hijacker.purpose = 'detained';
      incident.officer.state = 'inside';
      incident.officer.stateTimer = framesToSeconds(1200);
      incident.officer.purpose = 'police-officer';
      effects.push({ x: escortPoint.x, y: escortPoint.y, type: 'door', age: 0, maxAge: 24 });
    }
  } else if (incident.phase === 'boarding') {
    if (incident.phaseTimer <= 0) {
      incident.phase = 'arrest';
      endPoliceIncident();
    }
  }
}

function tryStartMedicalIncident() {
  const ambulance = takeEmergencyVehicle('ambulance');
  if (!ambulance) {
    emergencies.medicalCooldown = framesToSeconds(220);
    return false;
  }

  const patient = pickReachableCandidate(
    ambulance,
    people.filter(person => person.state !== 'inside' && person.state !== 'entering' && person.state !== 'medical'),
    candidate => findNearestRoad(candidate.x, candidate.y),
    24
  );
  if (!patient) {
    emergencies.medicalCooldown = framesToSeconds(220);
    return false;
  }

  clearPersonRoute(patient);
  patient.state = 'medical';
  patient.stateTimer = framesToSeconds(1800);
  patient.dx = 0;
  patient.dy = 0;
  patient.purpose = 'medical';

  ambulance.mode = 'medical-response';
  ambulance.incidentId = 'medical';
  ambulance.targetPoint = { x: patient.x, y: patient.y };
  ambulance.boostTimer = framesToSeconds(120);
  setCarSiren(ambulance, 'ambulance');
  playMedicalAt(patient.x, patient.y);
  showToast('An ambulance races to a medical emergency');

  emergencies.medical = {
    phase: 'dispatch',
    timer: framesToSeconds(2100),
    phaseTimer: 0,
    pulseTimer: framesToSeconds(55),
    patient,
    ambulance,
    helpers: [],
    loadPoint: null,
    departPoint: null,
  };
  return true;
}

function endMedicalIncident() {
  const incident = emergencies.medical;
  if (!incident) return;
  const { patient, ambulance, helpers } = incident;
  releaseMedicalHelpers(helpers);
  if (patient) {
    clearPersonRoute(patient);
    const hospital = civicBuildings.hospital;
    if (hospital) {
      const release = getExitSpawn(hospital);
      patient.x = release.x;
      patient.y = release.y;
      patient.dx = release.dx;
      patient.dy = release.dy;
      effects.push({ x: release.ex, y: release.ey, type: 'door', age: 0, maxAge: 20 });
    } else {
      patient.x = ambulance ? ambulance.x + rngInt(-8, 8) : patient.x;
      patient.y = ambulance ? ambulance.y + rngInt(-8, 8) : patient.y;
      patient.dx = legacySpeed((rng() - 0.5) * 0.2);
      patient.dy = legacySpeed((rng() - 0.5) * 0.2);
    }
    patient.state = 'walking';
    patient.stateTimer = randomDuration(80, 180);
    patient.purpose = 'recovered';
    patient.escortTarget = null;
  }
  if (ambulance) {
    ambulance.mode = 'patrol';
    ambulance.incidentId = null;
    ambulance.targetPoint = null;
    ambulance.speed = ambulance.baseSpeed;
    ambulance.stopReason = null;
    ambulance.stopped = false;
    clearCarWaypoints(ambulance);
    clearCarRoute(ambulance);
    setCarSiren(ambulance, null);
  }
  showToast(civicBuildings.hospital ? 'The ambulance brings the patient to the hospital and returns to service' : 'The ambulance stabilizes the patient and returns to patrol');
  emergencies.medical = null;
  emergencies.medicalCooldown = randomDuration(1700, 2500);
}

function updateMedicalIncident(dtSec) {
  const incident = emergencies.medical;
  if (!incident) {
    emergencies.medicalCooldown -= dtSec;
    if (emergencies.medicalCooldown <= 0) tryStartMedicalIncident();
    return;
  }

  const { patient, ambulance } = incident;
  if (!patient || !ambulance) {
    endMedicalIncident();
    return;
  }

  incident.timer -= dtSec;
  incident.phaseTimer -= dtSec;
  if (incident.phase === 'dispatch' || incident.phase === 'arriving') {
    ambulance.targetPoint = { x: patient.x, y: patient.y };
    const distSqToPatient = distanceSq(ambulance, patient);
    if (incident.phase === 'dispatch' && distSqToPatient < 120 * 120) {
      incident.phase = 'arriving';
      ambulance.mode = 'medical-arriving';
    }
    if (distSqToPatient < 24 * 24 || incident.timer <= framesToSeconds(1100)) {
      incident.phase = 'triage';
      incident.phaseTimer = framesToSeconds(300);
      ambulance.mode = 'medical-on-scene';
      ambulance.stopped = true;
      ambulance.stopReason = 'scene';
      ambulance.speed = 0;
      setCarSiren(ambulance, null);
      incident.helpers = getPeopleNearPoint(patient, 72, person => person !== patient && person.purpose !== 'medical' && !person.gathering).slice(0, 2);
      incident.helpers.forEach((helper, index) => {
        assignPersonRoute(helper, { x: patient.x + (index === 0 ? -6 : 6), y: patient.y + 4 }, 'attend-medical', {
          state: 'walking',
          stateTimer: randomDuration(300, 540)
        });
      });
    }
  } else if (incident.phase === 'triage') {
    incident.pulseTimer -= dtSec;
    patient.state = 'medical';
    patient.dx = 0;
    patient.dy = 0;
    if (incident.pulseTimer <= 0) {
      incident.pulseTimer += framesToSeconds(55);
      effects.push({ x: patient.x, y: patient.y - 8, type: 'wave', age: 0, maxAge: 20 });
      playMedicalAt(patient.x, patient.y);
    }
    if (incident.phaseTimer <= 0) {
      incident.phase = 'loading';
      incident.phaseTimer = framesToSeconds(260);
      incident.loadPoint = findNearbyWalkablePoint(getVehicleRearPoint(ambulance, 10).x, getVehicleRearPoint(ambulance, 10).y, 5);
      assignPersonRoute(patient, incident.loadPoint, 'board-ambulance', {
        state: 'walking',
        stateTimer: framesToSeconds(420)
      });
    }
  } else if (incident.phase === 'loading') {
    incident.pulseTimer -= dtSec;
    if (incident.pulseTimer <= 0) {
      incident.pulseTimer += framesToSeconds(45);
      effects.push({ x: ambulance.x + (rng() - 0.5) * 4, y: ambulance.y - 7, type: 'wave', age: 0, maxAge: 18 });
    }
    if (patient.state === 'inside' || incident.phaseTimer <= 0) {
      clearPersonRoute(patient);
      patient.state = 'inside';
      patient.stateTimer = framesToSeconds(1600);
      incident.phase = 'departing';
      incident.phaseTimer = framesToSeconds(520);
      incident.departPoint = getMedicalDeparturePoint(ambulance);
      ambulance.mode = 'medical-departing';
      ambulance.stopped = false;
      ambulance.stopReason = null;
      ambulance.targetPoint = incident.departPoint;
      releaseMedicalHelpers(incident.helpers);
      incident.helpers = [];
    }
  } else {
    ambulance.mode = 'medical-departing';
    ambulance.targetPoint = incident.departPoint;
    if (incident.phaseTimer <= 0 || distanceSq(ambulance, incident.departPoint) < 28 * 28) {
      endMedicalIncident();
    }
  }
}

function tryStartFireIncident() {
  const burningCandidates = buildings.filter(candidate => !candidate.onFire);
  if (!burningCandidates.length) {
    emergencies.fireCooldown = framesToSeconds(260);
    return false;
  }

  const building = pick(burningCandidates);
  const stagePoint = getBuildingFireStagePoint(building);
  const approachPoint = getBuildingFireApproachPoint(building);
  const fireTruck = takeEmergencyVehicle('fire', approachPoint);
  if (!fireTruck) {
    emergencies.fireCooldown = framesToSeconds(260);
    return false;
  }

  if (!pickReachableCandidate(
    fireTruck,
    [building],
    candidate => getBuildingSceneRoadTile(candidate),
    40
  )) {
    emergencies.fireCooldown = framesToSeconds(220);
    return false;
  }

  if (!building) {
    emergencies.fireCooldown = framesToSeconds(260);
    return false;
  }

  building.onFire = true;
  building.fireEmitter = audioState.unlocked ? createFireEmitter(() => building.onFire ? { x: building.x + building.w / 2, y: building.y + building.h / 2 } : null) : null;
  fireTruck.mode = 'fire-response';
  fireTruck.incidentId = 'fire';
  fireTruck.targetPoint = approachPoint;
  fireTruck.boostTimer = framesToSeconds(120);
  setCarSiren(fireTruck, 'fire');
  showToast('A building catches fire and the fire truck is dispatched');

  emergencies.fire = {
    phase: 'dispatch',
    timer: framesToSeconds(1500),
    sceneTimer: framesToSeconds(1200),
    smokeTimer: framesToSeconds(18),
    sprayTimer: framesToSeconds(8),
    suppressionTimer: 0,
    smokeActive: true,
    building,
    fireTruck,
    approachPoint,
    stagePoint,
  };
  return true;
}

function endFireIncident() {
  const incident = emergencies.fire;
  if (!incident) return;
  const { building, fireTruck } = incident;
  if (building) {
    stopBuildingFire(building);
  }
  if (fireTruck) {
    fireTruck.incidentId = null;
    fireTruck.speed = fireTruck.baseSpeed;
    fireTruck.stopped = false;
    fireTruck.stopReason = null;
    setCarSiren(fireTruck, null);
    if (!sendVehicleToServiceBase(fireTruck)) {
      fireTruck.mode = 'patrol';
      fireTruck.targetPoint = null;
    }
  }
  showToast(civicBuildings.fireStation ? 'The fire truck knocks down the blaze and heads back to the station' : 'The fire truck knocks down the blaze and clears the scene');
  emergencies.fire = null;
  emergencies.fireCooldown = randomDuration(1800, 2600);
}

function updateFireIncident(dtSec) {
  const incident = emergencies.fire;
  if (!incident) {
    emergencies.fireCooldown -= dtSec;
    if (emergencies.fireCooldown <= 0) tryStartFireIncident();
    return;
  }

  const { building, fireTruck } = incident;
  if (!building || !fireTruck) {
    endFireIncident();
    return;
  }

  incident.timer -= dtSec;
  if (incident.smokeActive) {
    incident.smokeTimer -= dtSec;
    if (incident.smokeTimer <= 0) {
      incident.smokeTimer += framesToSeconds(18);
      effects.push({ x: building.x + building.w * 0.3 + (rng() - 0.5) * 12, y: building.y + 8 + (rng() - 0.5) * 8, type: 'smoke', age: 0, maxAge: 60, size: 1.15 });
      effects.push({ x: building.x + building.w * 0.5 + (rng() - 0.5) * 10, y: building.y + 6 + (rng() - 0.5) * 6, type: 'smoke', age: 0, maxAge: 72, size: 1.6 });
      effects.push({ x: building.x + building.w * 0.7 + (rng() - 0.5) * 12, y: building.y + 8 + (rng() - 0.5) * 8, type: 'smoke', age: 0, maxAge: 64, size: 1.25 });
    }
  }
  const stagePoint = incident.stagePoint || getBuildingFireStagePoint(building);
  const approachPoint = incident.approachPoint || stagePoint;
  if (incident.phase === 'dispatch' || incident.phase === 'arriving') {
    fireTruck.targetPoint = incident.phase === 'dispatch' ? approachPoint : stagePoint;
    const dispatchDistSq = distanceSq(fireTruck, approachPoint);
    const sceneDistSq = distanceSq(fireTruck, stagePoint);
    if (incident.phase === 'dispatch' && (dispatchDistSq < 28 * 28 || incident.timer <= framesToSeconds(1220))) {
      incident.phase = 'arriving';
      fireTruck.mode = 'fire-arriving';
    }
    if (incident.phase === 'arriving' && (sceneDistSq < 16 * 16 || (incident.timer <= framesToSeconds(900) && sceneDistSq < 24 * 24))) {
      incident.phase = 'firefighting';
      fireTruck.mode = 'fire-on-scene';
      fireTruck.stopped = true;
      fireTruck.stopReason = 'scene';
      fireTruck.speed = 0;
      fireTruck.targetPoint = null;
      incident.suppressionTimer = 0;
      incident.sprayTimer = 0;
      setCarSiren(fireTruck, null);
    }
  } else {
    incident.sceneTimer -= dtSec;
    incident.suppressionTimer += dtSec;
    incident.sprayTimer -= dtSec;
    if (incident.sprayTimer <= 0) {
      incident.sprayTimer += framesToSeconds(10);
      effects.push({ x: fireTruck.x + (rng() - 0.5) * 4, y: fireTruck.y - 4, type: 'spray', age: 0, maxAge: 18, tx: building.x + building.w / 2, ty: building.y + building.h / 2 });
    }
    if (incident.smokeActive && incident.suppressionTimer >= framesToSeconds(180)) {
      incident.smokeActive = false;
      stopBuildingFire(building);
    }
    if (incident.sceneTimer <= 0) {
      endFireIncident();
    }
  }
}

function updateEmergencyIncidents(dtSec) {
  updatePoliceIncident(dtSec);
  updateMedicalIncident(dtSec);
  updateFireIncident(dtSec);
  updateIncidentBanner();
}

function emitAmbientChatterSounds() {
  if (!audioState.unlocked || audioState.chatterCooldown > 0) return;
  const talkers = people.filter(person => person.state === 'chatting' || person.state === 'rallying' || person.state === 'gathering');
  if (!talkers.length) return;
  const speaker = pick(talkers);
  playChatterAt(speaker.x, speaker.y, speaker.state === 'rallying' ? 1.6 : 1);
  audioState.chatterCooldown = framesToSeconds(35);
}

function spawnInitialCars() {
  for (let i = 0; i < 60; i++) {
    const attempts = 20;
    for (let a = 0; a < attempts; a++) {
      const tx = rngInt(0, MAP_W - 1);
      const ty = rngInt(0, MAP_H - 1);
      const tile = map[ty][tx];
      if (tile === T.ROAD_H || tile === T.ROAD_V || tile === T.ROAD_X) {
        cars.push(createCarAtRoad(tx, ty, pickDirectionForRoadTile(tile)));
        break;
      }
    }
  }
  ensureServiceFleet();
}

function spawnInitialPeople() {
  for (let i = 0; i < 40; i++) {
    const attempts = 20;
    for (let a = 0; a < attempts; a++) {
      const tx = rngInt(0, MAP_W - 1);
      const ty = rngInt(0, MAP_H - 1);
      if (map[ty][tx] === T.SIDEWALK || map[ty][tx] === T.PARK) {
        people.push(createPerson(tx * TILE + rngInt(2, 12), ty * TILE + rngInt(2, 12), {
          state: 'idle',
          stateTimer: randomDuration(20, 140)
        }));
        break;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════
function update(dt) {
  const dtSec = dt / 1000;
  if (dtSec <= 0) return;
  worldTime += dtSec;
  updateTrackpadZoom(dtSec);

  // Traffic lights
  for (const tl of trafficLights) {
    tl.timer -= dtSec;
    if (tl.timer <= 0) {
      tl.state = tl.state === 'red' ? 'green' : 'red';
      tl.timer = randomDuration(120, 300);
    }
  }

  updateCivicRally(dtSec);
  updateStreetGathering(dtSec);
  updateEmergencyIncidents(dtSec);

  // Cars
  for (const car of cars) {
    if (car.sirenKind && !car.sirenEmitter && audioState.unlocked) {
      car.sirenEmitter = createSirenEmitter(() => (cars.includes(car) && car.sirenKind ? { x: car.x, y: car.y } : null), car.sirenKind);
    }

    const anchor = getCarAnchorTile(car);
    if (!anchor) continue;
    car.roadTx = anchor.x;
    car.roadTy = anchor.y;

    car.boostTimer = Math.max(0, (car.boostTimer || 0) - dtSec);
    car.overtakeTimer = Math.max(0, (car.overtakeTimer || 0) - dtSec);
    car.routeRefreshTimer = Math.max(0, (car.routeRefreshTimer || 0) - dtSec);
    normalizeCarSpeed(car, dtSec);

    if (car.mode === 'pull-over' || car.mode === 'medical-on-scene' || car.mode === 'fire-on-scene') {
      car.stopReason = 'scene';
      car.stopped = true;
      car.speed = 0;
      clearCarWaypoints(car);
      clearCarRoute(car);
      continue;
    }

    if (car.mode === 'service-return' && car.targetPoint && distanceSq(car, car.targetPoint) < 20 * 20) {
      car.mode = 'patrol';
      car.targetPoint = null;
      car.eventTimer = framesToSeconds(30);
      clearCarWaypoints(car);
      clearCarRoute(car);
    }

    if (car.mode === 'patrol' && car.vehicleType === 'fire' && !car.incidentId) {
      car.eventTimer = Math.max(0, (car.eventTimer || 0) - dtSec);
      if (car.targetPoint && distanceSq(car, car.targetPoint) < 24 * 24) {
        car.targetPoint = null;
        clearCarWaypoints(car);
        clearCarRoute(car);
      }
      if (!car.targetPoint || car.eventTimer <= 0) {
        assignFirePatrolTarget(car, car.targetPoint ? 14 : 22);
      }
    }

    let stopReason = null;
    let travel = car.speed * dtSec;
    const ignoresLights = car.mode === 'escape' || car.mode === 'pursuit' || car.mode === 'intercept' || car.mode === 'medical-response' || car.mode === 'medical-arriving' || car.mode === 'fire-response' || car.mode === 'fire-arriving';
    if (!ignoresLights) {
      for (const tl of trafficLights) {
        const dx = tl.x - car.x, dy = tl.y - car.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 20 && tl.state === 'red') {
          if ((car.dir === 0 && dx > 0 && dx < 20) ||
              (car.dir === 2 && dx < 0 && dx > -20) ||
              (car.dir === 1 && dy > 0 && dy < 20) ||
              (car.dir === 3 && dy < 0 && dy > -20)) {
            stopReason = 'light';
            break;
          }
        }
      }
    }

    const queuedDistance = getQueuedCarDistance(car);
    if (Number.isFinite(queuedDistance) && stopReason !== 'light' && car.overtakeTimer <= 0 && canResponderOvertake(car, anchor.x, anchor.y) && queuedDistance < 18) {
      car.overtakeTimer = framesToSeconds(90);
      clearCarWaypoints(car);
    }

    if (Number.isFinite(queuedDistance) && car.overtakeTimer <= 0) {
      const safeGap = getCarSafeGap(car);
      travel = Math.min(travel, Math.max(0, queuedDistance - safeGap));
      if (queuedDistance <= safeGap + 0.5) {
        stopReason = stopReason || 'queue';
      }
    }

    if (stopReason || travel <= 0.0001) {
      car.stopReason = stopReason || 'queue';
      car.stopped = true;
      car.waiting += dtSec;
      if (car.waiting > framesToSeconds(60) && !car.honking && legacyChance(0.01, dtSec)) {
        car.honking = true;
        car.honkTimer = framesToSeconds(30);
        effects.push({ x: car.x, y: car.y - 6, type: 'honk', age: 0, maxAge: 30 });
        playHonkAt(car.x, car.y);
      }
      if (car.honking) {
        car.honkTimer -= dtSec;
        if (car.honkTimer <= 0) car.honking = false;
      }
      continue;
    }

    if (car.overtakeTimer <= 0 && getCarLaneDir(car) !== car.dir && (!car.waypoints || !car.waypoints.length)) {
      clearCarWaypoints(car);
    }

    car.stopReason = null;
    car.stopped = false;
    car.waiting = 0;

    if (!advanceCarAlongRoad(car, travel)) {
      car.stopped = true;
      car.stopReason = 'route';
      clearCarWaypoints(car);
      clearCarRoute(car);
    }

    if (car.honking) {
      car.honkTimer -= dtSec;
      if (car.honkTimer <= 0) car.honking = false;
    }
  }

  // People
  for (const p of people) {
    p.stateTimer -= dtSec;
    p.emoteTimer = Math.max(0, (p.emoteTimer ?? randomDuration(30, 90)) - dtSec);

    if (p.state === 'entering') {
      if (advancePersonAlongPath(p, legacySpeed(0.55), dtSec)) {
        p.state = 'inside';
        p.stateTimer = randomDuration(140, 360);
        const doorFx = p.doorPoint || { x: p.targetX ?? p.x, y: p.targetY ?? p.y };
        effects.push({ x: doorFx.x, y: doorFx.y, type: 'door', age: 0, maxAge: 20 });
        p.path = null;
        p.pathIndex = 0;
      }
    } else if (p.state === 'medical') {
      p.dx = 0;
      p.dy = 0;
    } else if (p.state === 'attending-medical') {
      p.dx = 0;
      p.dy = 0;
      if (p.emoteTimer <= 0) {
        p.emoteTimer = framesToSeconds(28);
        effects.push({ x: p.x + (rng() - 0.5) * 6, y: p.y - 9, type: 'wave', age: 0, maxAge: 20 });
      }
      if (p.stateTimer <= 0 || !emergencies.medical || (emergencies.medical.phase !== 'triage' && emergencies.medical.phase !== 'loading')) {
        p.state = 'idle';
        p.stateTimer = randomDuration(80, 180);
        p.purpose = 'idle';
      }
    } else if (p.state === 'kite-prep') {
      p.dx = 0;
      p.dy = 0;
      if (p.emoteTimer <= 0) {
        p.emoteTimer = framesToSeconds(26);
        effects.push({ x: p.x + (rng() - 0.5) * 6, y: p.y - 10, type: 'rustle', age: 0, maxAge: 18 });
      }
      if (p.stateTimer <= 0) {
        p.state = 'kite-flying';
        p.stateTimer = randomDuration(960, 1560);
        p.emoteTimer = framesToSeconds(30);
      }
    } else if (p.state === 'kite-flying') {
      p.dx = 0;
      p.dy = 0;
      p.kiteSway += dtSec * 2.2;
      if (p.emoteTimer <= 0) {
        p.emoteTimer = framesToSeconds(34);
        effects.push({ x: p.x + Math.cos(p.kiteSway) * 10, y: p.y - p.kiteHeight - 16, type: 'wave', age: 0, maxAge: 20 });
      }
      if (p.stateTimer <= 0) {
        p.state = 'idle';
        p.stateTimer = randomDuration(90, 180);
        p.purpose = 'idle';
      }
    } else if (p.state === 'inside') {
      if (p.stateTimer <= 0) {
        const building = p.homeBuilding;
        if (building) {
          const sp = getExitSpawn(building);
          p.x = sp.x;
          p.y = sp.y;
          p.dx = sp.dx;
          p.dy = sp.dy;
          effects.push({ x: sp.ex, y: sp.ey, type: 'door', age: 0, maxAge: 20 });
        } else {
          p.dx = legacySpeed((rng() - 0.5) * 0.3);
          p.dy = legacySpeed((rng() - 0.5) * 0.3);
        }
        p.state = 'walking';
        p.stateTimer = randomDuration(120, 320);
        p.homeBuilding = null;
        clearPersonRoute(p);
        p.purpose = 'after-errand';
      }
    } else if (p.state === 'walking') {
      if (p.path && p.path.length) {
        if (advancePersonAlongPath(p, legacySpeed(0.42), dtSec)) {
          onPersonPathArrival(p);
        }
      } else {
        p.x += p.dx * dtSec;
        p.y += p.dy * dtSec;

        const tx = Math.floor(p.x / TILE);
        const ty = Math.floor(p.y / TILE);
        if (!isWalkableTileForPerson(tx, ty)) {
          p.dx = -p.dx;
          p.dy = -p.dy;
          p.x += p.dx * framesToSeconds(2);
          p.y += p.dy * framesToSeconds(2);
        }

        if (p.stateTimer <= 0) {
          p.dx = 0;
          p.dy = 0;
          p.state = 'idle';
          p.stateTimer = randomDuration(40, 120);
          p.purpose = 'idle';
          planPersonGoal(p);
        }
      }
    } else if (p.state === 'idle') {
      if (p.stateTimer <= 0) {
        p.friend = null;
        p.purpose = 'idle';
        if (!planPersonGoal(p)) {
          p.stateTimer = randomDuration(80, 180);
        }
      }
    } else if (p.state === 'chatting') {
      if (p.emoteTimer <= 0) {
        p.emoteTimer = framesToSeconds(50);
        if (rng() < 0.35) {
          effects.push({ x: p.x, y: p.y - 8, type: 'wave', age: 0, maxAge: 24 });
        }
      }
      if (p.stateTimer <= 0) {
        p.state = 'idle';
        p.stateTimer = randomDuration(60, 180);
        p.purpose = 'idle';
        if (p.friend) p.friend.friend = null;
        p.friend = null;
      }
    } else if (p.state === 'rallying' || p.state === 'gathering') {
      if (p.emoteTimer <= 0) {
        p.emoteTimer = p.state === 'rallying' && civicRally.phase === 'finale' ? framesToSeconds(24) : framesToSeconds(45);
        if (rng() < 0.45) {
          const effectType = p.state === 'rallying'
            ? (civicRally.phase === 'forming' ? 'wave' : 'note')
            : (streetGathering.phase === 'finale' ? 'music' : 'wave');
          effects.push({ x: p.x + (rng() - 0.5) * 8, y: p.y - 10, type: effectType, age: 0, maxAge: 26 });
        }
      }
      if (p.stateTimer <= 0 || (p.state === 'rallying' && !civicRally.active) || (p.state === 'gathering' && !streetGathering.active)) {
        p.state = 'idle';
        p.stateTimer = randomDuration(50, 160);
        p.gathering = false;
        p.purpose = 'idle';
      }
    }
  }

  resolvePedestrianOverlap();

  // Birds
  for (let i = birds.length - 1; i >= 0; i--) {
    const b = birds[i];
    b.x += b.dx * dtSec;
    b.y += b.dy * dtSec;
    b.age = (b.age || 0) + dtSec;

    if (b.settling) {
      // Move toward target
      const tdx = b.targetX - b.x;
      const tdy = b.targetY - b.y;
      const dist = Math.sqrt(tdx * tdx + tdy * tdy);
      if (dist < 3) {
        // Settle — chance to plant a seed
        if (rng() < 0.3) {
          const tx = Math.floor(b.targetX / TILE);
          const ty = Math.floor(b.targetY / TILE);
          if (tx >= 0 && tx < MAP_W && ty >= 0 && ty < MAP_H && map[ty][tx] === T.GRASS) {
            trees.push({ x: b.targetX, y: b.targetY, size: 2, color: pick(PAL.tree), hasbird: false, growing: true, growTimer: framesToSeconds(200), growDuration: framesToSeconds(200) });
            map[ty][tx] = T.TREE;
            effects.push({ x: b.targetX, y: b.targetY, type: 'sprout', age: 0, maxAge: 60 });
          }
        }
        birds.splice(i, 1);
        continue;
      }
      b.dx = tdx / dist * legacySpeed(0.8);
      b.dy = tdy / dist * legacySpeed(0.8);
    }

    if (b.x < 0 || b.x > PX_W || b.y < 0 || b.y > PX_H || b.age > framesToSeconds(500)) {
      birds.splice(i, 1);
    }
  }

  // Growing trees
  for (const t of trees) {
    if (t.growing) {
      const growDuration = t.growDuration || framesToSeconds(200);
      t.growTimer -= dtSec;
      if (t.growTimer <= 0) {
        t.growing = false;
        t.size = rngInt(4, 6);
      } else {
        t.size = Math.min(2 + (growDuration - t.growTimer) / framesToSeconds(40), 6);
      }
    }
  }

  // Effects
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].age += dtSec;
    if (effects[i].age >= getEffectMaxAge(effects[i])) effects.splice(i, 1);
  }

  // Building glow
  for (const b of buildings) {
    if (b.glowing) {
      b.glowTimer -= dtSec;
      if (b.glowTimer <= 0) {
        b.glowing = false;
      }
    }

    // Keep room occupancy alive so each window reflects resident presence.
    b.roomTimer -= dtSec;
    if (b.roomTimer <= 0 && b.roomOccupied && b.roomOccupied.length) {
      const toggles = rng() < 0.2 ? 2 : 1;
      for (let i = 0; i < toggles; i++) {
        const idx = rngInt(0, b.roomOccupied.length - 1);
        b.roomOccupied[idx] = !b.roomOccupied[idx];
      }
      b.roomTimer = randomDuration(80, 220);
    }
  }

  cadence.carSpawn -= dtSec;
  if (cadence.carSpawn <= 0) {
    cadence.carSpawn += cadenceIntervals.carSpawn;
    if (cars.length < 100) {
      for (let a = 0; a < 20; a++) {
        const tx = rngInt(0, MAP_W - 1);
        const ty = rngInt(0, MAP_H - 1);
        const tile = map[ty][tx];
        if (tile >= T.ROAD_H && tile <= T.ROAD_X) {
          cars.push(createCarAtRoad(tx, ty, pickDirectionForRoadTile(tile)));
          break;
        }
      }
    }
  }

  cadence.personSpawn -= dtSec;
  if (cadence.personSpawn <= 0) {
    cadence.personSpawn += cadenceIntervals.personSpawn;
    if (people.length < 80) {
      for (let a = 0; a < 20; a++) {
        const tx = rngInt(0, MAP_W - 1);
        const ty = rngInt(0, MAP_H - 1);
        if (map[ty][tx] === T.SIDEWALK) {
          people.push(createPerson(tx * TILE + 8, ty * TILE + 8, {
            state: 'idle',
            stateTimer: randomDuration(20, 120)
          }));
          break;
        }
      }
    }
  }

  cadence.serviceFleet -= dtSec;
  if (cadence.serviceFleet <= 0) {
    cadence.serviceFleet += cadenceIntervals.serviceFleet;
    ensureServiceFleet();
  }

  if (actionCam.incidentId) {
    const target = getIncidentTarget(actionCam.incidentId);
    if (!target) {
      clearActionCam();
    } else {
      const followStrength = 1 - Math.pow(0.0008, dtSec);
      cam.x += (target.x - cam.x) * followStrength;
      cam.y += (target.y - cam.y) * followStrength;
      clampCam();
    }
  }

  audioState.chatterCooldown = Math.max(0, audioState.chatterCooldown - dtSec);
  emitAmbientChatterSounds();
  updateAudioEmitters();

  cadence.stats -= dtSec;
  if (cadence.stats <= 0) {
    cadence.stats += cadenceIntervals.stats;
    updateStats();
  }
}

function updateStats() {
  stats.pop = people.length;
  stats.buildings = buildings.length;
  stats.cars = cars.length;
  stats.trees = trees.length;

  // Happiness derived from balance of parks, traffic flow, population density
  const parkTiles = map.flat().filter(t => t === T.PARK).length;
  const treeFactor = Math.min(trees.length / 50, 1) * 20;
  const parkFactor = Math.min(parkTiles / 40, 1) * 20;
  const trafficFactor = Math.max(0, 20 - cars.filter(c => c.stopped).length);
  const popFactor = Math.min(people.length / 30, 1) * 20;
  const birdFactor = Math.min(birds.length * 2, 10);
  stats.happy = Math.round(Math.min(100, Math.max(0, treeFactor + parkFactor + trafficFactor + popFactor + birdFactor)));

  document.getElementById('stat-pop').textContent = stats.pop;
  document.getElementById('stat-buildings').textContent = stats.buildings;
  document.getElementById('stat-cars').textContent = stats.cars;
  document.getElementById('stat-trees').textContent = stats.trees;
  document.getElementById('stat-happy').textContent = stats.happy;
}

// ═══════════════════════════════════════════════════════
// INTERACTIONS — the heart of emergent gameplay
// ═══════════════════════════════════════════════════════
function interact(worldX, worldY) {
  const tx = Math.floor(worldX / TILE);
  const ty = Math.floor(worldY / TILE);
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return;

  // Check traffic lights first
  for (const tl of trafficLights) {
    if (Math.abs(tl.x - worldX) < 10 && Math.abs(tl.y - worldY) < 10) {
      interactTrafficLight(tl);
      return;
    }
  }

  // Check cars
  for (const car of cars) {
    if (Math.abs(car.x - worldX) < 8 && Math.abs(car.y - worldY) < 8) {
      interactCar(car);
      return;
    }
  }

  // Check people
  for (const p of people) {
    if (Math.abs(p.x - worldX) < 8 && Math.abs(p.y - worldY) < 8) {
      interactPerson(p, worldX, worldY);
      return;
    }
  }

  // Check buildings
  for (const b of buildings) {
    if (worldX >= b.x && worldX < b.x + b.w && worldY >= b.y && worldY < b.y + b.h) {
      interactBuilding(b);
      return;
    }
  }

  // Check trees
  for (const t of trees) {
    if (Math.abs(t.x - worldX) < t.size + 4 && Math.abs(t.y - worldY) < t.size + 4) {
      interactTree(t);
      return;
    }
  }

  // Check water
  const tile = map[ty][tx];
  if (tile === T.WATER) {
    interactWater(worldX, worldY);
    return;
  }

  // Check park
  if (tile === T.PARK) {
    interactPark(worldX, worldY);
    return;
  }

  // Grass — plant a tree
  if (tile === T.GRASS) {
    interactGrass(worldX, worldY, tx, ty);
    return;
  }
}

function interactTrafficLight(tl) {
  tl.state = tl.state === 'red' ? 'green' : 'red';
  tl.timer = randomDuration(180, 400);
  effects.push({ x: tl.x, y: tl.y - 12, type: 'click', age: 0, maxAge: 20 });
  showToast(tl.state === 'green' ? 'Light turned green — traffic flows!' : 'Light turned red — cars queue up');

  // Chain: nearby cars react
  for (const car of cars) {
    const dist = Math.sqrt((car.x - tl.x) ** 2 + (car.y - tl.y) ** 2);
    if (dist < 48) {
      if (tl.state === 'green') {
        car.stopped = false;
        car.stopReason = null;
        car.waiting = 0;
      } else {
        car.stopped = true;
        car.stopReason = 'light';
        car.waiting = 0;
      }
    }
  }
}

function interactCar(car) {
  // Honk! Scare nearby people, cause nearby cars to honk back
  car.honking = true;
  car.honkTimer = framesToSeconds(40);
  effects.push({ x: car.x, y: car.y - 8, type: 'honk', age: 0, maxAge: 35 });
  showToast('HONK! Nearby people scatter');

  // Scare people
  for (const p of people) {
    const dist = Math.sqrt((p.x - car.x) ** 2 + (p.y - car.y) ** 2);
    if (dist < 48) {
      const angle = Math.atan2(p.y - car.y, p.x - car.x);
      clearPersonRoute(p);
      p.friend = null;
      p.dx = Math.cos(angle) * legacySpeed(0.6);
      p.dy = Math.sin(angle) * legacySpeed(0.6);
      p.state = 'walking';
      p.purpose = 'scattering';
      p.stateTimer = randomDuration(60, 150);
      effects.push({ x: p.x, y: p.y - 6, type: 'surprise', age: 0, maxAge: 25 });
    }
  }

  // Chain honk
  for (const c of cars) {
    if (c === car) continue;
    const dist = Math.sqrt((c.x - car.x) ** 2 + (c.y - car.y) ** 2);
    if (dist < 40 && rng() < 0.5) {
      setTimeout(() => {
        c.honking = true;
        c.honkTimer = framesToSeconds(30);
        effects.push({ x: c.x, y: c.y - 8, type: 'honk', age: 0, maxAge: 30 });
      }, 200 + rng() * 300);
    }
  }

  // Speed boost
  car.boostTimer = Math.max(car.boostTimer || 0, framesToSeconds(90));
  car.stopped = false;
  car.stopReason = null;
  car.waiting = 0;
}

function interactPerson(p, wx, wy) {
  if (p.gathering) {
    showToast('This person is enjoying the gathering');
    return;
  }
  // Wave — start a street gathering scene
  effects.push({ x: p.x, y: p.y - 8, type: 'wave', age: 0, maxAge: 40 });
  startStreetGathering(p, true);
}

function attractPeopleToBuilding(building, radius = 88, limit = 6) {
  const door = getDoorPoint(building);
  return recruitPeopleToPoint(door, radius, limit, 'run-errand', person => person.state !== 'medical', (_, index) => ({
    state: 'walking',
    goalBuilding: building,
    homeBuilding: building,
    doorPoint: door,
    stateTimer: randomDuration(260, 520),
    targetPoint: { x: door.x + (rng() - 0.5) * 4, y: door.y + (rng() - 0.5) * 4 + index * 0.1 }
  }));
}

function interactBuilding(b) {
  b.glowing = true;
  b.glowTimer = framesToSeconds(60);
  effects.push({ x: b.x + b.w / 2, y: b.y, type: 'glow', age: 0, maxAge: 40 });

  if (b.type === 'hospital') {
    const attracted = attractPeopleToBuilding(b, 108, 7);
    const ambulance = takeEmergencyVehicle('ambulance');
    if (ambulance && !ambulance.incidentId) {
      ambulance.boostTimer = Math.max(ambulance.boostTimer || 0, framesToSeconds(45));
      sendVehicleToServiceBase(ambulance);
    }
    for (let i = 0; i < 2; i++) {
      const sp = getExitSpawn(b);
      people.push(createPerson(sp.x, sp.y, {
        dx: sp.dx,
        dy: sp.dy,
        shirt: i === 0 ? '#e0e0e0' : '#5aa6ff',
        state: 'walking',
        purpose: 'shift-change',
        stateTimer: randomDuration(120, 260)
      }));
    }
    showToast(attracted > 0 ? '🏥 Hospital shift change! Staff, visitors, and the ambulance converge' : '🏥 Hospital shift change! The ambulance rolls toward the bay');
  } else if (b.type === 'police-station') {
    const policeCar = takeEmergencyVehicle('police');
    if (policeCar && !policeCar.incidentId) {
      policeCar.boostTimer = Math.max(policeCar.boostTimer || 0, framesToSeconds(40));
      sendVehicleToServiceBase(policeCar);
    }
    for (let i = 0; i < 2; i++) {
      const sp = getExitSpawn(b);
      people.push(createPerson(sp.x, sp.y, {
        dx: sp.dx,
        dy: sp.dy,
        shirt: '#4050b0',
        state: 'walking',
        purpose: 'patrol-shift',
        stateTimer: randomDuration(100, 240)
      }));
      effects.push({ x: sp.ex, y: sp.ey, type: 'door', age: 0, maxAge: 20 });
    }
    showToast('🚓 Police briefing! Patrol units regroup at the station');
  } else if (b.type === 'fire-station') {
    const fireTruck = takeEmergencyVehicle('fire');
    if (fireTruck && !fireTruck.incidentId) {
      fireTruck.boostTimer = Math.max(fireTruck.boostTimer || 0, framesToSeconds(40));
      sendVehicleToServiceBase(fireTruck);
    }
    for (let i = 0; i < 2; i++) {
      const sp = getExitSpawn(b);
      people.push(createPerson(sp.x, sp.y, {
        dx: sp.dx,
        dy: sp.dy,
        shirt: '#d84c3a',
        state: 'walking',
        purpose: 'drill',
        stateTimer: randomDuration(100, 240)
      }));
      effects.push({ x: sp.ex, y: sp.ey, type: 'door', age: 0, maxAge: 20 });
    }
    showToast('🚒 Fire station drill! The crew rallies around the engine bay');
  } else if (b.type === 'bank') {
    const attracted = attractPeopleToBuilding(b, 104, 8);
    showToast(attracted > 0 ? '💰 Bank activated! Customers rush in and a money truck is dispatched' : '💰 Bank activated! Money truck dispatched');
    // Spawn a special gold car
    const roadTile = findNearestRoad(b.x, b.y);
    if (roadTile) {
      cars.push(createCarAtRoad(roadTile.x, roadTile.y, pickDirectionForRoadTile(map[roadTile.y][roadTile.x]), legacySpeed(0.6), '#c0a020'));
    }
    // People nearby get happy
    for (const p of people) {
      const dist = Math.sqrt((p.x - b.x - b.w / 2) ** 2 + (p.y - b.y - b.h / 2) ** 2);
      if (dist < 80) {
        effects.push({ x: p.x, y: p.y - 6, type: 'money', age: 0, maxAge: 35 });
      }
    }
  } else if (b.type === 'shop' || b.signText === 'CAFE' || b.signText === 'FOOD') {
    const attracted = attractPeopleToBuilding(b, 80, 6);
    showToast(attracted > 0 ? '🛒 Shop opens! People head inside' : '🛒 Shop opens! The street notices the bustle');
  } else {
    const msgs = [
      'Building lights up! Windows glow warmly',
      'Activity inside — the city buzzes',
      'Residents wave from windows!',
      'Music drifts from an open window'
    ];
    showToast(pick(msgs));

    // Random: spawn a person leaving the building via its exit side
    if (rng() < 0.5) {
      const sp = getExitSpawn(b);
      people.push(createPerson(sp.x, sp.y, {
        dx: sp.dx,
        dy: sp.dy,
        state: 'walking',
        purpose: 'after-errand',
        stateTimer: randomDuration(100, 220)
      }));
      effects.push({ x: sp.ex, y: sp.ey, type: 'door', age: 0, maxAge: 25 });
    }
  }
}

function getExitSpawn(b) {
  const door = getDoorPoint(b);
  const side = b.exitSide || 'bottom';
  switch (side) {
    case 'bottom': return { x: door.x + rngInt(-2, 2), y: door.y, dx: legacySpeed((rng()-0.5)*0.18), dy: legacySpeed(0.2), ex: door.x, ey: door.y };
    case 'top':    return { x: door.x + rngInt(-2, 2), y: door.y, dx: legacySpeed((rng()-0.5)*0.18), dy: legacySpeed(-0.2), ex: door.x, ey: door.y };
    case 'right':  return { x: door.x, y: door.y + rngInt(-2, 2), dx: legacySpeed(0.2), dy: legacySpeed((rng()-0.5)*0.18), ex: door.x, ey: door.y };
    case 'left':   return { x: door.x, y: door.y + rngInt(-2, 2), dx: legacySpeed(-0.2), dy: legacySpeed((rng()-0.5)*0.18), ex: door.x, ey: door.y };
  }
}

function interactTree(t) {
  showToast('🌳 Shaking tree! Birds take flight');

  // Birds fly out
  const numBirds = rngInt(2, 5);
  for (let i = 0; i < numBirds; i++) {
    const angle = rng() * Math.PI * 2;
    const spd = legacySpeed(0.5 + rng() * 0.5);

    // Birds will settle on nearby grass/buildings
    const settleAngle = rng() * Math.PI * 2;
    const settleDist = 40 + rng() * 120;
    const targetX = t.x + Math.cos(settleAngle) * settleDist;
    const targetY = t.y + Math.sin(settleAngle) * settleDist;

    birds.push({
      x: t.x, y: t.y - t.size,
      dx: Math.cos(angle) * spd,
      dy: Math.sin(angle) * spd - legacySpeed(0.3),
      fromTree: t,
      settling: true,
      targetX, targetY,
      age: 0
    });
  }

  // Rustle effect
  effects.push({ x: t.x, y: t.y - t.size - 4, type: 'rustle', age: 0, maxAge: 30 });

  // Chance to drop a fruit / attract people
  if (rng() < 0.3) {
    effects.push({ x: t.x, y: t.y + t.size, type: 'fruit', age: 0, maxAge: 45 });
    for (const p of people) {
      const dist = Math.sqrt((p.x - t.x) ** 2 + (p.y - t.y) ** 2);
      if (dist < 48) {
        const angle = Math.atan2(t.y - p.y, t.x - p.x);
        p.dx = Math.cos(angle) * legacySpeed(0.15);
        p.dy = Math.sin(angle) * legacySpeed(0.15);
      }
    }
  }
}

function interactWater(wx, wy) {
  showToast('💧 Splash! Ripples spread across the pond');
  effects.push({ x: wx, y: wy, type: 'ripple', age: 0, maxAge: 50 });

  // Scare nearby things
  for (const bird of birds) {
    const dist = Math.sqrt((bird.x - wx) ** 2 + (bird.y - wy) ** 2);
    if (dist < 32) {
      bird.dx += (bird.x - wx) / dist * legacySpeed(0.5);
      bird.dy += (bird.y - wy) / dist * legacySpeed(0.5);
    }
  }
}

function interactPark(wx, wy) {
  showToast('🎵 Street performer appears! People gather');
  effects.push({ x: wx, y: wy, type: 'music', age: 0, maxAge: 60 });
  startCivicRally({ x: wx, y: wy }, randomDuration(1200, 1800), false);

  // Attract people
  recruitPeopleToPoint({ x: wx, y: wy }, 96, 8, 'attend-rally', null, (_, index) => ({
    state: 'walking',
    rallyPoint: { x: wx, y: wy },
    stateTimer: randomDuration(900, 1500),
    targetPoint: { x: wx + (rng() - 0.5) * 16, y: wy + (rng() - 0.5) * 16 + index * 0.1 }
  }));
  recruitPeopleToPoint({ x: wx, y: wy }, 96, 2, 'fly-kite', person => person.state !== 'medical', (_, index) => ({
    state: 'walking',
    stateTimer: randomDuration(1000, 1600),
    targetPoint: { x: wx + (index === 0 ? -18 : 18) + (rng() - 0.5) * 6, y: wy + 10 + (rng() - 0.5) * 8 }
  }));

  // Spawn some happy effects
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      effects.push({ x: wx + (rng() - 0.5) * 30, y: wy + (rng() - 0.5) * 30 - 8, type: 'note', age: 0, maxAge: 40 });
    }, i * 200);
  }
}

function interactGrass(wx, wy, tx, ty) {
  // Plant a small tree
  if (rng() < 0.6) {
    trees.push({ x: wx, y: wy, size: 2, color: pick(PAL.tree), hasbird: false, growing: true, growTimer: framesToSeconds(150), growDuration: framesToSeconds(150) });
    map[ty][tx] = T.TREE;
    effects.push({ x: wx, y: wy, type: 'sprout', age: 0, maxAge: 40 });
    showToast('🌱 Planted a sapling! Watch it grow');
  } else {
    showToast('The grass rustles softly');
    effects.push({ x: wx, y: wy, type: 'rustle', age: 0, maxAge: 20 });
  }
}

function findNearestRoad(px, py) {
  const sx = Math.floor(px / TILE);
  const sy = Math.floor(py / TILE);
  for (let r = 1; r < 10; r++) {
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const x = sx + dx, y = sy + dy;
        if (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) {
          const t = map[y][x];
          if (t >= T.ROAD_H && t <= T.ROAD_X) return { x, y };
        }
      }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════
function render() {
  ctx.imageSmoothingEnabled = false;

  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // Camera transform
  const scale = cam.zoom * dpr;
  const offX = W / 2 - cam.x * scale;
  const offY = H / 2 - cam.y * scale;
  ctx.setTransform(scale, 0, 0, scale, offX, offY);

  // Visible tile range for culling
  const vx0 = Math.max(0, Math.floor((cam.x - W / 2 / cam.zoom / dpr) / TILE) - 1);
  const vy0 = Math.max(0, Math.floor((cam.y - H / 2 / cam.zoom / dpr) / TILE) - 1);
  const vx1 = Math.min(MAP_W - 1, Math.ceil((cam.x + W / 2 / cam.zoom / dpr) / TILE) + 1);
  const vy1 = Math.min(MAP_H - 1, Math.ceil((cam.y + H / 2 / cam.zoom / dpr) / TILE) + 1);

  // Draw tiles
  for (let y = vy0; y <= vy1; y++) {
    for (let x = vx0; x <= vx1; x++) {
      const px = x * TILE;
      const py = y * TILE;
      const tile = map[y][x];

      switch (tile) {
        case T.GRASS:
          ctx.fillStyle = PAL.grass[(x * 7 + y * 13) % PAL.grass.length];
          ctx.fillRect(px, py, TILE, TILE);
          // Random grass detail
          if ((x + y * 3) % 7 === 0) {
            ctx.fillStyle = PAL.grassDark[(x + y) % 2];
            ctx.fillRect(px + 4, py + 6, 2, 2);
            ctx.fillRect(px + 10, py + 3, 2, 2);
          }
          break;

        case T.ROAD_H:
        case T.ROAD_V:
        case T.ROAD_X:
          // Road base
          ctx.fillStyle = PAL.road;
          ctx.fillRect(px, py, TILE, TILE);
          // Road edges
          ctx.fillStyle = PAL.roadEdge;
          if (tile === T.ROAD_H || tile === T.ROAD_X) {
            ctx.fillRect(px, py, TILE, 1);
            ctx.fillRect(px, py + TILE - 1, TILE, 1);
          }
          if (tile === T.ROAD_V || tile === T.ROAD_X) {
            ctx.fillRect(px, py, 1, TILE);
            ctx.fillRect(px + TILE - 1, py, 1, TILE);
          }
          // Center line
          if (tile === T.ROAD_H && x % 3 === 0) {
            ctx.fillStyle = PAL.roadMark;
            ctx.fillRect(px + 3, py + 7, 6, 2);
          }
          if (tile === T.ROAD_V && y % 3 === 0) {
            ctx.fillStyle = PAL.roadMark;
            ctx.fillRect(px + 7, py + 3, 2, 6);
          }
          break;

        case T.SIDEWALK:
          ctx.fillStyle = PAL.sidewalk;
          ctx.fillRect(px, py, TILE, TILE);
          // Pavement texture
          if ((x + y) % 4 === 0) {
            ctx.fillStyle = '#9a968a';
            ctx.fillRect(px + 2, py + 2, 1, 1);
            ctx.fillRect(px + 10, py + 12, 1, 1);
          }
          break;

        case T.BUILDING:
          // Handled in building pass
          break;

        case T.TREE:
          // Ground under tree
          ctx.fillStyle = PAL.grass[(x * 7 + y * 13) % PAL.grass.length];
          ctx.fillRect(px, py, TILE, TILE);
          break;

        case T.WATER:
          ctx.fillStyle = PAL.water[(x + y + Math.floor(worldTime * 2)) % PAL.water.length];
          ctx.fillRect(px, py, TILE, TILE);
          // Wave highlight
          if ((x + Math.floor(worldTime * 3)) % 4 === 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(px + 2, py + ((Math.floor(worldTime * 6) + y) % TILE | 0), 4, 1);
          }
          break;

        case T.PARK:
          ctx.fillStyle = PAL.park;
          ctx.fillRect(px, py, TILE, TILE);
          // Flower dots
          if ((x * 3 + y * 7) % 11 === 0) {
            ctx.fillStyle = '#e04060';
            ctx.fillRect(px + 5, py + 5, 2, 2);
          }
          if ((x * 5 + y * 2) % 9 === 0) {
            ctx.fillStyle = '#e0e040';
            ctx.fillRect(px + 10, py + 9, 2, 2);
          }
          break;

        case T.PARKING:
          ctx.fillStyle = PAL.parking;
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = PAL.parkLine;
          ctx.fillRect(px, py, 1, TILE);
          ctx.fillRect(px + TILE - 1, py, 1, TILE);
          break;
      }
    }
  }

  // Buildings (sorted by y for overlap)
  const sortedBuildings = buildings.filter(b => {
    return b.x + b.w > vx0 * TILE && b.x < (vx1 + 1) * TILE &&
           b.y + b.h > vy0 * TILE && b.y < (vy1 + 1) * TILE;
  }).sort((a, b) => a.y - b.y);

  for (const b of sortedBuildings) {
    drawBuilding(b);
  }

  // Trees
  for (const t of trees) {
    if (t.x > vx0 * TILE - 16 && t.x < (vx1 + 1) * TILE + 16 &&
        t.y > vy0 * TILE - 16 && t.y < (vy1 + 1) * TILE + 16) {
      drawTree(t);
    }
  }

  // Cars
  const visibleCars = cars.filter(car => car.x > vx0 * TILE - 16 && car.x < (vx1 + 1) * TILE + 16 &&
        car.y > vy0 * TILE - 16 && car.y < (vy1 + 1) * TILE + 16);
  for (const car of visibleCars) {
    if (car.vehicleType === 'police' || car.vehicleType === 'ambulance' || car.vehicleType === 'fire' || car.incidentId) continue;
    drawCar(car);
  }
  for (const car of visibleCars) {
    if (!(car.vehicleType === 'police' || car.vehicleType === 'ambulance' || car.vehicleType === 'fire' || car.incidentId)) continue;
    drawCar(car);
  }

  // People
  for (const p of people) {
    if (p.state === 'inside') continue;
    if (p.x > vx0 * TILE - 8 && p.x < (vx1 + 1) * TILE + 8 &&
        p.y > vy0 * TILE - 8 && p.y < (vy1 + 1) * TILE + 8) {
      drawPerson(p);
    }
  }

  // Birds
  for (const b of birds) {
    drawBird(b);
  }

  // Traffic lights
  for (const tl of trafficLights) {
    if (tl.x > vx0 * TILE - 8 && tl.x < (vx1 + 1) * TILE + 8 &&
        tl.y > vy0 * TILE - 8 && tl.y < (vy1 + 1) * TILE + 8) {
      drawTrafficLight(tl);
    }
  }

  // Effects
  for (const e of effects) {
    drawEffect(e);
  }
}

function drawBuilding(b) {
  const style = b.visualStyle || {};
  const wallColor = b.glowing ? lightenColor(style.wallColor || b.color, 34) : (style.wallColor || b.color);
  const roofColor = b.glowing ? lightenColor(style.roofColor || b.roofColor, 20) : (style.roofColor || b.roofColor);
  const roofHeight = clamp(style.roofHeight || Math.round(b.h * 0.42), 6, Math.max(6, b.h - 8));
  const faceY = b.y + roofHeight;
  const faceH = Math.max(8, b.h - roofHeight);
  const frontDoorW = Math.max(6, Math.min(10, b.w - 8));
  const frontDoorH = Math.max(6, Math.min(faceH - 2, 10));
  const frontDoorX = b.x + Math.floor((b.w - frontDoorW) / 2);
  const frontDoorY = b.y + b.h - frontDoorH;
  const shadowOff = 2;

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(b.x + shadowOff, b.y + shadowOff, b.w, b.h);

  ctx.fillStyle = wallColor;
  ctx.fillRect(b.x, faceY, b.w, faceH);
  ctx.fillStyle = style.wallHighlight || lightenColor(wallColor, 18);
  ctx.fillRect(b.x, faceY, 2, faceH);
  ctx.fillStyle = style.wallShadow || darkenColor(wallColor, 22);
  ctx.fillRect(b.x + b.w - 2, faceY, 2, faceH);

  ctx.fillStyle = roofColor;
  ctx.fillRect(b.x - 1, b.y, b.w + 2, roofHeight + 1);
  ctx.fillStyle = style.roofHighlight || lightenColor(roofColor, 14);
  ctx.fillRect(b.x - 1, b.y, b.w + 2, 2);
  ctx.fillStyle = style.roofShade || darkenColor(roofColor, 18);
  ctx.fillRect(b.x - 1, faceY - 2, b.w + 2, 3);

  for (let stripeY = b.y + 3; stripeY < faceY - 3; stripeY += 4) {
    ctx.fillStyle = stripeY % 8 === 3 ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)';
    ctx.fillRect(b.x + 1, stripeY, b.w - 2, 1);
  }

  for (const feature of style.roofFeatures || []) {
    const toneBase = '#8e8f92';
    const bodyColor = feature.tone >= 0 ? lightenColor(toneBase, feature.tone) : darkenColor(toneBase, -feature.tone);
    ctx.fillStyle = bodyColor;
    ctx.fillRect(feature.x, feature.y, feature.w, feature.h);
    ctx.fillStyle = lightenColor(bodyColor, 14);
    ctx.fillRect(feature.x, feature.y, feature.w, 1);
    ctx.fillStyle = darkenColor(bodyColor, 18);
    if (feature.kind === 'vent') {
      for (let slat = feature.x + 1; slat < feature.x + feature.w - 1; slat += 2) {
        ctx.fillRect(slat, feature.y + 1, 1, Math.max(1, feature.h - 2));
      }
    } else if (feature.kind === 'ac') {
      ctx.fillRect(feature.x + 1, feature.y + feature.h - 1, feature.w - 2, 1);
      ctx.fillStyle = '#50565c';
      ctx.fillRect(feature.x + 1, feature.y + 1, Math.max(1, feature.w - 2), 1);
    } else {
      ctx.fillRect(feature.x + 1, feature.y + 1, feature.w - 2, 1);
      ctx.fillRect(feature.x + feature.w - 2, feature.y + 1, 1, feature.h - 1);
    }
  }

  const wRows = b.windowRows || Math.max(1, b.floors);
  const wCols = b.windowCols || Math.max(1, Math.floor((b.w - 8) / 7));
  const windowBandTop = faceY + 4;
  const windowBandHeight = Math.max(5, faceH - 10);
  const slotWidth = Math.max(6, Math.floor((b.w - 6) / Math.max(1, wCols)));
  const slotHeight = Math.max(6, Math.floor(windowBandHeight / Math.max(1, wRows)));
  for (let wy = 0; wy < wRows; wy++) {
    for (let wx = 0; wx < wCols; wx++) {
      const winX = b.x + 3 + wx * slotWidth;
      const winY = windowBandTop + wy * slotHeight;
      const roomIdx = wy * wCols + wx;
      const occupied = b.roomOccupied ? b.roomOccupied[roomIdx] : true;
      const tint = b.roomTint ? b.roomTint[roomIdx] : 0;
      ctx.fillStyle = style.frameColor || darkenColor(wallColor, 36);
      ctx.fillRect(winX - 1, winY - 1, 5, 5);
      ctx.fillStyle = occupied ? PAL.window[tint % PAL.window.length] : PAL.windowDark;
      ctx.fillRect(winX, winY, 3, 3);
      ctx.fillStyle = style.sillColor || darkenColor(wallColor, 24);
      ctx.fillRect(winX - 1, winY + 3, 5, 1);
    }
  }

  ctx.fillStyle = '#2b1e15';
  ctx.fillRect(frontDoorX, frontDoorY, frontDoorW, frontDoorH);
  ctx.fillStyle = '#5f4430';
  ctx.fillRect(frontDoorX + 1, frontDoorY + 1, Math.max(1, Math.floor(frontDoorW / 2) - 1), frontDoorH - 1);
  ctx.fillRect(frontDoorX + Math.floor(frontDoorW / 2), frontDoorY + 1, Math.max(1, Math.floor(frontDoorW / 2) - 1), frontDoorH - 1);
  ctx.fillStyle = '#cab39a';
  ctx.fillRect(frontDoorX + Math.floor(frontDoorW / 2) - 1, frontDoorY + 1, 1, frontDoorH - 2);

  if (b.hasSign && b.signText) {
    const signW = Math.min(b.w - 6, Math.max(18, b.signText.length * 4 + 8));
    const signX = b.x + Math.floor((b.w - signW) / 2);
    const signY = faceY + 2;
    ctx.fillStyle = 'rgba(0,0,0,0.16)';
    ctx.fillRect(signX + 1, signY + 1, signW, 8);
    ctx.fillStyle = style.signBorder || darkenColor(wallColor, 26);
    ctx.fillRect(signX - 1, signY - 1, signW + 2, 8);
    ctx.fillStyle = style.signPanel || '#e0ddd4';
    ctx.fillRect(signX, signY, signW, 6);
    ctx.fillStyle = style.signBorder || darkenColor(wallColor, 26);
    ctx.fillRect(signX + 2, signY + 6, 1, 3);
    ctx.fillRect(signX + signW - 3, signY + 6, 1, 3);
    ctx.fillStyle = '#1a1a1a';
    drawPixelText(b.signText, signX + Math.max(2, Math.floor((signW - b.signText.length * 4) / 2)), signY + 1);
  }

  const doorRect = getDoorRect(b);
  ctx.fillStyle = PAL.door;
  ctx.fillRect(doorRect.x, doorRect.y, doorRect.w, doorRect.h);
}

function drawPixelText(text, x, y) {
  // Ultra-tiny 3x4 pixel font for signs
  const chars = {
    'A': [0b111,0b101,0b111,0b101], 'B': [0b110,0b111,0b101,0b111],
    'C': [0b111,0b100,0b100,0b111], 'D': [0b110,0b101,0b101,0b110],
    'E': [0b111,0b110,0b100,0b111], 'F': [0b111,0b110,0b100,0b100],
    'G': [0b111,0b100,0b101,0b111], 'H': [0b101,0b111,0b101,0b101],
    'I': [0b111,0b010,0b010,0b111], 'K': [0b101,0b110,0b110,0b101],
    'L': [0b100,0b100,0b100,0b111], 'M': [0b101,0b111,0b111,0b101],
    'N': [0b101,0b111,0b111,0b101], 'O': [0b111,0b101,0b101,0b111],
    'P': [0b111,0b101,0b111,0b100], 'R': [0b111,0b101,0b110,0b101],
    'S': [0b111,0b100,0b111,0b111], 'T': [0b111,0b010,0b010,0b010],
    'W': [0b101,0b101,0b111,0b111], 'U': [0b101,0b101,0b101,0b111],
  };
  for (let ci = 0; ci < text.length; ci++) {
    const glyph = chars[text[ci]];
    if (!glyph) continue;
    for (let row = 0; row < 4; row++) {
      const bits = glyph[row];
      for (let col = 0; col < 3; col++) {
        if (bits & (4 >> col)) {
          ctx.fillRect(x + ci * 4 + col, y + row, 1, 1);
        }
      }
    }
  }
}

function drawTree(t) {
  // Trunk
  ctx.fillStyle = PAL.treeTrunk;
  ctx.fillRect(t.x - 1, t.y, 2, t.size);

  // Canopy
  ctx.fillStyle = t.color;
  const r = t.size;
  // Diamond shape for pixel look
  for (let dy = -r; dy <= r; dy++) {
    const hw = r - Math.abs(dy);
    ctx.fillRect(t.x - hw, t.y - r + dy - 2, hw * 2 + 1, 1);
  }

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(t.x - 1, t.y - r - 1, 2, 2);
}

function drawCar(car) {
  ctx.fillStyle = car.color;
  if (car.dir === 0 || car.dir === 2) {
    // Horizontal car
    ctx.fillRect(car.x - 4, car.y - 2, 8, 5);
    // Windshield
    ctx.fillStyle = '#a0c8e0';
    ctx.fillRect(car.dir === 0 ? car.x + 2 : car.x - 3, car.y - 1, 2, 3);
  } else {
    // Vertical car
    ctx.fillRect(car.x - 2, car.y - 4, 5, 8);
    ctx.fillStyle = '#a0c8e0';
    ctx.fillRect(car.x - 1, car.dir === 1 ? car.y + 2 : car.y - 3, 3, 2);
  }

  // Brake lights when stopped
  if (car.stopped) {
    ctx.fillStyle = '#ff2020';
    if (car.dir === 0) ctx.fillRect(car.x - 4, car.y - 1, 1, 3);
    else if (car.dir === 2) ctx.fillRect(car.x + 3, car.y - 1, 1, 3);
    else if (car.dir === 1) ctx.fillRect(car.x - 1, car.y - 4, 3, 1);
    else ctx.fillRect(car.x - 1, car.y + 3, 3, 1);
  }

  if (car.sirenKind || car.vehicleType === 'police' || car.vehicleType === 'ambulance' || car.vehicleType === 'fire') {
    const flashFrame = Math.floor(worldTime * 8 + (car.flashPhase || 0)) % 2;
    const cold = car.vehicleType === 'ambulance' ? '#4fc3ff' : '#4fa0ff';
    const warm = car.vehicleType === 'fire' ? '#ffd24f' : '#ff5050';
    if (car.dir === 0 || car.dir === 2) {
      ctx.fillStyle = '#182028';
      ctx.fillRect(car.x - 1, car.y - 1, 2, 3);
      ctx.fillStyle = flashFrame === 0 ? warm : cold;
      ctx.fillRect(car.x - 1, car.y - 1, 2, 1);
      ctx.fillStyle = flashFrame === 0 ? cold : warm;
      ctx.fillRect(car.x - 1, car.y + 1, 2, 1);
    } else {
      ctx.fillStyle = '#182028';
      ctx.fillRect(car.x - 1, car.y - 1, 3, 2);
      ctx.fillStyle = flashFrame === 0 ? warm : cold;
      ctx.fillRect(car.x - 1, car.y - 1, 1, 2);
      ctx.fillStyle = flashFrame === 0 ? cold : warm;
      ctx.fillRect(car.x + 1, car.y - 1, 1, 2);
    }
  }
}

function drawPerson(p) {
  if (p.state === 'kite-prep' || p.state === 'kite-flying') {
    const sway = Math.sin((p.kiteSway || 0) + worldTime * 1.8);
    const kiteY = p.y - (p.kiteHeight || 22) - 10 - sway * 3;
    const kiteX = p.x + 18 + sway * 8;
    ctx.strokeStyle = 'rgba(80,80,80,0.8)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x + 1, p.y - 1);
    ctx.lineTo(kiteX, kiteY);
    ctx.stroke();
    ctx.fillStyle = '#f0d050';
    ctx.fillRect(kiteX - 2, kiteY - 2, 4, 4);
    ctx.fillStyle = '#d04060';
    ctx.fillRect(kiteX - 1, kiteY - 3, 2, 1);
    ctx.fillRect(kiteX - 3, kiteY - 1, 1, 2);
    ctx.fillRect(kiteX + 2, kiteY - 1, 1, 2);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(kiteX - 1, kiteY + 2, 2, 1);
  }

  // Head
  ctx.fillStyle = p.skin;
  ctx.fillRect(p.x - 1, p.y - 3, 3, 3);
  // Body
  ctx.fillStyle = p.shirt;
  ctx.fillRect(p.x - 1, p.y, 3, 3);

  // Walking animation
  if (p.state === 'walking' && Math.floor(worldTime * 12) % 2 === 0) {
    ctx.fillRect(p.x - 2, p.y + 3, 1, 1);
    ctx.fillRect(p.x + 2, p.y + 3, 1, 1);
  } else {
    ctx.fillRect(p.x - 1, p.y + 3, 1, 1);
    ctx.fillRect(p.x + 1, p.y + 3, 1, 1);
  }
}

function drawBird(b) {
  ctx.fillStyle = '#2a2a2a';
  // Simple V shape
  const flap = Math.sin(worldTime * 18) > 0;
  ctx.fillRect(b.x - 2, b.y + (flap ? -1 : 0), 1, 1);
  ctx.fillRect(b.x - 1, b.y, 1, 1);
  ctx.fillRect(b.x, b.y, 1, 1);
  ctx.fillRect(b.x + 1, b.y, 1, 1);
  ctx.fillRect(b.x + 2, b.y + (flap ? -1 : 0), 1, 1);
}

function drawTrafficLight(tl) {
  // Post
  ctx.fillStyle = '#404040';
  ctx.fillRect(tl.x - 1, tl.y - 8, 2, 10);
  // Light housing
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(tl.x - 2, tl.y - 10, 4, 6);
  // Light
  ctx.fillStyle = tl.state === 'red' ? '#ff3030' : '#30ff30';
  ctx.fillRect(tl.x - 1, tl.y - (tl.state === 'red' ? 9 : 7), 2, 2);
  // Glow
  ctx.fillStyle = tl.state === 'red' ? 'rgba(255,48,48,0.15)' : 'rgba(48,255,48,0.15)';
  ctx.fillRect(tl.x - 4, tl.y - 12, 8, 8);
}

function drawEffect(e) {
  const progress = e.age / getEffectMaxAge(e);
  const alpha = Math.max(0, 1 - progress);

  ctx.globalAlpha = alpha;

  switch (e.type) {
    case 'honk':
      ctx.fillStyle = '#ffff60';
      drawPixelText('HONK', e.x - 8, e.y - progress * 12);
      break;

    case 'surprise':
      ctx.fillStyle = '#ff6060';
      ctx.fillRect(e.x, e.y - progress * 10, 2, 3);
      ctx.fillRect(e.x, e.y - progress * 10 + 4, 2, 1);
      break;

    case 'wave':
      ctx.fillStyle = '#60c0ff';
      const waveR = 4 + progress * 12;
      ctx.beginPath();
      ctx.arc(e.x, e.y, waveR, 0, Math.PI * 2);
      ctx.stroke();
      break;

    case 'glow':
      ctx.fillStyle = `rgba(255,200,60,${alpha * 0.3})`;
      ctx.fillRect(e.x - 12, e.y - 8, 24, 16);
      break;

    case 'money':
      ctx.fillStyle = '#40c040';
      drawPixelText('$', e.x, e.y - progress * 14);
      break;

    case 'click':
      ctx.fillStyle = '#ffffff';
      const cr = 2 + progress * 6;
      ctx.fillRect(e.x - cr, e.y, cr * 2, 1);
      ctx.fillRect(e.x, e.y - cr, 1, cr * 2);
      break;

    case 'sprout':
      ctx.fillStyle = '#60c060';
      const sh = 2 + progress * 4;
      ctx.fillRect(e.x, e.y - sh, 1, sh);
      ctx.fillRect(e.x - 1, e.y - sh, 1, 1);
      ctx.fillRect(e.x + 1, e.y - sh, 1, 1);
      break;

    case 'rustle':
      ctx.fillStyle = '#80c080';
      for (let i = 0; i < 4; i++) {
        const ra = (i / 4) * Math.PI * 2 + progress * 2;
        ctx.fillRect(e.x + Math.cos(ra) * (4 + progress * 6), e.y + Math.sin(ra) * (4 + progress * 6), 2, 2);
      }
      break;

    case 'fruit':
      ctx.fillStyle = '#ff6030';
      ctx.fillRect(e.x - 1, e.y + progress * 6, 3, 3);
      break;

    case 'ripple':
      ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.4})`;
      ctx.lineWidth = 0.5;
      const rr = 3 + progress * 20;
      ctx.beginPath();
      ctx.arc(e.x, e.y, rr, 0, Math.PI * 2);
      ctx.stroke();
      if (progress > 0.3) {
        ctx.beginPath();
        ctx.arc(e.x, e.y, rr * 0.5, 0, Math.PI * 2);
        ctx.stroke();
      }
      break;

    case 'music':
    case 'note':
      ctx.fillStyle = '#e060c0';
      const ny = e.y - progress * 16;
      ctx.fillRect(e.x, ny, 2, 4);
      ctx.fillRect(e.x - 1, ny, 1, 2);
      break;

    case 'door':
      ctx.fillStyle = '#c0a060';
      ctx.fillRect(e.x - 2, e.y - 1, 4, 1);
      break;

    case 'smoke': {
      const size = e.size || 1;
      const puff = (8 + progress * 18) * size;
      const rise = progress * (30 + 10 * size);
      ctx.fillStyle = `rgba(34,34,34,${alpha * 0.48})`;
      ctx.fillRect(e.x - puff * 0.6, e.y - rise, puff, 5 * size);
      ctx.fillStyle = `rgba(62,62,62,${alpha * 0.36})`;
      ctx.fillRect(e.x - puff * 0.42, e.y - rise - 5 * size, puff * 0.82, 5 * size);
      ctx.fillStyle = `rgba(94,94,94,${alpha * 0.24})`;
      ctx.fillRect(e.x - puff * 0.3, e.y - rise - 10 * size, puff * 0.58, 4 * size);
      break;
    }

    case 'spray': {
      ctx.strokeStyle = `rgba(120,220,255,${alpha * 0.8})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(e.x, e.y);
      ctx.lineTo(e.tx, e.ty);
      ctx.stroke();
      break;
    }
  }

  ctx.globalAlpha = 1;
}

function lightenColor(hex, amt) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + amt);
  const g = Math.min(255, ((num >> 8) & 0xff) + amt);
  const b = Math.min(255, (num & 0xff) + amt);
  return `rgb(${r},${g},${b})`;
}

function darkenColor(hex, amt) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, (num >> 16) - amt);
  const g = Math.max(0, ((num >> 8) & 0xff) - amt);
  const b = Math.max(0, (num & 0xff) - amt);
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════
// CAMERA & INPUT
// ═══════════════════════════════════════════════════════
function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W = window.innerWidth * dpr;
  canvas.height = H = window.innerHeight * dpr;
}

function screenToWorld(sx, sy) {
  const dpr = window.devicePixelRatio || 1;
  const scale = cam.zoom * dpr;
  const offX = W / 2 - cam.x * scale;
  const offY = H / 2 - cam.y * scale;
  return {
    x: (sx * dpr - offX) / scale,
    y: (sy * dpr - offY) / scale
  };
}

function clampCam() {
  const margin = 64;
  cam.x = Math.max(-margin, Math.min(PX_W + margin, cam.x));
  cam.y = Math.max(-margin, Math.min(PX_H + margin, cam.y));
  cam.zoom = Math.max(cam.minZoom, Math.min(cam.maxZoom, cam.zoom));
}

function isTrackpadWheelEvent(event) {
  return event.deltaMode === 0 && (Math.abs(event.deltaY) < 80 || Math.abs(event.deltaX) > 0.01);
}

function zoomAt(sx, sy, factor) {
  const before = screenToWorld(sx, sy);
  cam.zoom *= factor;
  clampCam();
  const after = screenToWorld(sx, sy);
  cam.x -= (after.x - before.x);
  cam.y -= (after.y - before.y);
  clampCam();
}

function resetZoom() {
  zoomAt(window.innerWidth / 2, window.innerHeight / 2, 2 / cam.zoom);
}

function updateTrackpadZoom(dtSec) {
  if (!trackpadZoom.active) return;
  if (Math.abs(trackpadZoom.velocity) < 0.001) {
    trackpadZoom.velocity = 0;
