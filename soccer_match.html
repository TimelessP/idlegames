<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="manifest" href="manifest.webmanifest">
<meta name="application-name" content="IdleGames">
<meta name="theme-color" content="#000000">
<meta name="description" content="Procedural Cup Final is a procedural soccer demo with commentary, fullscreen controls, and dynamic team play.">
<script src="assets/js/pwa.js" defer></script>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Procedural Cup Final</title>
<style>
  :root{
    --gold:#ffd166;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    width:100%; height:100%;
    font-family:'Segoe UI',Arial,sans-serif;
    background:#000;
    color:#eee;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #stage{
    position:relative;
    background:#000;
    overflow:hidden;
    flex:none; /* wider than the viewport on portrait — must not be flex-shrunk */
  }
  #pitch{
    width:100%;
    height:100%;
    display:block;
  }
  #scoreOverlay{
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    /* the stage can be wider than the viewport (portrait cover) — keep the
       scoreboard within the visible central band */
    width:min(100vw,100%);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 22px;
    background:linear-gradient(180deg,rgba(9,18,13,.85),rgba(9,18,13,0));
    font-weight:700;
    pointer-events:none;
  }
  .teamName{font-size:clamp(13px,1.7vw,18px); display:flex; align-items:center; gap:8px; text-shadow:0 2px 4px #000;}
  .swatch{width:13px;height:13px;border-radius:3px;display:inline-block;border:1px solid #0007;}
  #score{font-size:clamp(20px,3.2vw,32px); letter-spacing:2px; color:var(--gold); text-shadow:0 2px 4px #000;}
  #statsOverlay{
    position:absolute;
    top:56px; left:50%;
    transform:translateX(-50%);
    pointer-events:none;
  }
  #statsOverlay span{
    display:inline-block;
    background:rgba(0,0,0,.5);
    padding:4px 16px;
    border-radius:6px;
    font-size:clamp(11px,1.5vw,15px);
    font-weight:600;
    color:#cfe8d8;
    text-shadow:0 2px 3px #000;
    white-space:nowrap;
    transition:opacity .18s ease;
  }
  #subtitle{
    position:absolute;
    left:50%; bottom:5%;
    transform:translateX(-50%);
    /* clamp to the visible band so long lines wrap instead of running into the
       cropped stage edges; bottom-anchored so wrapped text grows upward */
    width:min(100vw,100%);
    display:flex; justify-content:center;
    pointer-events:none;
  }
  #subtitle span{
    background:rgba(0,0,0,.55);
    padding:6px 16px;
    border-radius:6px;
    font-size:clamp(14px,2.4vw,22px);
    font-weight:800;
    color:#fff;
    text-shadow:0 2px 3px #000, 0 0 2px #000;
    text-align:center;
    max-width:92%;
    transition:opacity .15s ease;
  }
  #banner{
    position:absolute;
    top:36%;
    left:50%;
    width:min(100vw,100%);
    text-align:center;
    font-size:clamp(28px,6vw,54px);
    font-weight:900;
    color:var(--gold);
    text-shadow:0 0 10px #000,0 0 22px #000, 0 3px 0 #000;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    transform:translateX(-50%) scale(.85);
    pointer-events:none;
    letter-spacing:2px;
  }
  #banner.show{opacity:1; transform:translateX(-50%) scale(1);}
  #banner .bannerLine{
    margin-top:14px;
    font-size:clamp(15px,2.6vw,24px);
    font-weight:700;
    letter-spacing:.5px;
    color:#fff;
  }
  #banner .bannerTable{
    display:inline-grid;
    grid-template-columns:auto auto;
    column-gap:.9em;
    row-gap:2px;
    margin-top:16px;
    font-size:clamp(16px,3vw,28px);
    line-height:1.25;
    letter-spacing:.5px;
  }
  #banner .bt-n{text-align:left;}
  #banner .bt-s{text-align:right;font-variant-numeric:tabular-nums;}
  #fsWrap{
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    width:min(100vw,100%);
    height:100%;
    pointer-events:none;
  }
  .glassBtn{
    position:absolute;
    /* bottom edge sits just above the ad boards (board top = 78/560 of stage height) */
    top:max(10px, calc(13.93% - 50px));
    width:42px; height:42px;
    padding:0;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.09);
    border:1px solid rgba(255,255,255,0.28);
    backdrop-filter:blur(9px) saturate(150%);
    -webkit-backdrop-filter:blur(9px) saturate(150%);
    box-shadow:0 4px 14px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
    color:#eee;
    cursor:pointer;
    pointer-events:auto;
    transition:background .2s ease, transform .15s ease, opacity .2s ease;
  }
  .glassBtn:hover{background:rgba(255,255,255,0.18);}
  .glassBtn:active{transform:scale(.92);}
  .glassBtn svg{width:20px; height:20px; display:block;}
  .glassBtn.dim{opacity:.55;}
  #fsBtn{right:16px;}
  #audioBtn{right:66px;}
  #newGameBtn{right:166px;}
  #voiceBtn{
    right:116px;
    font-family:inherit;
    font-size:10px;
    font-weight:700;
    letter-spacing:.3px;
    text-shadow:0 1px 2px #000;
  }
</style>
</head>

    <div class="teamName"><span class="swatch" id="sw0"></span><span id="name0">Team A</span></div>

  </div>
  <div id="statsOverlay"><span id="statsText">Half 1 · 0:00</span></div>
  <div id="fsWrap">
    <button id="newGameBtn" class="glassBtn" aria-label="New game" title="New game">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v6h6M20 20v-6h-6M5 4a9 9 0 0 1 2.5-1.5 9 9 0 1 1 0 17.5A9 9 0 0 1 5 20"/></svg>

    <button id="voiceBtn" class="glassBtn" aria-label="Commentator voice" title="Commentator voice">Web</button>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path id="audioIcon" d="M11 5 6 9H3v6h3l5 4V5zM16 9l6 6M22 9l-6 6"/></svg>
    </button>
    <button id="fsBtn" class="glassBtn" aria-label="Toggle fullscreen" title="Toggle fullscreen">

const rand=(a,b)=>a+Math.random()*(b-a);
const randInt=(a,b)=>Math.floor(rand(a,b+1));
const choice=arr=>arr[Math.floor(Math.random()*arr.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(x1,y1,x2,y2)=>Math.hypot(x1-x2,y1-y2);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function hexRgb(hex){const m=/^#?([0-9a-f]{6})$/i.exec(hex);return m?[parseInt(m[1].slice(0,2),16),parseInt(m[1].slice(2,4),16),parseInt(m[1].slice(4,6),16)]:[0,0,0];}
function colorDistance(c1,c2){const dx=c1[0]-c2[0], dy=c1[1]-c2[1], dz=c1[2]-c2[2]; return Math.sqrt(dx*dx+dy*dy+dz*dz);}
function chooseTeamColorPair(){
  const MIN_DIST=120;
  const distinctPairs = COLOR_PAIRS.filter(pair=> colorDistance(hexRgb(pair[0]), hexRgb(pair[1])) >= MIN_DIST);
  const pool = distinctPairs.length ? distinctPairs : COLOR_PAIRS;
  return shuffle(choice(pool).slice());
}

/* ---------- world constants ---------- */
const FW=1000, FH=640;
const GOAL_Y0=260, GOAL_Y1=380, GOAL_H=95;
const BOX_X=130, BOX_Y0=170, BOX_Y1=470;
const SIX_X=55, SIX_Y0=250, SIX_Y1=390;
const CENTER_R=70;
const GRAVITY=-980;
const CAPTURE_R=16;
const PRESSURE_R=34;

const CW=960, CH=560, TOP_PAD=112, BOTTOM_PAD=26;
const NEAR_SCALE=1.32, FAR_SCALE=0.66, CAM_SCALE=1.32;
const END_QUARTER=FW/4, MAX_ZOOM=2;

function worldToScreen(x,y,z){
  z=z||0;
  const depthT=y/FH;
  const scale=lerp(NEAR_SCALE,FAR_SCALE,depthT)*cam.zoom;
  const sy=lerp(CH-BOTTOM_PAD,TOP_PAD,depthT) - z*scale*0.85;
  const sx=CW/2 + (x-cam.x)*CAM_SCALE*scale;
  return {x:sx,y:sy,scale:scale};
}

/* ---------- team setup ---------- */
let countryQueue=shuffle(COUNTRIES.slice());
function nextCountries(){
  if(countryQueue.length<2) countryQueue=shuffle(COUNTRIES.slice());
  return [countryQueue.pop(), countryQueue.pop()];
}

let teamCountries=[], teamColors=[], namePool=[], nameCursor=0;
function nextName(){return namePool[(nameCursor++)%namePool.length];}

function applyTeams(cA,cB){
  teamCountries=[cA,cB];
  const colorPair=chooseTeamColorPair();
  teamColors=[colorPair[0],colorPair[1]];
  namePool=shuffle(FIRST_NAMES.slice()); nameCursor=0;
  buildPlayers();
  document.getElementById('name0').textContent=teamCountries[0];
  document.getElementById('name1').textContent=teamCountries[1];
  document.getElementById('sw0').style.background=teamColors[0];
  document.getElementById('sw1').style.background=teamColors[1];
}

/* formation for team 0 (attacks toward +x). team1 mirrors x. */
const FORMATION=[
 {role:'GK', x:40,  y:320},
 {role:'DEF',x:190, y:170},
 {role:'DEF',x:190, y:320},
 {role:'DEF',x:190, y:470},
 {role:'MID',x:430, y:230},
 {role:'MID',x:430, y:410},
 {role:'FWD',x:660, y:320},
];

let players=[];
function buildPlayers(){
  players=[];
  for(let team=0; team<2; team++){
    FORMATION.forEach(f=>{
      const hx = team===0 ? f.x : FW-f.x;
      players.push({
        id:players.length,
        name:nextName(),
        team,
        role:f.role,
        isGK:f.role==='GK',
        homeX:hx, homeY:f.y,
        x:hx, y:f.y,
        vx:0, vy:0,
        speed: f.role==='GK'? rand(85,100) : rand(92,124),
        animPhase:rand(0,6.28),
        actionTimer:rand(.3,.9),
        stumbleTimer:0,
      });
    });
  }
}

/* ---------- ball & match state ---------- */
const ball={x:FW/2,y:FH/2,z:0,vx:0,vy:0,vz:0,owner:null,controlTime:0,pressureCooldown:0,kickGrace:0};
const score=[0,0];
const shots=[0,0];
const possessionTicks=[0.001,0.001];
function resetStats(){
  score[0]=0; score[1]=0; shots[0]=0; shots[1]=0;
  possessionTicks[0]=0.001; possessionTicks[1]=0.001;
}

function startNewGame(){
  resetStats();
  applyTeams(...nextCountries());
  phase='kickoff';
  phaseTimer=2.2;
  halfClock=0;
  kickoffTeam=0;
  engagePairKey=null; // clear any existing contest state
  engagedTime=0;
  goalScorer=null;
  ballHandedOff=false;
  goalResetElapsed=0;
  cutsceneActive=false;
  ball.x=FW/2; ball.y=FH/2; ball.z=0;
  ball.vx=0; ball.vy=0; ball.vz=0;
  ball.owner=null; ball.controlTime=0; ball.pressureCooldown=0;
  saveState();
}

applyTeams(...nextCountries());

let cam={x:FW/2, zoom:1};

/* ---------- commentary ---------- */
// Short, TTS-friendly lines with heavy variation. pick() never serves the same
// variant twice in a row for a key, and say() cuts off long runs of one
// category so a drawn-out duel or passing chain doesn't become a broken record.
const PHRASES={
  kickShort:[
    a=>`${a} plays it forward`, a=>`${a} knocks it on`, a=>`${a} pushes upfield`,
    a=>`${a} moves it along`, a=>`forward from ${a}`, a=>`${a} keeps it moving`,
    a=>`${a} taps it ahead`, a=>`${a} nudges it on`, `on it goes`,
    a=>`${a} keeps the tempo up`, a=>`patient stuff from ${a}`, a=>`${a} probes forward`,
  ],
  kickLong:[
    a=>`${a} goes long`, a=>`${a} launches it`, a=>`${a} sends it deep`,
    a=>`up and over from ${a}`, a=>`${a} hits it long`, a=>`route one from ${a}`,
    a=>`big ball from ${a}`, a=>`${a} swings it downfield`, a=>`long one from ${a}`,
    a=>`${a} goes over the top`, a=>`high and deep from ${a}`, `into the clouds it goes`,
    a=>`aerial ball from ${a}`, a=>`${a} switches the field`,

// avoid the most recent half of each bank, not just the last line —
// with banks this size that's what actually prevents déjà vu
const recentVariant={};
function pick(key,...args){
  const bank=PHRASES[key];
  const recent=recentVariant[key]||(recentVariant[key]=[]);
  const banned=new Set(recent);
  let candidates=[];
  for(let i=0;i<bank.length;i++) if(!banned.has(i)) candidates.push(i);
  if(!candidates.length){ recent.length=0; candidates=bank.map((_,i)=>i); }
  const i=candidates[Math.floor(Math.random()*candidates.length)];
  recent.push(i);
  const maxRecent=Math.max(1,Math.floor(bank.length/2));
  while(recent.length>maxRecent) recent.shift();
  const v=bank[i];
  return typeof v==='function' ? v(...args) : v;
}

// keys grouped so "same kind of comment" is judged by category, not exact key
const SAY_CATEGORY={
  kick:'move', pass:'move', receive:'move', pressurePass:'move', forced:'move',
  shoot:'chance', chip:'chance', closingin:'chance', miss:'chance',
  tackle:'duel', stumble:'duel', scramble:'duel', gain:'duel',
  goalkick:'restart', throwin:'restart', gkRestart:'restart', gkClear:'restart',
};
const subtitleEl=document.getElementById('subtitleText');
const bannerEl=document.getElementById('banner');
let lastSay={};
let subtitleLockUntil=0;
let lastCat=null, catRun=0, catRunAt=0;
function say(msg,minGap,key,opts){
  opts=opts||{};
  key=key||msg;
  const now=performance.now();
  // while TTS is synthesizing/playing, drop lines rather than let subtitles
  // race ahead of the voice; the latest forced line waits its turn instead
  if(ttsSpeaking){
    if(opts.force) pendingLine={msg:msg,key:key};
    return;
  }
  if(!opts.force && now<subtitleLockUntil) return;
  if(minGap && lastSay[key] && now-lastSay[key]<minGap) return;
  const cat=SAY_CATEGORY[key]||key;
  if(!opts.force && cat===lastCat && now-catRunAt<7000){
    catRun++;
    if(catRun>=4) return; // the same kind of thing keeps happening — let the pictures do the talking
  } else if(cat!==lastCat || now-catRunAt>=7000){
    catRun=1;
  }
  lastCat=cat; catRunAt=now;
  lastSay[key]=now;
  subtitleEl.textContent=msg;
  if(ttsActive()){
    ttsSpeaking=true;
    subtitleLockUntil=now+60000; // held by the speech channel; released below
    speakLine(msg).finally(()=>{
      ttsSpeaking=false;
      subtitleLockUntil=performance.now()+250;
      const p=pendingLine; pendingLine=null;
      if(p) say(p.msg,0,p.key,{force:true});
    });
  } else {
    // longer lines earn a longer read before the next line is allowed to bump them
    subtitleLockUntil = now + (opts.holdMs!=null ? opts.holdMs : clamp(msg.length*34, 650, 3200));
  }
}
function bigBanner(msg,duration){
  bannerEl.textContent=msg;
  showBanner(duration);
}
function bigBannerHTML(html,duration){
  bannerEl.innerHTML=html;
  showBanner(duration);
}
function showBanner(duration){
  bannerEl.classList.add('show');
  clearTimeout(showBanner._t);
  showBanner._t=setTimeout(()=>bannerEl.classList.remove('show'), duration||2200);
}

/* ---------- AI helpers ---------- */
function teamOf(t){return players.filter(p=>p.team===t);}
function attackDir(team){return team===0?1:-1;}
function opponentGoalX(team){return team===0?FW:0;}
function ownGoalX(team){return team===0?0:FW;}

function nearestToBall(list){
  let best=null,bd=Infinity;
  for(const p of list){const d=dist(p.x,p.y,ball.x,ball.y); if(d<bd){bd=d;best=p;}}
  return best;
}
function nearestPlayerTo(from,list){
  let best=null,bd=Infinity;
  for(const p of list){const d=dist(p.x,p.y,from.x,from.y); if(d<bd){bd=d;best=p;}}
  return best;
}
function pickPassTarget(from,list){
  if(!list.length) return null;
  const sorted=list.slice().sort((a,b)=>dist(from.x,from.y,a.x,a.y)-dist(from.x,from.y,b.x,b.y));
  return sorted.length>1 && Math.random()<0.5 ? sorted[1] : sorted[0];
}

function chooseKickType(distTo){
  if(distTo<140) return Math.random()<0.7?'groundSlow':'groundFast';
  if(distTo<300) return Math.random()<0.55?'groundFast':'lobNear';
  return Math.random()<0.5?'lobFar':'groundFast';
}

function doKick(player,tx,ty,type,extra,extraKey){
  const dx=tx-player.x, dy=ty-player.y;
  const d=Math.hypot(dx,dy)||1;
  const ux=dx/d, uy=dy/d;
  let speed,vz;
  if(type==='groundSlow'){speed=155;vz=0;}
  else if(type==='groundFast'){speed=345;vz=0;}
  else if(type==='lobNear'){speed=195;vz=235;}
  else if(type==='gkClear'){speed=330;vz=430;}
  else {speed=270;vz=345;}
  ball.vx=ux*speed; ball.vy=uy*speed; ball.vz=vz; ball.z=Math.max(ball.z,3);
  ball.owner=null; ball.controlTime=0; ball.lastKicker=player; duelCount=0;
  ball.kickGrace=0.18; // brief window where only the kicker's team can pick it back up, so a pass under pressure has a chance to actually reach a teammate
  const msg = extra || pick(type==='groundSlow'||type==='groundFast' ? 'kickShort' : 'kickLong', player.name);
  say(msg,180,extraKey||'kick');
}

function ballCarrierDecision(player){
  const team=player.team;
  const oppGoal=opponentGoalX(team);
  const distGoal=Math.abs(oppGoal-player.x);
  const mates=teamOf(team).filter(p=>p!==player && !p.isGK);

  // shoot
  if(distGoal<250 && Math.abs(player.y-320)<170 && Math.random()<0.5){
    shots[team]++;
    const ty=320+rand(-45,45);
    const type = distGoal<130 ? (Math.random()<0.5?'groundFast':'lobNear') : (Math.random()<0.5?'lobFar':'groundFast');
    doKick(player,oppGoal,ty,type,pick('shoot',player.name),'shoot');
    player.actionTimer=rand(0.6,1.0);
    return;
  }
  // pass
  if(mates.length && Math.random()<0.55){
    const advanced=mates.filter(m=>attackDir(team)===1? m.x>player.x-40 : m.x<player.x+40);
    const target = pickPassTarget(player,advanced.length? advanced : mates);
    const d=dist(player.x,player.y,target.x,target.y);
    const type=chooseKickType(d);
    doKick(player,target.x,target.y,type,pick('pass',player.name,target.name),'pass');
    player.actionTimer=rand(0.6,1.1);
    return;
  }
  // dribble onward
  if(distGoal<300 && Math.random()<0.4){
    say(pick('closingin',player.name),3200,'closingin');
  }
  player.actionTimer=rand(0.5,0.9);
}

function gkDecision(gk){
  const team=gk.team;
  const mates=teamOf(team).filter(p=>p!==gk);
  const target=choice(mates.filter(m=>m.role==='MID'||m.role==='FWD').concat(mates)) ;
  doKick(gk,target.x,target.y,'gkClear',pick('gkClear',gk.name),'gkClear');
  gk.actionTimer=rand(0.8,1.2);
}

/* ---------- reset / kickoff ---------- */
function resetFormation(){
  for(const p of players){
    p.x=p.homeX; p.y=p.homeY; p.vx=0; p.vy=0; p.actionTimer=rand(.3,.8);
  }
}
function startKickoff(team){
  resetFormation();
  ball.x=FW/2; ball.y=FH/2; ball.z=0; ball.vx=0; ball.vy=0; ball.vz=0;
  ball.owner=null; ball.controlTime=0; ball.pressureCooldown=0;
  kickoffTeam=team;
  engagedPairKey=null; engagedTime=0;
  const striker=players.find(p=>p.team===team && p.role==='FWD');
  striker.x=FW/2 - attackDir(team)*8; striker.y=FH/2;
}

function handleGoal(scoringTeam){
  resumePhase = (phase==='live2') ? 'live2' : 'live1';
  score[scoringTeam]++;

  restartTeam = 1-scoringTeam;
  goalScorer = (ball.lastKicker && ball.lastKicker.team===scoringTeam) ? ball.lastKicker
    : nearestPlayerTo({x:opponentGoalX(scoringTeam),y:FH/2}, teamOf(scoringTeam).filter(p=>!p.isGK));

  bigBannerHTML(
    `<div>Goal!</div>`+
    `<div class="bannerLine">${goalScorer.name} scores for ${teamCountries[scoringTeam]}</div>`+
    `<div class="bannerTable">`+
      `<span class="bt-n">${teamCountries[0]}</span><span class="bt-s">${score[0]}</span>`+
      `<span class="bt-n">${teamCountries[1]}</span><span class="bt-s">${score[1]}</span>`+
    `</div>`, 5000);
  say(pick('goal',teamCountries[scoringTeam]),0,'goal',{force:true});
  kickoffTaker = teamOf(restartTeam).find(p=>p.role==='FWD');
  ballHandedOff=false; goalResetElapsed=0;
  ball.owner=null; ball.controlTime=0;
  engagedPairKey=null; engagedTime=0;

  cutsceneActive=true;
  cam.zoom=CUTSCENE_ZOOM; // hard cut to the celebration shot, no linear zoom-in
  cam.x=clamp(goalScorer.x,60,FW-60);

  phase='goalreset';
}

function updateGoalReset(dt){
  goalResetElapsed += dt;
  const gk = teamOf(restartTeam).find(p=>p.isGK);
  const kickSpotX = FW/2 - attackDir(restartTeam)*8, kickSpotY = FH/2;

  for(const p of players){
    let tx,ty, spd=p.speed;
    if(p===kickoffTaker){ tx=kickSpotX; ty=kickSpotY; }
    else if(p===gk && !ballHandedOff){ tx=ball.x; ty=ball.y; spd*=1.2; }
    else { tx=p.homeX; ty=p.homeY; }

    const dx=tx-p.x, dy=ty-p.y, d=Math.hypot(dx,dy);
    if(d>2){
      const ux=dx/d, uy=dy/d;
      p.vx=ux*spd; p.vy=uy*spd;
      p.facingX=ux; p.facingY=uy;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
    } else { p.vx=0; p.vy=0; }
    p.x=clamp(p.x,6,FW-6); p.y=clamp(p.y,6,FH-6);
    const spdNow=Math.hypot(p.vx,p.vy);
    p.animPhase += dt*(spdNow*0.045+1.5);
    p.speedNow=spdNow;
  }

  if(!ballHandedOff && gk && !ball.owner && dist(gk.x,gk.y,ball.x,ball.y)<CAPTURE_R+6){
    ballHandedOff=true;
    doKick(gk,kickSpotX,kickSpotY,'groundFast',pick('gkRestart',gk.name,kickoffTaker.name),'gkRestart');
  }

  const ready = ball.owner===kickoffTaker && goalResetElapsed>=GOAL_RESET_MIN;
  if(ready || goalResetElapsed>=GOAL_RESET_MAX){
    finishGoalReset();
  }
}

function finishGoalReset(){
  startKickoff(restartTeam);
  cutsceneActive=false;
  cam.zoom=1; // hard cut back to the default view
  phase=resumePhase;
}

function handleGoalKick(defendingTeam){
  const gk=players.find(p=>p.team===defendingTeam && p.isGK);
  ball.x=gk.x+attackDir(defendingTeam)*10; ball.y=gk.y; ball.z=0;
  ball.vx=0;ball.vy=0;ball.vz=0;
  ball.owner=gk; ball.controlTime=0.4;
  // a shot that went wide earns a near-miss reaction; anything else is just a restart
  const missedShot = ball.lastKicker && ball.lastKicker.team!==defendingTeam;
  say(missedShot ? pick('miss') : pick('goalkick',teamCountries[defendingTeam]),400,missedShot?'miss':'goalkick',{force:true});
}

function handleThrowIn(){
  ball.y=clamp(ball.y,14,FH-14);
  ball.vx=0;ball.vy=0;ball.vz=0;ball.z=0;ball.owner=null;
  say(pick('throwin'),400,'throwin',{force:true});
}

/* ---------- physics + AI update ---------- */
function updateBallCarry(p){
  ball.x=p.x+ (p.facingX||0)*11;
  ball.y=p.y+ (p.facingY||0)*11;
  ball.z=-4; // tuck the owned ball down at the player’s feet without pushing it too far below ground
}

function stepBall(dt){
  if(ball.owner){ updateBallCarry(ball.owner); return; }
  ball.vz += GRAVITY*dt;
  ball.x += ball.vx*dt;
  ball.y += ball.vy*dt;
  ball.z += ball.vz*dt;
  if(ball.z<=0){
    ball.z=0;
    if(ball.vz<-30){ ball.vz=-ball.vz*0.38; } else { ball.vz=0; }
    const fr=Math.max(0,1-1.6*dt);
    ball.vx*=fr; ball.vy*=fr;
    if(Math.hypot(ball.vx,ball.vy)<4){ball.vx=0;ball.vy=0;}
  } else {
    ball.vx*=(1-0.05*dt);
    ball.vy*=(1-0.05*dt);
  }
}

function checkBoundsAndScoring(){
  if(ball.owner) return;
  if(ball.x<=-4){
    if(ball.y>GOAL_Y0 && ball.y<GOAL_Y1 && ball.z<GOAL_H){ handleGoal(1); }
    else { ball.x=2; handleGoalKick(0); }
    return;
  }
  if(ball.x>=FW+4){
    if(ball.y>GOAL_Y0 && ball.y<GOAL_Y1 && ball.z<GOAL_H){ handleGoal(0); }
    else { ball.x=FW-2; handleGoalKick(1); }
    return;
  }
  if(ball.y<=0 || ball.y>=FH){ handleThrowIn(); }
}

function capturePossession(dt){
  if(scrambleCooldown>0){ scrambleCooldown-=dt; return; }
  if(ball.kickGrace>0) ball.kickGrace-=dt;
  if(ball.z>26) return; // too high to control
  const duringGrace = !ball.owner && ball.kickGrace>0 && ball.lastKicker;
  let claimant=null,bd=Infinity;
  for(const p of players){
    if(duringGrace && p.team!==ball.lastKicker.team) continue;
    const d=dist(p.x,p.y,ball.x,ball.y);
    if(d<CAPTURE_R && d<bd){bd=d;claimant=p;}
  }
  if(!claimant) return;
  if(!ball.owner){
    ball.owner=claimant; ball.controlTime=0; duelCount=0; ball.pressureCooldown=0;
    if(ball.lastKicker && ball.lastKicker.team!==claimant.team){
      say(pick('gain',claimant.name),300,'gain');
    } else if(ball.lastKicker && ball.lastKicker!==claimant){
      say(pick('receive',claimant.name),400,'receive');
    }
    return;
  }
  ball.controlTime += dt;
  if(ball.owner.team!==claimant.team && ball.controlTime>0.25 && claimant.stumbleTimer<=0){
    const chance=1.1*dt;
    const stumbleChance=0.5*dt;
    const roll=Math.random();
    if(roll<chance){
      const prevOwner=ball.owner;
      duelCount++;
      if(duelCount>=3){
        // stuck in a tackling loop — the ball squirts free of both of them
        const ang=rand(0,Math.PI*2);
        ball.vx=Math.cos(ang)*220; ball.vy=Math.sin(ang)*220; ball.vz=160; ball.z=Math.max(ball.z,5);
        ball.owner=null; ball.controlTime=0; ball.lastKicker=null;
        duelCount=0; scrambleCooldown=0.5;
        say(pick('scramble',claimant.name,prevOwner.name),0,'scramble');
      } else {
        say(pick('tackle',claimant.name,prevOwner.name),300,'tackle');
        ball.owner=claimant; ball.controlTime=0; ball.pressureCooldown=0;
      }
    } else if(roll<chance+stumbleChance){
      // the challenge goes wrong — the tackler stumbles and loses ground for a beat
      claimant.stumbleTimer=rand(0.8,1.2);
      claimant.vx*=0.15; claimant.vy*=0.15;
      say(pick('stumble',claimant.name),400,'stumble');
    }
  }
}

function forcePass(owner){
  const mates=teamOf(owner.team).filter(m=>m!==owner);
  if(!mates.length) return;
  const mate=pickPassTarget(owner,mates);
  const d=dist(owner.x,owner.y,mate.x,mate.y);
  const type=chooseKickType(d);
  doKick(owner,mate.x,mate.y,type,pick('forced',owner.name,mate.name),'forced');
  owner.actionTimer=rand(0.6,1.0);
}

function checkStalemate(dt){
  const p0=nearestPlayerTo(ball,teamOf(0));
  const p1=nearestPlayerTo(ball,teamOf(1));
  if(!p0 || !p1){ engagedPairKey=null; engagedTime=0; return; }
  const key=[p0.id,p1.id].sort((a,b)=>a-b).join('-');
  if(key!==engagedPairKey){
    // the actual matchup changed (a different player is now nearest) — that's the only thing that resets the clock
    engagedPairKey=key; engagedTime=0;
  }
  const dBall0=dist(p0.x,p0.y,ball.x,ball.y);
  const dBall1=dist(p1.x,p1.y,ball.x,ball.y);
  const dPair=dist(p0.x,p0.y,p1.x,p1.y);
  const inProximity = dBall0<STALEMATE_R && dBall1<STALEMATE_R && dPair<STALEMATE_R;
  if(inProximity) engagedTime+=dt; // ball changing hands between the same two players doesn't reset this
  if(engagedTime>=STALEMATE_SECONDS){
    if(ball.owner===p0 || ball.owner===p1){
      forcePass(ball.owner);
      engagedPairKey=null; engagedTime=0;
    } else {
      engagedTime=STALEMATE_SECONDS; // ball's momentarily loose mid-scramble — hold, force the pass the instant someone controls it
    }
  }
}

function updatePlayers(dt){
  const chaser=[null,null];
  for(let t=0;t<2;t++){
    const outfield=teamOf(t).filter(p=>!p.isGK && p!==ball.owner);
    chaser[t]=nearestToBall(outfield);
  }
  const nearestOverall = dist(chaser[0]?chaser[0].x:0,chaser[0]?chaser[0].y:0,ball.x,ball.y) <
                          dist(chaser[1]?chaser[1].x:0,chaser[1]?chaser[1].y:0,ball.x,ball.y) ? 0:1;

  for(const p of players){
    let tx,ty, spd=p.speed;
    if(p.stumbleTimer>0){
      p.stumbleTimer=Math.max(0,p.stumbleTimer-dt);
      spd*=0.2;
    }

    if(p===ball.owner){
      p.actionTimer-=dt;
      const dir=attackDir(p.team);
      tx = p.x + dir*40 + rand(-6,6);
      ty = lerp(p.y,320,0.05)+rand(-8,8);

      if(!p.isGK){
        const oppGoal=opponentGoalX(p.team);
        const distGoal=Math.abs(oppGoal-p.x);
        if(distGoal<SIX_X+25 && p.y>SIX_Y0-20 && p.y<SIX_Y1+20){
          shots[p.team]++;
          const gk=players.find(pl=>pl.team!==p.team && pl.isGK);
          const gkY=gk?gk.y:(GOAL_Y0+GOAL_Y1)/2;
          const gty = gkY<(GOAL_Y0+GOAL_Y1)/2 ? GOAL_Y1-16 : GOAL_Y0+16;
          doKick(p,oppGoal,gty,'lobNear',pick('chip',p.name),'chip');
          p.actionTimer=rand(0.6,1.0);
        }
      }

      if(ball.owner===p){
        ball.pressureCooldown-=dt;
        if(ball.pressureCooldown<=0){
          const opponents=teamOf(1-p.team);
          const closest=nearestPlayerTo(p,opponents);
          if(closest && dist(p.x,p.y,closest.x,closest.y)<PRESSURE_R){
            if(Math.random()<0.8){
              const mates=teamOf(p.team).filter(m=>m!==p);
              const mate=pickPassTarget(p,mates);
              if(mate){
                const d=dist(p.x,p.y,mate.x,mate.y);
                const type=chooseKickType(d);
                doKick(p,mate.x,mate.y,type,pick('pressurePass',p.name,mate.name),'pressurePass');
                p.actionTimer=rand(0.6,1.0);
              } else { ball.pressureCooldown=0.3; }
            } else { ball.pressureCooldown=0.3; } // still crowded — re-check shortly instead of clinging
          } else { ball.pressureCooldown=0.15; }
        }
      }

      if(ball.owner===p && p.actionTimer<=0){
        if(p.isGK) gkDecision(p); else ballCarrierDecision(p);
      }
    } else if(p.isGK){
      const goalX=ownGoalX(p.team);
      const inBox = Math.abs(ball.x-goalX) < BOX_X+10;
      if(inBox && (!ball.owner || ball.owner.team!==p.team)){
        tx = clamp(ball.x, goalX===0?8:FW-140, goalX===0?140:FW-8);
        ty = clamp(ball.y, GOAL_Y0-40, GOAL_Y1+40);
        spd*= (Math.abs(ball.x-goalX)<160)?1.55:1.15;
      } else {
        tx = goalX===0? 32:FW-32;
        ty = clamp(lerp(320,ball.y,0.45),GOAL_Y0+10,GOAL_Y1-10);
      }
    } else {
      const advancing = ball.owner ? ball.owner.team===p.team : nearestOverall===p.team;
      const dir=attackDir(p.team);
      const bias = advancing? dir*55 : -dir*25;
      if(p===chaser[p.team] && !ball.owner){
        tx=ball.x; ty=ball.y; spd*=1.3;
      } else if(p===chaser[p.team] && ball.owner && ball.owner.team!==p.team){
        tx=ball.x; ty=ball.y; spd*=1.15;
      } else {
        tx = clamp(lerp(p.homeX,ball.x,0.22)+bias, 25, FW-25);
        ty = clamp(lerp(p.homeY,ball.y,0.30), 25, FH-25);
      }
    }

    const dx=tx-p.x, dy=ty-p.y, d=Math.hypot(dx,dy);
    if(d>2){
      const ux=dx/d, uy=dy/d;
      p.vx=ux*spd; p.vy=uy*spd;
      p.facingX=ux; p.facingY=uy;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
    } else { p.vx=0;p.vy=0; }
    p.x=clamp(p.x,6,FW-6); p.y=clamp(p.y,6,FH-6);
    const spdNow=Math.hypot(p.vx,p.vy);
    p.animPhase += dt*(spdNow*0.045+1.5);
    p.speedNow=spdNow;
  }
}

/* ---------- match clock / phases ---------- */
function fmtClock(s){
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return `${m}:${sec<10?'0':''}${sec}`;
}

let resumePhase='live1';
let pendingNext=null;
function updatePhase(dt){
  if(phase==='kickoff'){
    phaseTimer-=dt;
    say(`Kick off in ${Math.max(0,Math.ceil(phaseTimer))}…`,900,'ko',{force:true});
    if(phaseTimer<=0){ phase='live1'; halfClock=0; startKickoff(0); say(pick('start'),0,'start',{force:true}); }
    return;
  }
  if(phase==='halftime'){
    phaseTimer-=dt;
    if(phaseTimer<=0){ phase='live2'; halfClock=0; startKickoff(1); say(pick('2ndhalf'),0,'2ndhalf',{force:true}); }
    return;
  }
  if(phase==='live1'){
    halfClock+=dt;
    if(halfClock>=HALF_LEN){ phase='halftime'; phaseTimer=8; bigBanner('HALF TIME',2400); say(pick('ht'),0,'ht',{force:true}); }
    return;
  }
  if(phase==='live2'){
    halfClock+=dt;
    if(halfClock>=HALF_LEN){
      phase='fulltime'; phaseTimer=5;
      bigBanner(`FULL TIME`,3000);
      say(`Full time! ${teamCountries[0]} ${score[0]} – ${score[1]} ${teamCountries[1]}.`,0,'ft',{force:true});
    }
    return;
  }
  if(phase==='fulltime'){
    phaseTimer-=dt;
    if(phaseTimer<=0){
      phase='presenter'; phaseTimer=5.5;
      const winner = score[0]===score[1] ? null : (score[0]>score[1]?0:1);
      const resultLine = winner===null
        ? `All square — ${teamCountries[0]} and ${teamCountries[1]} share it, ${score[0]}–${score[1]}.`
        : `${teamCountries[winner]} take it, ${score[winner]}–${score[1-winner]}.`;
      bigBanner(`${teamCountries[0]} ${score[0]} – ${score[1]} ${teamCountries[1]}`,4200);
      say(resultLine,0,'presenter',{force:true});
    }
    return;
  }
  if(phase==='presenter'){
    phaseTimer-=dt;
    if(phaseTimer<=0){
      pendingNext=nextCountries();
      phase='nextup'; phaseTimer=4.5;
      bigBanner(`Up next: ${pendingNext[0]} vs ${pendingNext[1]}`,4000);
      say(`Up next — ${pendingNext[0]} versus ${pendingNext[1]}!`,0,'nextup',{force:true});
    }
    return;
  }
  if(phase==='nextup'){
    phaseTimer-=dt;
    if(phaseTimer<=0){
      applyTeams(pendingNext[0],pendingNext[1]);
      resetStats();
      pendingNext=null;
      halfClock=0;
      phase='kickoff'; phaseTimer=3;
      say(`Welcome back — ${teamCountries[0]} versus ${teamCountries[1]}!`,0,'welcome2',{force:true});
    }
    return;
  }
}

/* ---------- main update ---------- */
let last=null;
function update(dt){
  updatePhase(dt);
  const isLive = phase==='live1'||phase==='live2';
  if(isLive){
    updatePlayers(dt);
    checkStalemate(dt);
    stepBall(dt);
    checkBoundsAndScoring();
    capturePossession(dt);
    const p0=nearestToBall(teamOf(0)), p1=nearestToBall(teamOf(1));
    const controlTeam = ball.owner ? ball.owner.team :
      (dist(p0.x,p0.y,ball.x,ball.y) < dist(p1.x,p1.y,ball.x,ball.y) ? 0 : 1);
    possessionTicks[controlTeam]+=dt;
  } else if(phase==='goalreset'){
    updateGoalReset(dt);
    stepBall(dt);
    capturePossession(dt);
  }

  if(phase==='goalreset' && cutsceneActive){
    // camera cut is locked onto the scorer at a fixed zoom — no linear zoom easing during this sequence
    cam.x += (goalScorer.x-cam.x)*Math.min(1,dt*3.2);
    cam.x = clamp(cam.x, 60, FW-60);
  } else {
    cam.x += (ball.x-cam.x)*Math.min(1,dt*2.6);
    cam.x = clamp(cam.x, 60, FW-60);

    const distToGoalLine=Math.min(ball.x, FW-ball.x);
    const targetZoom = distToGoalLine>=END_QUARTER ? 1 : lerp(MAX_ZOOM,1,clamp(distToGoalLine/END_QUARTER,0,1));
    cam.zoom += (targetZoom-cam.zoom)*Math.min(1,dt*2.6);
  }
}

/* ---------- audio / TTS commentator ---------- */
// Engine lives in assets/vendor/tts/tts-wrapper.js (shared with airmail.html).
// browser mode resolves when the utterance ends; espeak/piper return PCM that
// we play through an AudioContext and resolve on src.onended — so the say()
// speech channel is released by real end-of-playback events, not timers.
const VOICES=[
  {mode:'none',   label:'None'},
  {mode:'browser',label:'Web'},
  {mode:'espeak', label:'eSpk'},
  {mode:'piper',  label:'Piper'},
  {mode:'piper',  label:'Pip 2', voice:'commentator-2'},
  {mode:'piper',  label:'Pip 3', voice:'commentator-3'},
];
let audioOn=false, voiceIdx=1;
let ttsSpeaking=false, pendingLine=null;
const audioBtn=document.getElementById('audioBtn');
const voiceBtn=document.getElementById('voiceBtn');
const newGameBtn=document.getElementById('newGameBtn');
const audioIcon=document.getElementById('audioIcon');
const AUD_ON='M11 5 6 9H3v6h3l5 4V5zM15.5 8.5a5 5 0 0 1 0 7M18.5 5.5a9 9 0 0 1 0 13';
const AUD_OFF='M11 5 6 9H3v6h3l5 4V5zM16 9l6 6M22 9l-6 6';

function ttsActive(){ return audioOn && VOICES[voiceIdx].mode!=='none'; }

let ttsLoadPromise=null;
function loadTts(){
  if(window.TTS_WASM) return Promise.resolve(true);
  if(!ttsLoadPromise){
    ttsLoadPromise=new Promise(res=>{
      const s=document.createElement('script');
      s.src='./assets/vendor/tts/tts-wrapper.js';
      s.onload=()=>res(!!window.TTS_WASM);
      s.onerror=()=>res(false);
      document.head.appendChild(s);
    });
  }
  return ttsLoadPromise;
}
function configureTts(){
  const v=VOICES[voiceIdx];
  if(v.mode==='none') return;
  loadTts().then(ok=>{
    // configure() pre-warms piper (model download + worker) so the first
    // spoken line doesn't pay the whole startup cost
    if(ok && window.TTS_WASM.configure) window.TTS_WASM.configure({mode:v.mode});
  });
}

let audioCtx=null;
function playPcm(pcm,sampleRate){
  return new Promise(res=>{
    try{
      if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state==='suspended') audioCtx.resume();
      const f32=new Float32Array(pcm.length);
      for(let i=0;i<pcm.length;i++) f32[i]=pcm[i]/32768;
      const buf=audioCtx.createBuffer(1,f32.length,sampleRate);
      buf.getChannelData(0).set(f32);
      const src=audioCtx.createBufferSource();
      src.buffer=buf;
      src.connect(audioCtx.destination);
      // safety: an autoplay-blocked (suspended) context never fires onended —
      // don't let that hold the commentary channel forever
      const t=setTimeout(res, pcm.length/sampleRate*1000+3000);
      src.onended=()=>{ clearTimeout(t); res(); };
      src.start();
    }catch(e){ res(); }
  });
}
window.addEventListener('pointerdown',()=>{
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
});

function speakLine(text){
  const v=VOICES[voiceIdx];
  const attempt=(async()=>{
    const ok=await loadTts();
    if(!ok || !ttsActive()) return;
    const res=await window.TTS_WASM.speak(text,{mode:v.mode, tower:!!v.voice, voiceIdentity:v.voice||null});
    if(!ttsActive()) return; // audio toggled off while synthesizing
    if(res && res.pcm && res.pcm.length && res.sampleRate) await playPcm(res.pcm,res.sampleRate);
    // res.handled (browser mode) has already played to completion
  })().catch(()=>{ /* silent — subtitles carry on */ });
  // hard ceiling: piper synthesis can take seconds and some browser engines
  // never fire onend — either way the commentary channel must come back
  const ceiling=new Promise(r=>setTimeout(r, Math.max(2500,text.length*90)+12000));
  return Promise.race([attempt,ceiling]);
}

function updateAudioUI(){
  audioIcon.setAttribute('d', audioOn?AUD_ON:AUD_OFF);
  audioBtn.classList.toggle('dim',!audioOn);
  voiceBtn.textContent=VOICES[voiceIdx].label;
  voiceBtn.classList.toggle('dim',!ttsActive());
}
audioBtn.addEventListener('click',()=>{

    window.speechSynthesis.cancel();

});

});

function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,TOP_PAD);
  g.addColorStop(0,'#0a1a14'); g.addColorStop(1,'#152d20');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,TOP_PAD-34);
  // crowd dots
  ctx.fillStyle='rgba(255,255,255,0.05)';
  for(let i=0;i<70;i++){
    const x=(i*53.7)%CW, y=6+((i*17)%(TOP_PAD-46));
    ctx.fillRect(x,y,3,3);
  }
}

function drawAds(){
  const bandTop=TOP_PAD-34, bandH=30;
  const scale=FAR_SCALE*cam.zoom;
  const boardW=140*scale, gap=26*scale;
  const step=boardW+gap;
  const startIdx=Math.floor((cam.x*CAM_SCALE*scale - CW)/step)-2;
  for(let i=startIdx;i<startIdx+16;i++){
    const worldX = i*step/(CAM_SCALE*scale);
    const sx = CW/2 + (worldX-cam.x)*CAM_SCALE*scale;
    if(sx< -boardW || sx>CW+boardW) continue;
    const ad=ADS[((i%ADS.length)+ADS.length)%ADS.length];
    ctx.fillStyle='#0c1f16';
    ctx.fillRect(sx-boardW/2,bandTop,boardW,bandH);
    ctx.strokeStyle='#2a4a34'; ctx.strokeRect(sx-boardW/2,bandTop,boardW,bandH);

    ctx.save();
    ctx.beginPath();
    ctx.rect(sx-boardW/2+2, bandTop+1, boardW-4, bandH-2);
    ctx.clip();

    ctx.fillStyle='#ffd166';
    ctx.font=`bold ${10*scale+4}px Arial`;
    ctx.textAlign='left';
    ctx.fillText(ad.name, sx-boardW/2+4, bandTop+13);

    ctx.fillStyle='#cfe8d8';
    const qFont=`italic ${7.5*scale+3}px Arial`;
    ctx.font=qFont;
    const avail=boardW-8;
    const qWidth=ctx.measureText(ad.quote).width;
    let qx=sx-boardW/2+4;
    if(qWidth>avail){
      // slow ping-pong marquee, phase-offset per board so they don't all scroll in lockstep
      const t=(Math.sin(performance.now()/9000 + i*1.7)+1)/2;
      qx -= (qWidth-avail)*t;
    }
    ctx.fillText(ad.quote, qx, bandTop+24);
    ctx.restore();
  }
}

function pt(x,y,z){const s=worldToScreen(x,y,z);return [s.x,s.y];}
function polyPath(points){
  ctx.beginPath();
  points.forEach((p,i)=>{ if(i===0)ctx.moveTo(p[0],p[1]); else ctx.lineTo(p[0],p[1]); });
}

function drawPitch(){
  const top=TOP_PAD, bottom=CH-BOTTOM_PAD;
  // base grass
  ctx.fillStyle='#2f8f45';
  ctx.fillRect(0,top,CW,bottom-top);
  // mow stripes
  const bands=14;
  for(let i=0;i<bands;i++){
    if(i%2===0) continue;
    const x0=-40 + i*((FW+80)/bands);
    const x1=x0 + (FW+80)/bands;
    const poly=[pt(x0,0),pt(x0,FH),pt(x1,FH),pt(x1,0)];
    polyPath(poly); ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,0.06)';
    ctx.fill();
  }
  ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.9)';
  // outer boundary
  polyPath([pt(0,0),pt(FW,0),pt(FW,FH),pt(0,FH)]); ctx.closePath(); ctx.stroke();
  // halfway line
  polyPath([pt(FW/2,0),pt(FW/2,FH)]); ctx.stroke();
  // center circle
  ctx.beginPath();
  for(let a=0;a<=32;a++){
    const ang=a/32*Math.PI*2;
    const wx=FW/2+Math.cos(ang)*CENTER_R, wy=FH/2+Math.sin(ang)*CENTER_R;
    const s=worldToScreen(wx,wy);
    if(a===0) ctx.moveTo(s.x,s.y); else ctx.lineTo(s.x,s.y);
  }
  ctx.stroke();
  // center spot
  drawSpot(FW/2,FH/2);
  // boxes
  drawBox(0,BOX_X,BOX_Y0,BOX_Y1);
  drawBox(FW,-BOX_X,BOX_Y0,BOX_Y1);
  drawBox(0,SIX_X,SIX_Y0,SIX_Y1);
  drawBox(FW,-SIX_X,SIX_Y0,SIX_Y1);
  drawSpot(130,FH/2); drawSpot(FW-130,FH/2);
}
function drawBox(edgeX,dx,y0,y1){
  const x2=edgeX+dx;
  polyPath([pt(edgeX,y0),pt(x2,y0),pt(x2,y1),pt(edgeX,y1)]); ctx.closePath(); ctx.stroke();
}
function drawSpot(x,y){
  const s=worldToScreen(x,y);
  ctx.beginPath(); ctx.arc(s.x,s.y,2.4,0,7); ctx.fillStyle='#fff'; ctx.fill();
}

function drawGoal(edgeX){
  const dir = edgeX===0? -1:1;
  const backX = edgeX + dir*16;
  const p1=pt(edgeX,GOAL_Y0,0), p2=pt(edgeX,GOAL_Y0,GOAL_H);
  const p3=pt(edgeX,GOAL_Y1,GOAL_H), p4=pt(edgeX,GOAL_Y1,0);
  const b1=pt(backX,GOAL_Y0,0), b2=pt(backX,GOAL_Y0,GOAL_H);
  const b3=pt(backX,GOAL_Y1,GOAL_H), b4=pt(backX,GOAL_Y1,0);
  ctx.strokeStyle='#f5f5f5'; ctx.lineWidth=3;
  // net (back rectangle + connecting struts)
  ctx.globalAlpha=0.85;
  polyPath([p2,p3]); ctx.stroke(); // crossbar front
  polyPath([p1,p2]); ctx.stroke(); // post left
  polyPath([p4,p3]); ctx.stroke(); // post right
  ctx.lineWidth=1.4; ctx.strokeStyle='rgba(255,255,255,0.55)';
  polyPath([b1,b2]); ctx.stroke();
  polyPath([b4,b3]); ctx.stroke();
  polyPath([b2,b3]); ctx.stroke();
  polyPath([p1,b1]); ctx.stroke();
  polyPath([p2,b2]); ctx.stroke();
  polyPath([p3,b3]); ctx.stroke();
  polyPath([p4,b4]); ctx.stroke();
  // net mesh diagonals
  for(let i=1;i<5;i++){
    const t=i/5;
    const top=[lerp(p2[0],p3[0],t),lerp(p2[1],p3[1],t)];
    const botBack=[lerp(b1[0],b4[0],t),lerp(b1[1],b4[1],t)];
    polyPath([top,botBack]); ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawPlayer(p){
  const s=worldToScreen(p.x,p.y,0);
  const sc=s.scale;
  const c=teamColors[p.team];
  const shorts= p.team===0? '#fff':'#111';
  const speedFrac= Math.min(1,(p.speedNow||0)/140);
  const swing = Math.sin(p.animPhase) * (0.15+0.65*speedFrac);
  const legLen=13*sc, hipY=s.y-4*sc, footY=hipY+legLen;

  ctx.save();
  // shadow
  ctx.beginPath();
  ctx.ellipse(s.x, footY+1, 8*sc, 3*sc, 0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fill();

  // legs (scissor)
  ctx.lineWidth=3.2*sc; ctx.strokeStyle=shorts; ctx.lineCap='round';
  [swing,-swing].forEach(ang=>{
    ctx.beginPath();
    ctx.moveTo(s.x, hipY);
    ctx.lineTo(s.x+Math.sin(ang)*legLen*0.9, hipY+Math.cos(ang)*legLen);
    ctx.stroke();
  });

  // body
  ctx.fillStyle=c;
  roundRect(s.x-6*sc, hipY-18*sc, 12*sc, 18*sc, 3*sc);
  ctx.fill();

  // head
  ctx.beginPath();
  ctx.arc(s.x, hipY-22*sc, 6*sc, 0, Math.PI*2);
  ctx.fillStyle='#e7b98a'; ctx.fill();
  ctx.lineWidth=1.5*sc; ctx.strokeStyle=c; ctx.beginPath();
  ctx.arc(s.x, hipY-22*sc, 6*sc, Math.PI, Math.PI*2); ctx.stroke();

  // ring for carrier
  if(p===ball.owner){
    ctx.beginPath();
    ctx.ellipse(s.x,footY+1,10*sc,4*sc,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,209,102,0.9)'; ctx.lineWidth=1.6*sc; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font=`bold ${9*sc+4}px Arial`; ctx.textAlign='center';
    ctx.fillText(p.name, s.x, hipY-32*sc);
  } else if(p.isGK){
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font=`${7*sc+3}px Arial`; ctx.textAlign='center';
    ctx.fillText(p.name, s.x, hipY-30*sc);
  }
  ctx.restore();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawBall(){
  const s=worldToScreen(ball.x,ball.y,0);
  const sAir=worldToScreen(ball.x,ball.y,ball.z);
  const sc=s.scale;
  const shrink=Math.max(0.35,1-ball.z/260);
  ctx.beginPath();
  ctx.ellipse(s.x,s.y+1,5.5*sc*shrink,2.2*sc*shrink,0,0,Math.PI*2);
  ctx.fillStyle=`rgba(0,0,0,${0.32*shrink})`; ctx.fill();

  ctx.beginPath();
  ctx.arc(sAir.x,sAir.y,4.6*sc,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(sAir.x,sAir.y,1.3*sc,0,Math.PI*2); ctx.fill();
}

function render(){
  ctx.clearRect(0,0,CW,CH);
  drawSky();
  drawAds();
  drawPitch();
  drawGoal(0);
  drawGoal(FW);

  const drawables=players.map(p=>({y:p.y,draw:()=>drawPlayer(p)}));
  const ballLayerY = ball.owner ? ball.y + 1 : ball.y;
  drawables.push({y:ballLayerY,draw:drawBall});
  drawables.sort((a,b)=>b.y-a.y);
  drawables.forEach(d=>d.draw());
}

/* ---------- UI overlays ---------- */
const scoreEl=document.getElementById('score');
const statsTextEl=document.getElementById('statsText');

const STAT_HOLD_MS=4500;
const STAT_FRAMES=[
  ()=>{
    const half = (phase==='live2'||phase==='halftime'||(phase==='goalreset'&&resumePhase==='live2'))?2:1;
    const labelMap={fulltime:'Full time',presenter:'Full time',nextup:'Next match',halftime:'Half time',kickoff:'Kick off soon'};
    const label = labelMap[phase] || `Half ${half}`;
    return `${label} · ${fmtClock(Math.min(halfClock,HALF_LEN))} / ${fmtClock(HALF_LEN)}`;
  },
  ()=>`Shots  ${teamCountries[0]} ${shots[0]} – ${shots[1]} ${teamCountries[1]}`,
  ()=>{
    const total=possessionTicks[0]+possessionTicks[1];
    const pctA=(possessionTicks[0]/total*100).toFixed(0);
    return `Possession  ${teamCountries[0]} ${pctA}% – ${100-pctA}% ${teamCountries[1]}`;
  },
];
let lastStatIdx=-1;
function renderUI(){
  scoreEl.textContent=`${score[0]} – ${score[1]}`;

  const idx=Math.floor(performance.now()/STAT_HOLD_MS)%STAT_FRAMES.length;
  if(idx!==lastStatIdx){
    lastStatIdx=idx;
    statsTextEl.style.opacity=0;
    setTimeout(()=>{ statsTextEl.textContent=STAT_FRAMES[idx](); statsTextEl.style.opacity=1; },180);
  }
}

/* ---------- loop ---------- */
function loop(ts){
  if(last===null) last=ts;
  const dt=Math.min(0.033,(ts-last)/1000);
  last=ts;
  update(dt);
  render();
  renderUI();
  requestAnimationFrame(loop);
}
/* ---------- persistence ---------- */
const LS_KEY='soccer_match_state_v1';
const PHASES_SAVABLE=['kickoff','live1','halftime','live2','fulltime','presenter','nextup'];
function saveState(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify({
      v:1, savedAt:Date.now(),
      settings:{audioOn:audioOn, voiceIdx:voiceIdx},
      match:{
        countries:teamCountries.slice(),
        colors:teamColors.slice(),
        names:players.map(p=>p.name),
        score:score.slice(), shots:shots.slice(), poss:possessionTicks.slice(),
        // the transient goal cutscene resumes as its underlying live phase
        phase: phase==='goalreset' ? resumePhase : phase,
        phaseTimer:phaseTimer, halfClock:halfClock,
        resumePhase:resumePhase, kickoffTeam:kickoffTeam,
        pendingNext:pendingNext, queue:countryQueue.slice(),
      }
    }));
  }catch(e){ /* storage blocked/full — nonfatal */ }
}
function restoreState(){
  let s=null;
  try{ s=JSON.parse(localStorage.getItem(LS_KEY)||'null'); }catch(e){}
  if(!s) return false;
  if(s.settings){
    audioOn=!!s.settings.audioOn;
    const vi=s.settings.voiceIdx|0;
    if(vi>=0 && vi<VOICES.length) voiceIdx=vi;
  }
  const m=s.match;
  if(!m || !Array.isArray(m.countries) || m.countries.length!==2) return false;
  try{
    if(Array.isArray(m.queue) && m.queue.length) countryQueue=m.queue;
    applyTeams(m.countries[0],m.countries[1]);
    if(Array.isArray(m.colors) && m.colors.length===2){
      teamColors=[m.colors[0],m.colors[1]];
      document.getElementById('sw0').style.background=teamColors[0];
      document.getElementById('sw1').style.background=teamColors[1];
    }
    if(Array.isArray(m.names) && m.names.length===players.length){
      players.forEach((p,i)=>{ p.name=m.names[i]; });
    }
    score[0]=m.score?.[0]|0;   score[1]=m.score?.[1]|0;
    shots[0]=m.shots?.[0]|0;   shots[1]=m.shots?.[1]|0;
    possessionTicks[0]=+m.poss?.[0]||0.001; possessionTicks[1]=+m.poss?.[1]||0.001;
    halfClock=+m.halfClock||0;
    phaseTimer=+m.phaseTimer||0;
    resumePhase=(m.resumePhase==='live2')?'live2':'live1';
    kickoffTeam=(m.kickoffTeam===1)?1:0;
    pendingNext=(Array.isArray(m.pendingNext) && m.pendingNext.length===2)?m.pendingNext:null;
    phase=PHASES_SAVABLE.includes(m.phase)?m.phase:'kickoff';
    if(phase==='nextup' && !pendingNext){ phase='kickoff'; phaseTimer=3; }
    if(phase==='kickoff' && !(phaseTimer>0)) phaseTimer=2.2;
    // the match clock is restored as-is, never wall-clock adjusted — real time
    // passing while the page was closed doesn't burn match time
    startKickoff(kickoffTeam);
    return true;
  }catch(e){ return false; }
}
setInterval(saveState,3000);
window.addEventListener('pagehide',saveState);
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') saveState(); });

/* ---------- boot ---------- */
const resumed=restoreState();
updateAudioUI();
if(audioOn) configureTts();
say(resumed
  ? `Welcome back — ${teamCountries[0]} versus ${teamCountries[1]}!`
  : `Welcome to the match — ${teamCountries[0]} versus ${teamCountries[1]}!`,0,'welcome',{force:true});
requestAnimationFrame(loop);

})();
</script>
