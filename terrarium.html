<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<link rel="manifest" href="manifest.webmanifest">
<meta name="application-name" content="IdleGames">
<script src="assets/js/pwa.js" defer></script>
<meta name="theme-color" content="#1c2422">
<title>Tiny Terrarium</title>
<meta name="description" content="A cosy idle terrarium. Choose a biome, invite mundane and magical creatures, and watch them live their tiny lives.">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #1c2422;
    color: #e8eae0;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  button {
    -webkit-user-select: none; -moz-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }

  :root {
    --bg: #1c2422;
    --bg-2: #131815;
    --panel: rgba(20, 28, 25, 0.85);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #e8eae0;
    --muted: #9aa49b;
    --accent: #b8d490;
    --accent-warm: #f0c879;
    --accent-cool: #88c8e0;
    --magical: #d4a8ff;
  }

  #app {
    display: flex; flex-direction: column;
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #1c2422 0%, #131815 100%);
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--panel-border);
    background: rgba(15, 20, 18, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 5;
  }
  header h1 {
    font-size: 16px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  header h1 .leaf { font-size: 18px; }
  header .home {
    color: var(--muted); font-size: 12px; text-decoration: none;
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--panel-border);
    transition: all 0.15s;
  }
  header .home:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }

  main {
    flex: 1; display: flex; min-height: 0;
  }

  #tank-wrap {
    flex: 1; position: relative; min-width: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
  }
  #tank {
    width: 100%; height: 100%;
    border-radius: 10px;
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.08),
      inset 0 0 40px rgba(0,0,0,0.35),
      0 18px 40px -12px rgba(0,0,0,0.6);
    cursor: crosshair;
    display: block;
  }

  #panel {
    width: 280px; flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--panel-border);
    overflow-y: auto;
    padding: 14px 14px 80px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .section { display: flex; flex-direction: column; gap: 8px; }
  .section h2 {
    font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--muted);
  }
  .row { display: flex; flex-wrap: wrap; gap: 6px; }

  .chip {
    padding: 8px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-size: 12px;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
    flex: 1 1 auto;
    justify-content: center;
    min-height: 38px;
  }
  .chip:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); }
  .chip:active { transform: scale(0.97); }
  .chip.active {
    background: rgba(184, 212, 144, 0.18);
    border-color: var(--accent);
    color: var(--accent);
  }
  .chip .em { font-size: 16px; line-height: 1; }
  .chip .lbl { white-space: nowrap; }
  .chip.creature .em { font-size: 18px; }
  .chip.magical { color: var(--magical); }
  .chip.magical.active {
    background: rgba(212, 168, 255, 0.18);
    border-color: var(--magical);
  }

  .stat {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted);
    padding: 4px 2px;
  }
  .stat span:last-child { color: var(--text); font-variant-numeric: tabular-nums; }

  .danger {
    color: #f0a89a; border-color: rgba(240, 168, 154, 0.25);
  }
  .danger:hover { background: rgba(240, 168, 154, 0.12); }

  /* Floating tooltip for creature info */
  #floater {
    position: absolute;
    pointer-events: none;
    background: rgba(15, 20, 18, 0.92);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
    display: none;
    transition: opacity 0.18s;
    opacity: 0;
    max-width: 200px;
  }
  #floater .name { font-weight: 600; color: var(--accent); margin-bottom: 2px; }
  #floater .name.magical { color: var(--magical); }
  #floater .activity { color: var(--muted); font-style: italic; }

  /* Toast */
  #toast {
    position: absolute; left: 50%; top: 70px; transform: translateX(-50%);
    background: rgba(15, 20, 18, 0.92);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text);
    z-index: 12;
    display: none;
    pointer-events: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* Mobile layout */
  @media (max-width: 720px) {
    main { flex-direction: column; }
    #panel {
      width: 100%; height: 50%;
      border-left: none; border-top: 1px solid var(--panel-border);
      padding-bottom: 16px;
    }
    #tank-wrap { height: 50%; flex: none; padding: 8px; }
    .chip { font-size: 11px; padding: 7px 8px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="leaf">🌿</span> Tiny Terrarium</h1>
    <a class="home" href="index.html">← Home</a>
  </header>
  <main>
    <div id="tank-wrap">
      <canvas id="tank"></canvas>
      <div id="floater"></div>
      <div id="toast"></div>
    </div>
    <aside id="panel">
      <div class="section" id="biome-section">
        <h2>Biome</h2>
        <div class="row" id="biome-row"></div>
      </div>

      <div class="section" id="creature-section">
        <h2>Invite a Creature</h2>
        <div class="row" id="creature-row"></div>
      </div>

      <div class="section">
        <h2>Mode</h2>
        <div class="row">
          <button class="chip active" id="mode-watch" data-mode="watch">
            <span class="em">👁️</span><span class="lbl">Watch</span>
          </button>
          <button class="chip" id="mode-remove" data-mode="remove">
            <span class="em">🍃</span><span class="lbl">Release</span>
          </button>
        </div>
        <div class="row">
          <button class="chip" id="btn-lens">
            <span class="em">🔍</span><span class="lbl">Magnifier</span>
          </button>
        </div>
      </div>

      <div class="section">
        <h2>Tank</h2>
        <div class="stat"><span>Population</span><span id="stat-pop">0</span></div>
        <div class="stat"><span>Time of day</span><span id="stat-time">—</span></div>
        <div class="row">
          <button class="chip danger" id="btn-clear">
            <span class="em">🌬️</span><span class="lbl">Release all</span>
          </button>
        </div>
      </div>

      <div class="section">
        <h2>About</h2>
        <p style="font-size:11px;color:var(--muted);line-height:1.5">
          Tap a button to invite a creature. Tap a creature in the tank to learn its name. Switch to Release mode to gently send one back to the wild. Your tank is saved automatically.
        </p>
      </div>
    </aside>
  </main>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════
// Tiny Terrarium — a cosy idle game
// ════════════════════════════════════════════════════════════════════

const SAVE_KEY = 'idlegames-terrarium-v1';

// ── Biomes ──────────────────────────────────────────────────────────
const BIOMES = {
  grove: {
    id: 'grove',
    name: 'Mossy Grove',
    emoji: '🌳',
    sky: ['#3b5046', '#1f2a26'],
    ground: ['#2c3a2a', '#1a221b'],
    fogColour: 'rgba(160, 200, 150, 0.04)',
    accent: '#b8d490',
    waterLine: null,
    decorations: [
      { type: 'mushroom',  x: 0.18, scale: 2.0 },
      { type: 'mushroom',  x: 0.34, scale: 1.4 },
      { type: 'toadstool', x: 0.42, scale: 1.6 },
      { type: 'log',       x: 0.62, scale: 2.0 },
      { type: 'fern',      x: 0.78, scale: 2.0 },
      { type: 'fern',      x: 0.08, scale: 1.6 },
      { type: 'mushroom',  x: 0.86, scale: 1.7 },
      { type: 'clover',    x: 0.27, scale: 1.6 },
      { type: 'clover',    x: 0.55, scale: 1.4 },

    groundProfile: (x, w) => {

    accent: '#f0c879',
    waterLine: null,
    decorations: [
      { type: 'cactus',    x: 0.22, scale: 2.0 },
      { type: 'cactus',    x: 0.46, scale: 1.4 },
      { type: 'rock',      x: 0.68, scale: 2.0 },
      { type: 'rock',      x: 0.12, scale: 1.2 },
      { type: 'cactus',    x: 0.82, scale: 1.8 },
      { type: 'rock',      x: 0.92, scale: 1.4 },
      { type: 'dunegrass', x: 0.32, scale: 1.6 },
      { type: 'dunegrass', x: 0.58, scale: 1.4 },
      { type: 'bone',      x: 0.74, scale: 1.6 },
      { type: 'palm',      x: 0.04, scale: 1.8 },
      { type: 'tinyrock',  x: 0.50, scale: 1.5 },
    ],
    groundProfile: (x, w) => {
      // dunes
      return Math.sin(x / w * Math.PI * 1.4) * 18 + Math.sin(x / w * Math.PI * 3.7) * 5;
    },
  },
  tidepool: {
    id: 'tidepool',
    name: 'Tide Pool',
    emoji: '🌊',
    sky: ['#3a5870', '#1c2c3a'],
    ground: ['#3a4a52', '#1c2630'],
    fogColour: 'rgba(120, 180, 220, 0.05)',
    accent: '#88c8e0',
    waterLine: 0.55,         // fraction of tank height — water surface
    waterColour: 'rgba(70, 130, 160, 0.42)',
    decorations: [
      { type: 'rock',     x: 0.10, scale: 2.4 },
      { type: 'kelp',     x: 0.28, scale: 2.0 },
      { type: 'kelp',     x: 0.36, scale: 1.4 },
      { type: 'shell',    x: 0.55, scale: 2.0 },
      { type: 'kelp',     x: 0.72, scale: 2.2 },
      { type: 'rock',     x: 0.88, scale: 2.0 },
      { type: 'coral',    x: 0.20, scale: 1.8 },
      { type: 'coral',    x: 0.78, scale: 1.5 },
      { type: 'urchin',   x: 0.46, scale: 1.5 },
      { type: 'anemone',  x: 0.62, scale: 1.7 },
      { type: 'shell',    x: 0.95, scale: 1.4 },
    ],
    groundProfile: (x, w) => {
      // wet rocky basin — dips in the middle
      return Math.sin(x / w * Math.PI) * -22 + Math.sin(x / w * Math.PI * 4.3) * 4;
    },
  },
};

// ── Creatures ───────────────────────────────────────────────────────
//   home: which biome they're happiest in (drives mood + activity rate)
//   habit: 'ground' | 'air' | 'amphib' (amphib walks ground but loves water)
//   activities: weighted list of behaviours
const CREATURES = {
  beetle: {
    id: 'beetle', name: 'Iron Beetle', emoji: '🪲',
    magical: false, habit: 'ground', home: 'grove',
    size: 24, speed: 36,
    palette: ['#3a4640', '#1c241f', '#88a070'],
    activities: { wander: 4, forage: 3, nap: 1 },
    quip: 'Polishes its back on bark.',
  },
  snail: {
    id: 'snail', name: 'Pearlspiral Snail', emoji: '🐌',
    magical: false, habit: 'ground', home: 'grove',
    size: 28, speed: 12,
    palette: ['#c2b69a', '#8a7a5e', '#e8dec0'],
    activities: { wander: 2, nap: 4, forage: 2 },
    quip: 'Leaves a faintly luminous trail.',
  },
  hermit: {
    id: 'hermit', name: 'Hermit Crab', emoji: '🦀',
    magical: false, habit: 'amphib', home: 'tidepool',
    size: 32, speed: 28,
    palette: ['#a05848', '#682c20', '#f0d8a8'],
    activities: { wander: 3, splash: 4, forage: 2, nap: 1 },
    quip: 'Auditions a new shell every few minutes.',
  },
  glowmoth: {
    id: 'glowmoth', name: 'Glow Moth', emoji: '🦋',
    magical: true, habit: 'air', home: 'grove',
    size: 26, speed: 48,
    palette: ['#f6e8b8', '#d4a8ff', '#fff7d8'],
    activities: { wander: 4, shine: 4, nap: 1 },
    quip: 'Hums a single note when it glows.',
  },
  pebble: {
    id: 'pebble', name: 'Pebble Sprite', emoji: '🪨',
    magical: true, habit: 'ground', home: 'desert',
    size: 32, speed: 20,
    palette: ['#7a7068', '#4a4238', '#d4a8ff'],
    activities: { wander: 2, nap: 3, shine: 3, forage: 1 },
    quip: 'Swears it remembers the last ice age.',
  },
  wisp: {
    id: 'wisp', name: 'Wisp Kit', emoji: '🦊',
    magical: true, habit: 'air', home: 'tidepool',
    size: 36, speed: 38,

    activities: { wander: 3, shine: 3, nap: 3 },

  },
  ladybug: {
    id: 'ladybug', name: 'Ladybug', emoji: '🐞',
    magical: false, habit: 'ground', home: 'grove',
    size: 22, speed: 32,
    palette: ['#c83030', '#1a1010', '#ffffff'],
    activities: { wander: 4, forage: 3, nap: 1 },
    quip: 'Counts its own spots when no one is looking.',
  },
  firefly: {
    id: 'firefly', name: 'Firefly', emoji: '✨',
    magical: true, habit: 'air', home: 'grove',
    size: 18, speed: 44,
    palette: ['#3a4030', '#fff0a0', '#ffe070'],
    activities: { wander: 4, shine: 5, nap: 1 },
    quip: 'Blinks in time with a song only it knows.',
  },
  scorpling: {
    id: 'scorpling', name: 'Sand Scorpling', emoji: '🦂',
    magical: false, habit: 'ground', home: 'desert',
    size: 28, speed: 30,
    palette: ['#c89058', '#6a4220', '#f0d8a8'],
    activities: { wander: 4, forage: 3, nap: 2 },
    quip: 'Pretends not to notice you noticing it.',
  },
  sundjinn: {
    id: 'sundjinn', name: 'Sun Djinn', emoji: '☀️',
    magical: true, habit: 'air', home: 'desert',
    size: 32, speed: 36,
    palette: ['#ffb858', '#ff7a30', '#fff0a8'],
    activities: { wander: 3, shine: 4, nap: 2 },
    quip: 'Hums an old desert tune at noon.',
  },
  starfish: {
    id: 'starfish', name: 'Starfish', emoji: '⭐',
    magical: false, habit: 'amphib', home: 'tidepool',
    size: 30, speed: 6,
    palette: ['#e08858', '#a05030', '#ffd0a0'],
    activities: { wander: 1, nap: 5, splash: 2 },
    quip: 'Slow as a tide, content as a stone.',
  },
  bubblefae: {
    id: 'bubblefae', name: 'Bubble Fae', emoji: '🫧',
    magical: true, habit: 'air', home: 'tidepool',
    size: 28, speed: 34,
    palette: ['#a8d8e8', '#88c8e0', '#fff7d8'],
    activities: { wander: 4, shine: 3, nap: 1, splash: 2 },
    quip: 'Leaves a trail of laughing bubbles.',
  },
};

// ── State ───────────────────────────────────────────────────────────
const state = {
  biome: 'grove',
  creatures: [],     // {type, x, y, vx, vy, facing, age, activity, actTimer, target, mood, sparkles, lightPulse}
  tickAt: 0,
  mode: 'watch',
  selectedId: null,  // for floater
  worldTime: 0,      // seconds — drives day/night
  toastUntil: 0,
  lens: { active: false, x: 0, y: 0, hasPos: false, radius: 90, zoom: 5 },
};

// ── Canvas + DPR scaling ────────────────────────────────────────────
const canvas = document.getElementById('tank');
const ctx = canvas.getContext('2d');
let W = 800, H = 500, DPR = 1;

function resizeCanvas() {
  const wrap = canvas.parentElement;
  const r = wrap.getBoundingClientRect();
  DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  W = Math.max(320, Math.floor(r.width - 24));
  H = Math.max(220, Math.floor(r.height - 24));
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

// ── Time of day ─────────────────────────────────────────────────────
// One full day every ~4 minutes of real time.
const DAY_LENGTH = 240;
function timeOfDay() {
  // 0..1, 0 = midnight, 0.25 = dawn, 0.5 = midday, 0.75 = dusk
  return (state.worldTime % DAY_LENGTH) / DAY_LENGTH;
}
function dayLightLevel() {
  // Smoothly varies from 0 (night) to 1 (noon)
  const t = timeOfDay();
  return Math.max(0, Math.sin(t * Math.PI * 2 - Math.PI / 2) * 0.5 + 0.5);
}
function timeOfDayLabel() {
  const t = timeOfDay();
  if (t < 0.2)  return 'Night';
  if (t < 0.32) return 'Dawn';
  if (t < 0.55) return 'Morning';
  if (t < 0.7)  return 'Afternoon';
  if (t < 0.82) return 'Dusk';
  return 'Night';
}

// ── Ground helpers ──────────────────────────────────────────────────
function groundY(x) {
  const b = BIOMES[state.biome];
  const baseY = H * 0.78;
  return baseY + b.groundProfile(x, W);
}
function airYMin() { return H * 0.10; }
function airYMax() {
  const b = BIOMES[state.biome];
  if (b.waterLine != null) return H * b.waterLine - 30;
  return H * 0.62;
}
function waterY() {
  const b = BIOMES[state.biome];
  return b.waterLine != null ? H * b.waterLine : null;
}

// ── Helpers ─────────────────────────────────────────────────────────
function rand(min, max) { return min + Math.random() * (max - min); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickWeighted(weightedObj) {
  let total = 0;
  for (const k in weightedObj) total += weightedObj[k];
  let r = Math.random() * total;
  for (const k in weightedObj) {
    r -= weightedObj[k];
    if (r <= 0) return k;
  }
  return Object.keys(weightedObj)[0];
}
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  state.toastUntil = performance.now() + 1800;
}
function maybeHideToast() {
  if (performance.now() > state.toastUntil) {
    document.getElementById('toast').style.display = 'none';
  }
}

// ── Creature lifecycle ──────────────────────────────────────────────
let _nextId = 1;
function addCreature(typeId, atX = null) {
  const t = CREATURES[typeId];
  if (!t) return;
  const x = atX != null ? atX : rand(W * 0.15, W * 0.85);
  const y = (t.habit === 'air')
    ? rand(airYMin() + 30, airYMax() - 30)
    : groundY(x) - t.size * 0.5;
  const c = {
    id: _nextId++,
    type: typeId,
    x, y,
    vx: 0, vy: 0,
    facing: Math.random() < 0.5 ? -1 : 1,
    age: 0,
    activity: 'wander',
    actTimer: rand(2, 5),
    target: null,
    mood: 0.7,
    sparkles: [],
    lightPulse: 0,
    bobPhase: Math.random() * Math.PI * 2,
  };
  pickActivity(c);
  state.creatures.push(c);
  saveState();
}

function removeCreature(c) {
  const idx = state.creatures.indexOf(c);
  if (idx >= 0) state.creatures.splice(idx, 1);
  // Add a burst of leaves where it stood
  for (let i = 0; i < 8; i++) {
    state.farewells.push({
      x: c.x, y: c.y,
      vx: rand(-30, 30), vy: rand(-50, -10),
      life: 1.5, max: 1.5,
      colour: BIOMES[state.biome].accent,
    });
  }
  saveState();
}

function pickActivity(c) {
  const def = CREATURES[c.type];
  const homeMatch = def.home === state.biome;
  const light = dayLightLevel();
  // Bias activities by time of day + biome match
  const weights = { ...def.activities };
  if (light < 0.25) {
    weights.nap = (weights.nap || 0) + 4;
    if (def.magical) weights.shine = (weights.shine || 0) + 2;
  }
  if (!homeMatch) {
    weights.wander = (weights.wander || 0) * 0.6;
    weights.nap = (weights.nap || 1) + 2;
  }
  // Filter activities the creature can't do here
  if (!('splash' in weights) || waterY() == null) delete weights.splash;
  if (!Object.keys(weights).length) weights.wander = 1;

  c.activity = pickWeighted(weights);
  c.actTimer = rand(3, 8);

  // Set targets per activity
  if (c.activity === 'wander') {
    if (def.habit === 'air') {
      c.target = { x: rand(W * 0.10, W * 0.90), y: rand(airYMin() + 20, airYMax() - 20) };
    } else {
      c.target = { x: rand(W * 0.05, W * 0.95), y: 0 };
    }
  } else if (c.activity === 'forage') {
    // walk toward a random decoration
    const b = BIOMES[state.biome];
    const deco = pick(b.decorations);
    c.target = { x: deco.x * W + rand(-20, 20), y: 0 };
  } else if (c.activity === 'splash') {
    // walk to where water meets ground
    const wy = waterY();
    if (wy == null) { c.activity = 'wander'; pickActivity(c); return; }
    c.target = { x: rand(W * 0.30, W * 0.70), y: 0 };
  } else if (c.activity === 'nap' || c.activity === 'shine') {
    c.target = null;
  }
}

function updateCreature(c, dt) {
  const def = CREATURES[c.type];
  c.age += dt;
  c.bobPhase += dt * 2.5;
  c.actTimer -= dt;
  if (c.actTimer <= 0) pickActivity(c);

  const speed = def.speed;
  const homeMatch = def.home === state.biome;
  c.mood = lerp(c.mood, homeMatch ? 1.0 : 0.55, dt * 0.05);

  switch (c.activity) {
    case 'wander':
    case 'forage':
    case 'splash': {
      if (!c.target) { pickActivity(c); break; }
      const tx = c.target.x;
      if (def.habit === 'air') {
        const ty = c.target.y;
        const dx = tx - c.x, dy = ty - c.y;
        const d = Math.hypot(dx, dy);
        if (d < 4) { pickActivity(c); break; }
        c.vx = lerp(c.vx, (dx / d) * speed, dt * 2);
        c.vy = lerp(c.vy, (dy / d) * speed, dt * 2);
        c.x += c.vx * dt;
        c.y += c.vy * dt;
        c.facing = c.vx < 0 ? -1 : 1;
      } else {
        const dx = tx - c.x;
        if (Math.abs(dx) < 3) {
          if (c.activity === 'forage') spawnSparkle(c, 8);
          if (c.activity === 'splash') spawnRipple(c);
          pickActivity(c); break;
        }
        const dir = Math.sign(dx);
        c.facing = dir < 0 ? -1 : 1;
        c.x += dir * speed * dt;
        c.y = groundY(c.x) - def.size * 0.5;
      }
      break;
    }
    case 'nap': {
      c.vx = lerp(c.vx, 0, dt * 6);
      c.vy = lerp(c.vy, 0, dt * 6);
      if (def.habit !== 'air') c.y = groundY(c.x) - def.size * 0.5;
      break;
    }
    case 'shine': {
      c.lightPulse += dt;
      if (c.lightPulse > 2.5) c.lightPulse = 0;
      if (def.habit === 'air') {
        c.vx = lerp(c.vx, Math.sin(c.age * 1.5) * speed * 0.3, dt * 1.5);
        c.vy = lerp(c.vy, Math.cos(c.age * 1.1) * speed * 0.2, dt * 1.5);
        c.x += c.vx * dt;
        c.y += c.vy * dt;
      }
      break;
    }
  }

  // Stay inside the tank
  c.x = clamp(c.x, 16, W - 16);
  if (def.habit === 'air') {
    c.y = clamp(c.y, airYMin(), airYMax());
  } else {
    c.y = clamp(c.y, 40, H - 12);
  }

  // Ambient sparkles for magical creatures
  if (def.magical && Math.random() < dt * 0.6) {
    spawnSparkle(c, 1);
  }

  // Update sparkles
  for (let i = c.sparkles.length - 1; i >= 0; i--) {
    const s = c.sparkles[i];
    s.life -= dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += 12 * dt;
    if (s.life <= 0) c.sparkles.splice(i, 1);
  }
}

function spawnSparkle(c, count) {
  const def = CREATURES[c.type];
  for (let i = 0; i < count; i++) {
    c.sparkles.push({
      x: c.x + rand(-def.size * 0.4, def.size * 0.4),
      y: c.y + rand(-def.size * 0.4, def.size * 0.4),
      vx: rand(-12, 12),
      vy: rand(-30, -8),
      life: rand(0.6, 1.4),
      max: 1.4,
      colour: def.palette[2] || '#fff7d8',
    });
  }
}

state.farewells = [];
state.ripples = [];
function spawnRipple(c) {
  const wy = waterY();
  if (wy == null) return;
  state.ripples.push({ x: c.x, y: wy, r: 4, max: 60, life: 1.2, maxLife: 1.2 });
}

// ── Rendering ──────────────────────────────────────────────────────
function render() {
  const b = BIOMES[state.biome];
  const light = dayLightLevel();

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.8);
  const skyTop = mixColour(b.sky[0], '#0a0f12', 1 - light);
  const skyBot = mixColour(b.sky[1], '#0a0f12', 1 - light);
  sky.addColorStop(0, skyTop);
  sky.addColorStop(1, skyBot);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // A few stars at night
  if (light < 0.4) {
    const starOpacity = (0.4 - light) * 2;
    ctx.save();
    for (let i = 0; i < 30; i++) {
      const x = (i * 37 % 100) / 100 * W;
      const y = (i * 71 % 100) / 100 * H * 0.55;
      ctx.globalAlpha = starOpacity * (0.3 + ((i * 13 % 7) / 10));
      ctx.fillStyle = '#fff7d8';
      ctx.fillRect(x, y, 1.5, 1.5);
    }
    ctx.restore();
  }

  // Sun / moon
  drawCelestial(light);

  // Ground silhouette
  drawGround(b);

  // Decorations (behind creatures)
  drawDecorations(b);

  // Water surface (tide pool)
  if (b.waterLine != null) drawWater(b);

  // Creatures
  // Sort by Y so closer creatures draw on top
  const sorted = [...state.creatures].sort((a, b) => a.y - b.y);
  for (const c of sorted) drawCreature(c);

  // Ripples
  for (let i = state.ripples.length - 1; i >= 0; i--) {
    const r = state.ripples[i];
    const a = r.life / r.maxLife;
    ctx.strokeStyle = `rgba(180, 220, 240, ${a * 0.7})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.r, r.r * 0.3, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Farewell leaves
  for (let i = state.farewells.length - 1; i >= 0; i--) {
    const f = state.farewells[i];
    const a = f.life / f.max;
    ctx.fillStyle = f.colour;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.ellipse(f.x, f.y, 4, 2, f.life * 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Glass overlay tint at night
  if (light < 0.7) {
    ctx.fillStyle = `rgba(40, 60, 80, ${(0.7 - light) * 0.18})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Ambient fog tint (forward-facing terrarium glass)
  ctx.fillStyle = b.fogColour;
  ctx.fillRect(0, 0, W, H);

  // Subtle glass reflection at top
  const refl = ctx.createLinearGradient(0, 0, 0, H * 0.25);
  refl.addColorStop(0, 'rgba(255,255,255,0.10)');
  refl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = refl;
  ctx.fillRect(0, 0, W, H * 0.25);

  // Magnifier lens (drawn last, sampling everything beneath)
  if (state.lens.active && state.lens.hasPos) drawLens();
}

function drawLens() {
  const { x, y, radius, zoom } = state.lens;
  const srcHalf = radius / zoom;

  // Capture the source region BEFORE we paint any lens chrome over it,
  // otherwise drawImage will sample the shadow we just drew.
  const sx = Math.floor((x - srcHalf) * DPR);
  const sy = Math.floor((y - srcHalf) * DPR);
  const sw = Math.ceil((srcHalf * 2) * DPR);
  const sh = Math.ceil((srcHalf * 2) * DPR);
  const sample = document.createElement('canvas');
  sample.width = Math.max(1, sw);
  sample.height = Math.max(1, sh);
  const sctx = sample.getContext('2d');
  // Clamp to canvas bounds
  const cx0 = Math.max(0, sx);
  const cy0 = Math.max(0, sy);
  const cx1 = Math.min(canvas.width,  sx + sw);
  const cy1 = Math.min(canvas.height, sy + sh);
  if (cx1 > cx0 && cy1 > cy0) {
    sctx.drawImage(canvas,
      cx0, cy0, cx1 - cx0, cy1 - cy0,
      cx0 - sx, cy0 - sy, cx1 - cx0, cy1 - cy0);
  }

  // Drop shadow as a separate disc beneath
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = 22;
  ctx.shadowOffsetY = 6;
  ctx.fillStyle = 'rgba(0,0,0,0.001)'; // invisible fill, just to project shadow
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Clip to circle and draw the zoomed scene from our captured sample
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, radius - 2, 0, Math.PI * 2);
  ctx.clip();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(sample, x - radius, y - radius, radius * 2, radius * 2);

  // Inner spherical highlight
  const hi = ctx.createRadialGradient(x - radius * 0.4, y - radius * 0.4, radius * 0.05,
                                      x, y, radius);
  hi.addColorStop(0, 'rgba(255,255,255,0.28)');
  hi.addColorStop(0.4, 'rgba(255,255,255,0.05)');
  hi.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = hi;
  ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
  ctx.restore();

  // Brass rim
  ctx.save();
  ctx.lineWidth = 6;
  const rim = ctx.createLinearGradient(x - radius, y - radius, x + radius, y + radius);
  rim.addColorStop(0, '#5a4022');
  rim.addColorStop(0.5, '#d4a468');
  rim.addColorStop(1, '#3a2a16');
  ctx.strokeStyle = rim;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();
  // Inner thin dark ring
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.arc(x, y, radius - 4, 0, Math.PI * 2);
  ctx.stroke();
  // Small specular gleam on rim
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(255, 240, 210, 0.85)';
  ctx.beginPath();
  ctx.arc(x, y, radius, -Math.PI * 0.85, -Math.PI * 0.55);
  ctx.stroke();
  ctx.restore();

  // Handle
  ctx.save();
  const handleAng = Math.PI * 0.30;
  const hx1 = x + Math.cos(handleAng) * (radius + 2);
  const hy1 = y + Math.sin(handleAng) * (radius + 2);
  const hx2 = x + Math.cos(handleAng) * (radius + 44);
  const hy2 = y + Math.sin(handleAng) * (radius + 44);
  ctx.lineCap = 'round';
  ctx.lineWidth = 10;
  ctx.strokeStyle = '#3a2a16';
  ctx.beginPath();
  ctx.moveTo(hx1, hy1);
  ctx.lineTo(hx2, hy2);
  ctx.stroke();
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#7a5a32';
  ctx.beginPath();
  ctx.moveTo(hx1, hy1);
  ctx.lineTo(hx2, hy2);
  ctx.stroke();
  ctx.restore();
}

function drawCelestial(light) {
  const t = timeOfDay();              // 0..1
  // Arc the sun/moon across the top of the tank
  const a = (t - 0.25) * Math.PI * 2; // -π/2 at midnight, +π/2 at noon... but we want 0..π over day
  // Use a simpler arc: sun from 0.25→0.75, moon otherwise
  const dayPart = (t > 0.20 && t < 0.80);
  const localT = dayPart ? (t - 0.20) / 0.60 : ((t < 0.20) ? (t + 0.20) / 0.40 : (t - 0.80) / 0.40);
  const arcX = lerp(W * 0.10, W * 0.90, localT);
  const arcY = H * 0.18 - Math.sin(localT * Math.PI) * H * 0.10;
  ctx.save();
  ctx.shadowColor = dayPart ? 'rgba(255, 220, 130, 0.85)' : 'rgba(220, 230, 255, 0.7)';
  ctx.shadowBlur = 24;
  ctx.fillStyle = dayPart ? '#fff0b0' : '#e0e7f0';
  ctx.beginPath();
  ctx.arc(arcX, arcY, dayPart ? 18 : 14, 0, Math.PI * 2);
  ctx.fill();
  if (!dayPart) {
    // crescent shadow
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath();
    ctx.arc(arcX + 5, arcY - 1, 12, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawGround(b) {
  // Build a smooth ground polygon
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 4) {
    ctx.lineTo(x, groundY(x));
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  const g = ctx.createLinearGradient(0, H * 0.5, 0, H);
  g.addColorStop(0, b.ground[0]);
  g.addColorStop(1, b.ground[1]);
  ctx.fillStyle = g;
  ctx.fill();

  // Surface texture noise
  ctx.save();
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 60; i++) {
    const x = (i * 47 + state.biome.length * 3) % W;
    const y = groundY(x) + 4 + (i % 5);
    ctx.fillStyle = b.id === 'desert' ? '#c08a4a' : b.id === 'tidepool' ? '#5a6a72' : '#3a4a36';
    ctx.fillRect(x, y, 2, 2);
  }
  ctx.restore();

  // Top accent line of ground
  ctx.strokeStyle = b.id === 'grove' ? 'rgba(200, 240, 160, 0.18)'
                  : b.id === 'desert' ? 'rgba(255, 230, 170, 0.18)'
                  : 'rgba(200, 220, 240, 0.16)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, groundY(0));
  for (let x = 0; x <= W; x += 4) ctx.lineTo(x, groundY(x));
  ctx.stroke();
}

function drawDecorations(b) {
  for (const d of b.decorations) {
    const x = d.x * W;
    const y = groundY(x);
    drawDecoration(d.type, x, y, d.scale);
  }
}

function drawDecoration(type, x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  switch (type) {
    case 'mushroom': {
      ctx.fillStyle = '#1a221a';
      ctx.fillRect(-2, -10, 4, 10);                   // stem
      ctx.fillStyle = '#c4503a';
      ctx.beginPath();
      ctx.ellipse(0, -10, 12, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,240,210,0.85)';
      for (const dx of [-6, -2, 3, 7]) {
        ctx.beginPath(); ctx.arc(dx, -11, 1.2, 0, Math.PI * 2); ctx.fill();
      }
      break;
    }
    case 'log': {
      ctx.fillStyle = '#3a2a1c';
      ctx.fillRect(-22, -8, 44, 8);
      ctx.fillStyle = '#5a4030';
      ctx.beginPath(); ctx.ellipse(-22, -4, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(22, -4, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
      // moss
      ctx.fillStyle = '#7a9460';
      ctx.fillRect(-22, -10, 44, 2);
      for (let i = -18; i < 22; i += 5) {
        ctx.beginPath();
        ctx.arc(i + Math.sin(i) * 2, -11, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'fern': {
      ctx.strokeStyle = '#446a3a';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 6; i++) {
        const ang = -Math.PI / 2 + (i - 2.5) * 0.3;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(Math.cos(ang) * 8, -10, Math.cos(ang) * 14, -22);
        ctx.stroke();
      }
      ctx.fillStyle = '#5a8048';
      for (let i = 0; i < 6; i++) {
        const ang = -Math.PI / 2 + (i - 2.5) * 0.3;
        ctx.beginPath();
        ctx.ellipse(Math.cos(ang) * 14, -22, 3, 5, ang, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'cactus': {
      ctx.fillStyle = '#4a7a4a';
      ctx.fillRect(-5, -28, 10, 28);
      ctx.fillStyle = '#3a6440';
      ctx.fillRect(-7, -18, 4, 8);
      ctx.fillRect(3, -22, 4, 10);
      // arms
      ctx.fillStyle = '#4a7a4a';
      ctx.fillRect(-12, -20, 7, 4);
      ctx.fillRect(-12, -22, 4, 8);
      ctx.fillRect(8, -16, 7, 4);
      ctx.fillRect(11, -18, 4, 6);
      // spines
      ctx.strokeStyle = 'rgba(255, 240, 200, 0.6)';
      ctx.lineWidth = 0.8;
      for (let i = -25; i < 0; i += 4) {
        ctx.beginPath(); ctx.moveTo(-5, i); ctx.lineTo(-7, i - 1); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(5, i); ctx.lineTo(7, i - 1); ctx.stroke();
      }
      // crown flower
      ctx.fillStyle = '#f0a878';
      ctx.beginPath(); ctx.arc(0, -29, 2.5, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'rock': {
      ctx.fillStyle = '#5a5048';
      ctx.beginPath();
      ctx.moveTo(-14, 0);
      ctx.lineTo(-10, -10);
      ctx.lineTo(-2, -14);
      ctx.lineTo(8, -12);
      ctx.lineTo(14, -4);
      ctx.lineTo(12, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#7a6e64';
      ctx.beginPath();
      ctx.moveTo(-10, -10);
      ctx.lineTo(-2, -14);
      ctx.lineTo(0, -8);
      ctx.lineTo(-6, -8);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'kelp': {
      ctx.strokeStyle = '#3a6852';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      for (let i = 1; i <= 10; i++) {
        const sway = Math.sin((state.worldTime + i) * 1.2) * 3;
        ctx.lineTo(sway, -i * 6);
      }
      ctx.stroke();
      ctx.fillStyle = '#5a8a72';
      for (let i = 2; i <= 9; i += 2) {
        const sway = Math.sin((state.worldTime + i) * 1.2) * 3;
        ctx.beginPath();
        ctx.ellipse(sway + (i % 4 === 0 ? -3 : 3), -i * 6, 3, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'shell': {
      ctx.fillStyle = '#e8c8a0';
      ctx.beginPath();
      ctx.arc(0, -5, 8, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#a07858';
      ctx.lineWidth = 1;
      for (let i = -6; i <= 6; i += 2) {
        ctx.beginPath();
        ctx.moveTo(i, -5);
        ctx.lineTo(i * 0.6, -10);
        ctx.stroke();
      }
      break;
    }
    case 'toadstool': {
      // small white-spotted mushroom
      ctx.fillStyle = '#e8e0d4';
      ctx.fillRect(-2, -8, 4, 8);
      ctx.fillStyle = '#d04030';
      ctx.beginPath();
      ctx.ellipse(0, -10, 8, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff8e8';
      for (const [sx, sy] of [[-3, -11], [2, -12], [4, -9], [-5, -9]]) {
        ctx.beginPath();
        ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'clover': {
      // three-leaf clover
      ctx.fillStyle = '#3a8848';
      for (let i = 0; i < 3; i++) {
        const a = -Math.PI / 2 + i * (Math.PI * 2 / 3);
        const cx = Math.cos(a) * 4;
        const cy = Math.sin(a) * 4 - 4;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 3.5, 4.5, a + Math.PI / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.strokeStyle = '#2a5830';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -4); ctx.stroke();
      break;
    }
    case 'twig': {
      ctx.strokeStyle = '#6a4828';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-8, 0); ctx.lineTo(8, -2);
      ctx.moveTo(2, -1); ctx.lineTo(6, -6);
      ctx.moveTo(-2, -1); ctx.lineTo(-5, -5);
      ctx.stroke();
      break;
    }
    case 'berry': {
      // small berry bush
      ctx.fillStyle = '#2a5028';
      ctx.beginPath();
      ctx.arc(0, -6, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a6830';
      ctx.beginPath(); ctx.arc(-3, -8, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 3, -5, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#c84030';
      for (const [bx, by] of [[-2, -4], [4, -7], [0, -10], [-4, -8]]) {
        ctx.beginPath();
        ctx.arc(bx, by, 1.4, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'dunegrass': {
      ctx.strokeStyle = '#c0a060';
      ctx.lineWidth = 1.4;
      ctx.lineCap = 'round';
      for (let i = -5; i <= 5; i += 2) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.quadraticCurveTo(i + 1, -6, i * 0.6 + 1, -12 + Math.abs(i) * 0.4);
        ctx.stroke();
      }
      break;
    }
    case 'bone': {
      // small bleached rib arc
      ctx.strokeStyle = '#e8e0c8';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(0, 4, 9, Math.PI * 1.05, Math.PI * 1.95);
      ctx.stroke();
      ctx.fillStyle = '#e8e0c8';
      ctx.beginPath(); ctx.arc(-9, 0, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 9, 0, 2, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'palm': {
      // small palmetto
      ctx.strokeStyle = '#5a4020';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -14); ctx.stroke();
      ctx.fillStyle = '#4a8048';
      for (let i = 0; i < 6; i++) {
        const a = -Math.PI / 2 + (i - 2.5) * 0.45;
        ctx.save();
        ctx.translate(0, -14);
        ctx.rotate(a);
        ctx.beginPath();
        ctx.ellipse(0, -7, 2.5, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      break;
    }
    case 'tinyrock': {
      ctx.fillStyle = '#a07850';
      ctx.beginPath();
      ctx.ellipse(-4, -2, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(3, -1, 3.5, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6a4828';
      ctx.beginPath(); ctx.ellipse(-4, -3.5, 2, 1, 0, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'coral': {
      ctx.strokeStyle = '#e88098';
      ctx.lineWidth = 2.4;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(-6, -10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo( 6, -10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-3, -16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo( 3, -16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-6, -10); ctx.lineTo(-9, -14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 6, -10); ctx.lineTo( 9, -14); ctx.stroke();
      ctx.fillStyle = '#fff0d8';
      for (const [tx, ty] of [[0, -16], [-3, -16], [3, -16], [-9, -14], [9, -14]]) {
        ctx.beginPath();
        ctx.arc(tx, ty, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'urchin': {
      ctx.fillStyle = '#2a1830';
      ctx.beginPath();
      ctx.arc(0, -4, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#1a0a1a';
      ctx.lineWidth = 1.2;
      ctx.lineCap = 'round';
      for (let i = 0; i < 14; i++) {
        const a = i * Math.PI * 2 / 14;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * 5, -4 + Math.sin(a) * 5);
        ctx.lineTo(Math.cos(a) * 11, -4 + Math.sin(a) * 11);
        ctx.stroke();
      }
      break;
    }
    case 'anemone': {
      // base bulb
      ctx.fillStyle = '#a04868';
      ctx.beginPath();
      ctx.ellipse(0, -2, 6, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // waving tendrils
      ctx.strokeStyle = '#e88098';
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      const t = state.worldTime;
      for (let i = -4; i <= 4; i++) {
        const sway = Math.sin(t * 1.5 + i) * 2;
        ctx.beginPath();
        ctx.moveTo(i * 1.2, -3);
        ctx.quadraticCurveTo(i * 1.2 + sway, -8, i * 1.2 + sway, -14 + Math.abs(i) * 0.6);
        ctx.stroke();
      }
      ctx.fillStyle = '#fff0d8';
      for (let i = -4; i <= 4; i += 2) {
        const sway = Math.sin(t * 1.5 + i) * 2;
        ctx.beginPath();
        ctx.arc(i * 1.2 + sway, -14 + Math.abs(i) * 0.6, 1.1, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
  }
  ctx.restore();
}

function drawWater(b) {
  const wy = H * b.waterLine;
  ctx.fillStyle = b.waterColour;
  ctx.fillRect(0, wy, W, H - wy);
  // surface ripples
  ctx.strokeStyle = 'rgba(220, 240, 250, 0.22)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 8) {
    const y = wy + Math.sin((x + state.worldTime * 40) * 0.05) * 1.5;
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

// ── Creature drawing ────────────────────────────────────────────────
function drawCreature(c) {
  const def = CREATURES[c.type];
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(c.facing, 1);

  const bob = Math.sin(c.bobPhase) * (def.habit === 'air' ? 3 : 0.8);
  ctx.translate(0, bob);

  // Magical glow
  if (def.magical) {
    const pulse = 0.6 + 0.4 * Math.sin(c.age * 3.0);
    ctx.shadowColor = def.palette[2] || '#fff7d8';
    ctx.shadowBlur = 18 * pulse * (c.activity === 'shine' ? 1.6 : 1);
  }

  switch (c.type) {
    case 'beetle':    drawBeetle(c, def); break;
    case 'snail':     drawSnail(c, def); break;
    case 'hermit':    drawHermit(c, def); break;
    case 'glowmoth':  drawGlowmoth(c, def); break;
    case 'pebble':    drawPebble(c, def); break;
    case 'wisp':      drawWisp(c, def); break;
    case 'ladybug':   drawLadybug(c, def); break;
    case 'firefly':   drawFirefly(c, def); break;
    case 'scorpling': drawScorpling(c, def); break;
    case 'sundjinn':  drawSunDjinn(c, def); break;
    case 'starfish':  drawStarfish(c, def); break;
    case 'bubblefae': drawBubbleFae(c, def); break;
  }
  ctx.shadowBlur = 0;
  ctx.restore();

  // Sparkles in world space
  for (const s of c.sparkles) {
    const a = s.life / s.max;
    ctx.fillStyle = s.colour;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 1.4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Activity indicator (Z for nap, ✦ for shine subtle text)
  if (c.activity === 'nap') {
    const blink = (Math.sin(c.age * 2) + 1) * 0.5;
    ctx.fillStyle = `rgba(255, 247, 216, ${0.6 + blink * 0.3})`;
    ctx.font = '10px Inter, sans-serif';
    ctx.fillText('z', c.x + 8, c.y - 12 + Math.sin(c.age * 1.5) * 2);
  }
}

function drawBeetle(c, def) {
  // body
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.ellipse(0, 0, def.size * 0.7, def.size * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  // shell highlight
  ctx.fillStyle = def.palette[2];
  ctx.beginPath();
  ctx.ellipse(-2, -1.5, def.size * 0.4, def.size * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  // head
  ctx.fillStyle = def.palette[1];
  ctx.beginPath();
  ctx.arc(def.size * 0.55, 0, def.size * 0.25, 0, Math.PI * 2);
  ctx.fill();
  // legs
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 1.2;
  const wig = c.activity === 'wander' || c.activity === 'forage'
    ? Math.sin(c.bobPhase * 4) * 2 : 0;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 4, def.size * 0.35);
    ctx.lineTo(i * 4 - 3, def.size * 0.6 + wig * (i % 2));
    ctx.stroke();
  }
  // eyes
  ctx.fillStyle = '#fff7d8';
  ctx.beginPath(); ctx.arc(def.size * 0.62, -1.5, 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#101';
  ctx.beginPath(); ctx.arc(def.size * 0.65, -1.5, 0.6, 0, Math.PI * 2); ctx.fill();
}

function drawSnail(c, def) {
  // body
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.ellipse(0, 4, def.size * 0.8, def.size * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  // shell
  ctx.fillStyle = def.palette[1];
  ctx.beginPath();
  ctx.arc(-2, -2, def.size * 0.55, 0, Math.PI * 2);
  ctx.fill();
  // shell spiral
  ctx.strokeStyle = def.palette[2];
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  for (let a = 0; a < Math.PI * 4; a += 0.2) {
    const r = a * 1.2;
    const sx = -2 + Math.cos(a) * r * 0.3;
    const sy = -2 + Math.sin(a) * r * 0.3;
    if (a === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
  }
  ctx.stroke();
  // eyestalks
  ctx.strokeStyle = def.palette[0];
  ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(def.size * 0.55, 4); ctx.lineTo(def.size * 0.65, -3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(def.size * 0.45, 4); ctx.lineTo(def.size * 0.55, -2); ctx.stroke();
  ctx.fillStyle = '#101';
  ctx.beginPath(); ctx.arc(def.size * 0.65, -3, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(def.size * 0.55, -2, 1, 0, Math.PI * 2); ctx.fill();
}

function drawHermit(c, def) {
  // shell
  ctx.fillStyle = def.palette[2];
  ctx.beginPath();
  ctx.arc(-3, 0, def.size * 0.55, 0, Math.PI * 2);
  ctx.fill();
  // shell stripes
  ctx.strokeStyle = def.palette[0];
  ctx.lineWidth = 1.2;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.arc(-3, 0, def.size * 0.55, i * 0.6 - 0.2, i * 0.6 + 0.4);
    ctx.stroke();
  }
  // body peeking out
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.ellipse(def.size * 0.5, 3, def.size * 0.35, def.size * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();
  // claw
  ctx.beginPath();
  ctx.ellipse(def.size * 0.85, 0, def.size * 0.22, def.size * 0.16, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // legs
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 1.4;
  const wig = c.activity === 'wander' || c.activity === 'splash'
    ? Math.sin(c.bobPhase * 5) * 2 : 0;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(def.size * 0.3 + i * 3, def.size * 0.25);
    ctx.lineTo(def.size * 0.4 + i * 3, def.size * 0.55 + wig * (i % 2));
    ctx.stroke();
  }
  // eyes on stalks
  ctx.strokeStyle = def.palette[0];
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(def.size * 0.6, 0); ctx.lineTo(def.size * 0.7, -5); ctx.stroke();
  ctx.fillStyle = '#101';
  ctx.beginPath(); ctx.arc(def.size * 0.7, -5, 1.2, 0, Math.PI * 2); ctx.fill();
}

function drawGlowmoth(c, def) {
  const flap = Math.sin(c.bobPhase * 6) * 0.4 + 0.6;
  // wings (back)
  ctx.fillStyle = def.palette[1];
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.ellipse(-1, -3, def.size * 0.7 * flap, def.size * 0.55, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-1, 3, def.size * 0.65 * flap, def.size * 0.45, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // wings (front, paler)
  ctx.fillStyle = def.palette[0];
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.ellipse(2, -2, def.size * 0.55 * flap, def.size * 0.4, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(2, 2, def.size * 0.5 * flap, def.size * 0.35, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // body
  ctx.fillStyle = '#3a2a3a';
  ctx.beginPath();
  ctx.ellipse(0, 0, def.size * 0.18, def.size * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  // antennae
  ctx.strokeStyle = '#3a2a3a';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, -def.size * 0.4); ctx.quadraticCurveTo(4, -def.size * 0.7, 6, -def.size * 0.85); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -def.size * 0.4); ctx.quadraticCurveTo(-4, -def.size * 0.7, -6, -def.size * 0.85); ctx.stroke();
}

function drawPebble(c, def) {
  // base rock body
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.moveTo(-def.size * 0.6, def.size * 0.4);
  ctx.lineTo(-def.size * 0.5, -def.size * 0.4);
  ctx.lineTo(def.size * 0.4, -def.size * 0.5);
  ctx.lineTo(def.size * 0.6, def.size * 0.3);
  ctx.lineTo(def.size * 0.4, def.size * 0.5);
  ctx.lineTo(-def.size * 0.4, def.size * 0.5);
  ctx.closePath();
  ctx.fill();
  // shadow facet
  ctx.fillStyle = def.palette[1];
  ctx.beginPath();
  ctx.moveTo(0, -def.size * 0.45);
  ctx.lineTo(def.size * 0.5, def.size * 0.3);
  ctx.lineTo(def.size * 0.6, def.size * 0.3);
  ctx.lineTo(def.size * 0.4, def.size * 0.5);
  ctx.lineTo(0, def.size * 0.5);
  ctx.closePath();
  ctx.fill();
  // glowing crystal eyes
  ctx.fillStyle = def.palette[2];
  ctx.beginPath(); ctx.arc(-def.size * 0.18, -def.size * 0.05, 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(def.size * 0.18, -def.size * 0.08, 1.6, 0, Math.PI * 2); ctx.fill();
  // mouth
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(-3, def.size * 0.18); ctx.lineTo(3, def.size * 0.18); ctx.stroke();
  // tiny vine on top (rooted, peaceful)
  ctx.strokeStyle = '#88a070';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, -def.size * 0.5);
  ctx.quadraticCurveTo(2, -def.size * 0.7, 5, -def.size * 0.8);
  ctx.stroke();
  ctx.fillStyle = '#88a070';
  ctx.beginPath(); ctx.arc(5, -def.size * 0.8, 1.6, 0, Math.PI * 2); ctx.fill();
}

function drawWisp(c, def) {
  // soft body — translucent
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.ellipse(0, 0, def.size * 0.6, def.size * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // head
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.arc(def.size * 0.45, -def.size * 0.1, def.size * 0.32, 0, Math.PI * 2);
  ctx.fill();
  // ears
  ctx.beginPath();
  ctx.moveTo(def.size * 0.55, -def.size * 0.35);
  ctx.lineTo(def.size * 0.4, -def.size * 0.55);
  ctx.lineTo(def.size * 0.3, -def.size * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(def.size * 0.7, -def.size * 0.3);
  ctx.lineTo(def.size * 0.65, -def.size * 0.55);
  ctx.lineTo(def.size * 0.5, -def.size * 0.35);
  ctx.closePath();
  ctx.fill();
  // tail (curled)
  ctx.beginPath();
  ctx.ellipse(-def.size * 0.5, -def.size * 0.15, def.size * 0.35, def.size * 0.22,
    Math.sin(c.age * 1.6) * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // eyes
  ctx.fillStyle = def.palette[1];
  ctx.beginPath(); ctx.arc(def.size * 0.5, -def.size * 0.13, 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(def.size * 0.35, -def.size * 0.13, 1.4, 0, Math.PI * 2); ctx.fill();
  // glow nose
  ctx.fillStyle = def.palette[2];
  ctx.beginPath(); ctx.arc(def.size * 0.62, 0, 1, 0, Math.PI * 2); ctx.fill();
}

function drawLadybug(c, def) {
  // body
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.ellipse(0, 0, def.size * 0.65, def.size * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  // wing seam
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(0, -def.size * 0.4);
  ctx.lineTo(0, def.size * 0.4);
  ctx.stroke();
  // spots
  ctx.fillStyle = def.palette[1];
  for (const [sx, sy] of [[-4, -3], [3, -2], [-2, 4], [4, 4], [-6, 1]]) {
    ctx.beginPath();
    ctx.arc(sx, sy, def.size * 0.10, 0, Math.PI * 2);
    ctx.fill();
  }
  // head
  ctx.fillStyle = def.palette[1];
  ctx.beginPath();
  ctx.arc(def.size * 0.58, 0, def.size * 0.22, 0, Math.PI * 2);
  ctx.fill();
  // eyes
  ctx.fillStyle = def.palette[2];
  ctx.beginPath(); ctx.arc(def.size * 0.66, -def.size * 0.10, 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(def.size * 0.66,  def.size * 0.10, 1.3, 0, Math.PI * 2); ctx.fill();
  // legs
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 1.2;
  const wig = (c.activity === 'wander' || c.activity === 'forage')
    ? Math.sin(c.bobPhase * 4) * 2 : 0;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 4, def.size * 0.40);
    ctx.lineTo(i * 4 - 3, def.size * 0.65 + wig * (i % 2));
    ctx.stroke();
  }
}

function drawFirefly(c, def) {
  // glow halo (extra)
  const pulse = 0.5 + 0.5 * Math.sin(c.age * 5);
  ctx.fillStyle = `rgba(255, 230, 140, ${0.18 + pulse * 0.18})`;
  ctx.beginPath();
  ctx.arc(0, 0, def.size * 0.9, 0, Math.PI * 2);
  ctx.fill();
  // body
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.ellipse(0, 0, def.size * 0.4, def.size * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  // wings
  ctx.fillStyle = 'rgba(255, 247, 220, 0.35)';
  const flap = Math.sin(c.bobPhase * 8) * 0.5 + 0.7;
  ctx.beginPath();
  ctx.ellipse(-2, -3, def.size * 0.30 * flap, def.size * 0.18, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-2,  3, def.size * 0.30 * flap, def.size * 0.18,  0.3, 0, Math.PI * 2);
  ctx.fill();
  // glowing tail
  ctx.fillStyle = def.palette[1];
  ctx.beginPath();
  ctx.arc(-def.size * 0.42, 0, def.size * 0.18 * (0.7 + pulse * 0.4), 0, Math.PI * 2);
  ctx.fill();
  // antennae
  ctx.strokeStyle = def.palette[0];
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(def.size * 0.35, 0); ctx.lineTo(def.size * 0.55, -def.size * 0.20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(def.size * 0.35, 0); ctx.lineTo(def.size * 0.55,  def.size * 0.20); ctx.stroke();
}

function drawScorpling(c, def) {
  // body segments
  ctx.fillStyle = def.palette[0];
  for (let i = -2; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(i * 4, 0, def.size * 0.18, def.size * 0.20, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // claws
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.ellipse(def.size * 0.5, -def.size * 0.18, def.size * 0.18, def.size * 0.12, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(def.size * 0.5,  def.size * 0.18, def.size * 0.18, def.size * 0.12,  0.4, 0, Math.PI * 2);
  ctx.fill();
  // claw tips (lighter)
  ctx.fillStyle = def.palette[2];
  ctx.beginPath();
  ctx.arc(def.size * 0.66, -def.size * 0.26, def.size * 0.08, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(def.size * 0.66,  def.size * 0.26, def.size * 0.08, 0, Math.PI * 2); ctx.fill();
  // tail curling up over body
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-def.size * 0.5, 0);
  ctx.quadraticCurveTo(-def.size * 0.7, -def.size * 0.6, -def.size * 0.1, -def.size * 0.6);
  ctx.quadraticCurveTo(def.size * 0.2, -def.size * 0.55, def.size * 0.25, -def.size * 0.35);
  ctx.stroke();
  // sting
  ctx.fillStyle = def.palette[2];
  ctx.beginPath();
  ctx.arc(def.size * 0.25, -def.size * 0.35, 2, 0, Math.PI * 2);
  ctx.fill();
  // legs
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 1.2;
  const wig = (c.activity === 'wander' || c.activity === 'forage')
    ? Math.sin(c.bobPhase * 5) * 2 : 0;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 3, def.size * 0.18);
    ctx.lineTo(i * 3 - 2, def.size * 0.45 + wig * (i % 2));
    ctx.stroke();
  }
}

function drawSunDjinn(c, def) {
  const pulse = 0.6 + 0.4 * Math.sin(c.age * 3);
  // outer halo
  ctx.fillStyle = `rgba(255, 184, 88, ${0.18 + pulse * 0.10})`;
  ctx.beginPath();
  ctx.arc(0, 0, def.size * 1.1, 0, Math.PI * 2);
  ctx.fill();
  // sun rays
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4 + c.age * 0.6;
    const r1 = def.size * 0.55;
    const r2 = def.size * (0.85 + 0.10 * Math.sin(c.age * 4 + i));
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
    ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
    ctx.stroke();
  }
  // body disc
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  ctx.arc(0, 0, def.size * 0.55, 0, Math.PI * 2);
  ctx.fill();
  // inner core
  ctx.fillStyle = def.palette[2];
  ctx.beginPath();
  ctx.arc(0, 0, def.size * 0.32, 0, Math.PI * 2);
  ctx.fill();
  // closed serene eyes
  ctx.strokeStyle = def.palette[1];
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.arc(-def.size * 0.14, -def.size * 0.04, 3, Math.PI, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc( def.size * 0.14, -def.size * 0.04, 3, Math.PI, Math.PI * 2);
  ctx.stroke();
  // smile
  ctx.beginPath();
  ctx.arc(0, def.size * 0.10, def.size * 0.14, 0.2, Math.PI - 0.2);
  ctx.stroke();
}

function drawStarfish(c, def) {
  // five-armed star
  ctx.fillStyle = def.palette[0];
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = i * Math.PI / 5 - Math.PI / 2;
    const r = (i % 2 === 0) ? def.size * 0.7 : def.size * 0.28;
    const x = Math.cos(a) * r;
    const y = Math.sin(a) * r * 0.85; // squashed for side-on
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  // shadow ridges
  ctx.fillStyle = def.palette[1];
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = i * Math.PI / 5 - Math.PI / 2;
    const r = (i % 2 === 0) ? def.size * 0.45 : def.size * 0.18;
    const x = Math.cos(a) * r;
    const y = Math.sin(a) * r * 0.85;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  // dots
  ctx.fillStyle = def.palette[2];
  for (let i = 0; i < 5; i++) {
    const a = i * Math.PI * 2 / 5 - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * def.size * 0.45, Math.sin(a) * def.size * 0.4, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }
  // tiny eyes
  ctx.fillStyle = '#101';
  ctx.beginPath(); ctx.arc(-def.size * 0.06, -def.size * 0.08, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( def.size * 0.06, -def.size * 0.08, 1.2, 0, Math.PI * 2); ctx.fill();
}

function drawBubbleFae(c, def) {
  // outer bubble
  const pulse = 0.5 + 0.5 * Math.sin(c.age * 2);
  ctx.fillStyle = `rgba(168, 216, 232, ${0.25 + pulse * 0.10})`;
  ctx.beginPath();
  ctx.arc(0, 0, def.size * 0.7, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.arc(0, 0, def.size * 0.7, 0, Math.PI * 2);
  ctx.stroke();
  // shimmer arc
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.arc(0, 0, def.size * 0.6, -Math.PI * 0.85, -Math.PI * 0.55);
  ctx.stroke();
  // little fae inside
  ctx.fillStyle = def.palette[1];
  ctx.beginPath();
  ctx.arc(0, 0, def.size * 0.22, 0, Math.PI * 2);
  ctx.fill();
  // wings
  ctx.fillStyle = 'rgba(255, 247, 216, 0.55)';
  const flap = Math.sin(c.bobPhase * 7) * 0.4 + 0.7;
  ctx.beginPath();
  ctx.ellipse(-def.size * 0.15, -def.size * 0.10, def.size * 0.20 * flap, def.size * 0.30, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse( def.size * 0.15, -def.size * 0.10, def.size * 0.20 * flap, def.size * 0.30,  0.3, 0, Math.PI * 2);
  ctx.fill();
  // eyes
  ctx.fillStyle = def.palette[2];
  ctx.beginPath(); ctx.arc(-def.size * 0.06, -def.size * 0.02, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( def.size * 0.06, -def.size * 0.02, 1.2, 0, Math.PI * 2); ctx.fill();
}

// Colour helpers
function mixColour(aHex, bHex, t) {
  const a = hexToRgb(aHex), b = hexToRgb(bHex);
  return `rgb(${Math.round(lerp(a[0], b[0], t))}, ${Math.round(lerp(a[1], b[1], t))}, ${Math.round(lerp(a[2], b[2], t))})`;
}
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}

// ── Game loop ──────────────────────────────────────────────────────
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  state.worldTime += dt;

  for (const c of state.creatures) updateCreature(c, dt);

  // Decay farewells
  for (let i = state.farewells.length - 1; i >= 0; i--) {
    const f = state.farewells[i];
    f.life -= dt;
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.vy += 60 * dt;
    if (f.life <= 0) state.farewells.splice(i, 1);
  }
  // Decay ripples
  for (let i = state.ripples.length - 1; i >= 0; i--) {
    const r = state.ripples[i];
    r.life -= dt;
    r.r = lerp(r.r, r.max, dt * 1.5);
    if (r.life <= 0) state.ripples.splice(i, 1);
  }

  render();
  updateHUD();
  maybeHideToast();
  requestAnimationFrame(loop);
}

function updateHUD() {
  document.getElementById('stat-pop').textContent = state.creatures.length;
  document.getElementById('stat-time').textContent = timeOfDayLabel();
}

// ── Save / load ─────────────────────────────────────────────────────
function saveState() {
  try {
    const slim = {
      biome: state.biome,
      worldTime: state.worldTime,
      creatures: state.creatures.map(c => ({
        type: c.type, x: c.x, y: c.y, age: c.age, mood: c.mood,
      })),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(slim));
  } catch (e) { /* quota or privacy mode */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const slim = JSON.parse(raw);
    if (slim.biome && BIOMES[slim.biome]) state.biome = slim.biome;
    state.worldTime = slim.worldTime || 0;
    state.creatures = [];
    for (const c of (slim.creatures || [])) {
      if (!CREATURES[c.type]) continue;
      addCreature(c.type, c.x);
      const fresh = state.creatures[state.creatures.length - 1];
      fresh.y = c.y;
      fresh.age = c.age || 0;
      fresh.mood = c.mood || 0.7;
    }
    return true;
  } catch (e) { return false; }
}

// ── UI wiring ──────────────────────────────────────────────────────
function buildUI() {
  // Biome chips
  const biomeRow = document.getElementById('biome-row');
  biomeRow.innerHTML = '';
  for (const id in BIOMES) {
    const b = BIOMES[id];
    const btn = document.createElement('button');
    btn.className = 'chip' + (state.biome === id ? ' active' : '');
    btn.dataset.biome = id;
    btn.innerHTML = `<span class="em">${b.emoji}</span><span class="lbl">${b.name}</span>`;
    btn.addEventListener('click', () => {
      state.biome = id;
      saveState();
      refreshChips();
    });
    biomeRow.appendChild(btn);
  }

  // Creature chips
  const creatureRow = document.getElementById('creature-row');
  creatureRow.innerHTML = '';
  for (const id in CREATURES) {
    const c = CREATURES[id];
    const btn = document.createElement('button');
    btn.className = 'chip creature' + (c.magical ? ' magical' : '');
    btn.dataset.creature = id;
    btn.innerHTML = `<span class="em">${c.emoji}</span><span class="lbl">${c.name}</span>`;
    btn.addEventListener('click', () => {
      addCreature(id);
      showToast(`${c.name} settles in.`);
    });
    creatureRow.appendChild(btn);
  }

  // Mode toggles
  for (const m of document.querySelectorAll('[data-mode]')) {
    m.addEventListener('click', () => {
      state.mode = m.dataset.mode;
      for (const o of document.querySelectorAll('[data-mode]')) o.classList.remove('active');
      m.classList.add('active');
      canvas.style.cursor = state.mode === 'remove' ? 'grab' : 'crosshair';
    });
  }

  // Clear all
  document.getElementById('btn-clear').addEventListener('click', () => {
    if (!state.creatures.length) return;
    while (state.creatures.length) removeCreature(state.creatures[state.creatures.length - 1]);
    showToast('Tank released.');
  });

  // Magnifier toggle
  const lensBtn = document.getElementById('btn-lens');
  lensBtn.addEventListener('click', () => {
    state.lens.active = !state.lens.active;
    lensBtn.classList.toggle('active', state.lens.active);
    canvas.style.cursor = state.lens.active ? 'none'
                       : (state.mode === 'remove' ? 'grab' : 'crosshair');
    if (!state.lens.active) state.lens.hasPos = false;
  });
}

function refreshChips() {
  for (const btn of document.querySelectorAll('[data-biome]')) {
    btn.classList.toggle('active', btn.dataset.biome === state.biome);
  }
}

// ── Canvas interaction ─────────────────────────────────────────────
function pickCreatureAt(px, py) {
  // Pick the topmost (latest drawn) — iterate sorted draw order in reverse
  const sorted = [...state.creatures].sort((a, b) => a.y - b.y);
  for (let i = sorted.length - 1; i >= 0; i--) {
    const c = sorted[i];
    const def = CREATURES[c.type];
    const r = def.size * 0.9;
    if (Math.hypot(px - c.x, py - c.y) <= r) return c;
  }
  return null;
}

function showFloater(c) {
  const def = CREATURES[c.type];
  const f = document.getElementById('floater');
  f.innerHTML = `
    <div class="name${def.magical ? ' magical' : ''}">${def.emoji} ${def.name}</div>
    <div class="activity">${activityDescription(c)}</div>
    <div class="activity" style="margin-top:4px;font-size:11px;color:var(--muted)">${def.quip}</div>`;
  const wrap = canvas.parentElement.getBoundingClientRect();
  const cnv = canvas.getBoundingClientRect();
  const ox = cnv.left - wrap.left + c.x;
  const oy = cnv.top  - wrap.top  + c.y;
  f.style.display = 'block';
  // Position above the creature, clamp inside wrap
  let left = ox - 90;
  let top  = oy - 70;
  if (left < 4) left = 4;
  if (left + 200 > wrap.width) left = wrap.width - 204;
  if (top < 4) top = oy + 24;
  f.style.left = left + 'px';
  f.style.top = top + 'px';
  requestAnimationFrame(() => { f.style.opacity = 1; });
  clearTimeout(showFloater._t);
  showFloater._t = setTimeout(hideFloater, 3500);
}
function hideFloater() {
  const f = document.getElementById('floater');
  f.style.opacity = 0;
  setTimeout(() => { f.style.display = 'none'; }, 200);
}
function activityDescription(c) {
  switch (c.activity) {
    case 'wander':  return 'Out for a stroll.';
    case 'forage':  return 'Snuffling around the foliage.';
    case 'splash':  return 'Splashing about.';
    case 'nap':     return 'Having a tiny nap.';
    case 'shine':   return 'Glowing softly.';
    default:        return 'Pottering about.';
  }
}

canvas.addEventListener('click', (ev) => {
  const r = canvas.getBoundingClientRect();
  const px = (ev.clientX - r.left);
  const py = (ev.clientY - r.top);
  const c = pickCreatureAt(px, py);
  if (state.mode === 'remove') {
    if (c) {
      const def = CREATURES[c.type];
      removeCreature(c);
      showToast(`${def.name} drifts away.`);
      hideFloater();
    }
  } else {
    if (c) showFloater(c);
    else hideFloater();
  }
});

// Magnifier: track pointer / touch position over the tank
function updateLensFromEvent(ev) {
  if (!state.lens.active) return;
  const r = canvas.getBoundingClientRect();
  const t = ev.touches && ev.touches[0];
  const cx = t ? t.clientX : ev.clientX;
  const cy = t ? t.clientY : ev.clientY;
  state.lens.x = cx - r.left;
  state.lens.y = cy - r.top;
  state.lens.hasPos = true;
}
canvas.addEventListener('mousemove', updateLensFromEvent);
canvas.addEventListener('mouseleave', () => { state.lens.hasPos = false; });
canvas.addEventListener('touchstart', (ev) => {
  if (state.lens.active) { updateLensFromEvent(ev); ev.preventDefault(); }
}, { passive: false });
canvas.addEventListener('touchmove', (ev) => {
  if (state.lens.active) { updateLensFromEvent(ev); ev.preventDefault(); }
}, { passive: false });
canvas.addEventListener('touchend', () => { /* keep last position visible */ });

// ── Boot ────────────────────────────────────────────────────────────
function boot() {
  resizeCanvas();
  buildUI();
  if (!loadState()) {
    // First run — seed with a couple of friendly creatures
    addCreature('beetle');
    addCreature('snail');
    addCreature('glowmoth');
  }
  refreshChips();
  // Persist every few seconds
  setInterval(saveState, 5000);
  requestAnimationFrame((t) => { lastT = t; loop(t); });
}
boot();
</script>
