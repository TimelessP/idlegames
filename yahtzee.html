<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="application-name" content="IdleGames">
    <script src="assets/js/pwa.js" defer></script>
    <meta name="theme-color" content="#667eea">
    <title>Yahtzee Game</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-color: white;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-text: #333;
            --card-text-light: #666;
            --card-border: #eee;
            --card-hover: #f0f0f0;
            --card-filled: #e8f5e8;
            --button-bg: #4CAF50;
            --button-hover: #45a049;
            --button-disabled: #cccccc;
        }
        
        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-color: white;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-text: #333;
            --card-text-light: #666;
            --card-border: #eee;
            --card-hover: #f0f0f0;
            --card-filled: #e8f5e8;
            --button-bg: #4CAF50;
            --button-hover: #45a049;
            --button-disabled: #cccccc;
        }
        
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --text-color: #eee;
            --card-bg: rgba(22, 33, 62, 0.95);
            --card-text: #eee;
            --card-text-light: #bbb;
            --card-border: #2a3f5f;
            --card-hover: #2a3f5f;
            --card-filled: #1a4d3a;
            --button-bg: #5a9f5a;
            --button-hover: #4a8a4a;
            --button-disabled: #555;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: Arial, sans-serif;
            min-height: 100vh;
            touch-action: pan-y;
            /* Handle safe areas on mobile devices */
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            /* Adjust for safe areas on mobile devices */
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .top-controls {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            left: max(16px, env(safe-area-inset-left));
            z-index: 20;
        }
        
        .dice-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            flex: 1;
            justify-content: center;
        }
        
        .dice-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .die-canvas {
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .pressable {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        
        .game-info {
            text-align: center;
            color: var(--text-color);
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .roll-button {
            background: var(--button-bg);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .roll-button:hover {
            background: var(--button-hover);
        }
        
        .roll-button:disabled {
            background: var(--button-disabled);
            cursor: not-allowed;
        }

        .new-game-button {
            background: rgba(255, 255, 255, 0.16);
            color: var(--text-color);
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 999px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
        }

        .new-game-button:hover {
            background: rgba(255, 255, 255, 0.24);
        }
        
        .scorecard {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 216px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .scorecard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        
        .scorecard h2 {
            margin: 0;
            color: var(--card-text);
            font-size: 24px;
        }
        
        .theme-toggle, .fullscreen-toggle {
            background: none;
            border: 2px solid var(--card-text);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .theme-toggle:hover, .fullscreen-toggle:hover {
            background: var(--card-hover);
        }
        
        .fullscreen-toggle {
            display: none; /* Hidden by default, shown on mobile */
        }
        
        .score-section {
            margin-bottom: 20px;
        }
        
        .score-section h3 {
            margin: 0 0 10px 0;
            color: var(--card-text);
            font-size: 18px;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 5px;
        }
        
        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-radius: 4px;
            margin-bottom: 3px;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        
        .score-row:hover {
            background-color: var(--card-hover);
        }
        
        .score-row.filled {
            background-color: var(--card-filled);
            cursor: default;
            padding: 5px 8px;
        }
        
        .score-row.filled:hover {
            background-color: var(--card-filled);
        }
        
        .score-label {
            font-weight: bold;
            color: var(--card-text);
            font-size: 16px;
        }
        
        .score-value {
            font-size: 16px;
            color: var(--card-text-light);
            min-width: 30px;
            text-align: right;
        }
        
        .score-row.filled .score-value {
            color: var(--card-text);
            font-weight: bold;
        }
        
        .total-row {
            border-top: 2px solid var(--card-text);
            margin-top: 6px;
            padding-top: 6px;
            font-weight: bold;
            font-size: 16px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            color: var(--card-text);
            border-radius: 10px;
            padding: 20px;
            width: min(420px, 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .modal-body {
            font-size: 15px;
            color: var(--card-text-light);
            margin-bottom: 16px;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .modal-button {
            background: var(--button-bg);
            color: white;
            border: none;
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-button.secondary {
            background: transparent;
            color: var(--card-text);
            border: 2px solid var(--card-text);
        }

        .modal-button .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-button .btn-icon svg {
            width: 18px;
            height: 18px;
        }

        .share-status {
            margin-top: 10px;
            font-size: 13px;
            color: var(--button-bg);
            min-height: 16px;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .game-container {
                gap: 10px;
                padding: 10px;
            }

            .top-controls {
                top: max(10px, env(safe-area-inset-top));
                left: max(10px, env(safe-area-inset-left));
            }
            
            .scorecard {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="top-controls">
            <button class="new-game-button pressable" id="newGameButton" type="button">New Game</button>
    </div>

    <div class="game-container">
        <div class="dice-area">
            <div class="game-info">
                <div>Roll: <span id="rollCount">1</span>/3</div>
                <div>Total Score: <span id="totalScore">0</span></div>
            </div>
            
            <div class="dice-container">
                <canvas class="die-canvas pressable" id="die1" width="80" height="80"></canvas>
                <canvas class="die-canvas pressable" id="die2" width="80" height="80"></canvas>
                <canvas class="die-canvas pressable" id="die3" width="80" height="80"></canvas>
                <canvas class="die-canvas pressable" id="die4" width="80" height="80"></canvas>
                <canvas class="die-canvas pressable" id="die5" width="80" height="80"></canvas>
            </div>
            
            <button class="roll-button pressable" id="rollButton">Roll Dice</button>
        </div>
        
        <div class="scorecard">
            <div class="scorecard-header">
                <h2>Scorecard</h2>
                <div class="header-buttons">
                    <button class="fullscreen-toggle pressable" id="fullscreenToggle" title="Toggle fullscreen">⛶</button>
                    <button class="theme-toggle pressable" id="themeToggle" title="Toggle theme">🌙</button>
                </div>
            </div>
            
            <div class="score-section">
                <h3>Upper Section</h3>
                <div class="score-row pressable" data-category="ones">
                    <span class="score-label">Ones</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="twos">
                    <span class="score-label">Twos</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="threes">
                    <span class="score-label">Threes</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="fours">
                    <span class="score-label">Fours</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="fives">
                    <span class="score-label">Fives</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="sixes">
                    <span class="score-label">Sixes</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row total-row" id="upperTotal">
                    <span class="score-label">Upper Total</span>
                    <span class="score-value">0</span>
                </div>
                <div class="score-row" id="bonus">
                    <span class="score-label">Bonus (63+)</span>
                    <span class="score-value">0</span>
                </div>
            </div>
            
            <div class="score-section">
                <h3>Lower Section</h3>
                <div class="score-row pressable" data-category="threeOfAKind">
                    <span class="score-label">3 of a Kind</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="fourOfAKind">
                    <span class="score-label">4 of a Kind</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="fullHouse">
                    <span class="score-label">Full House</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="smallStraight">
                    <span class="score-label">Small Straight</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="largeStraight">
                    <span class="score-label">Large Straight</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="yahtzee">
                    <span class="score-label">Yahtzee</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row pressable" data-category="chance">
                    <span class="score-label">Chance</span>
                    <span class="score-value">-</span>
                </div>
                <div class="score-row total-row" id="lowerTotal">
                    <span class="score-label">Lower Total</span>
                    <span class="score-value">0</span>
                </div>
            </div>
            
            <div class="score-row total-row" id="grandTotal">
                <span class="score-label">GRAND TOTAL</span>
                <span class="score-value">0</span>
            </div>
        </div>
    </div>

    <div class="modal" id="gameOverModal" role="dialog" aria-modal="true" aria-label="Game completed">
        <div class="modal-content">
            <div class="modal-header">Game Complete</div>
            <div class="modal-body" id="gameOverSummary">Final score: 0</div>
            <div class="modal-footer">
                <button class="modal-button pressable" id="shareScoreBtn" aria-label="Share score" title="Share">
                    <span class="btn-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3"/>
                            <circle cx="6" cy="12" r="3"/>
                            <circle cx="18" cy="19" r="3"/>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                        </svg>
                    </span>
                    <span class="btn-label">Share</span>
                </button>
                <button class="modal-button secondary pressable" id="viewScoreBtn" aria-label="View score and close" title="View">
                    <span class="btn-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </span>
                    <span class="btn-label">View</span>
                </button>
                <button class="modal-button pressable" id="playAgainBtn" aria-label="Play Again" title="Play Again">
                    <span class="btn-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12a9 9 0 1 1-9-9"/>
                            <polyline points="21 3 21 9 15 9"/>
                            <path d="M21 9l-3.5-3.5"/>
                        </svg>
                    </span>
                    <span class="btn-label">Play Again</span>
                </button>
            </div>
            <div class="share-status" id="shareStatus" aria-live="polite"></div>
        </div>
    </div>

    <script>
        // ===== GAME STATE =====
        const STORAGE_KEY = 'yahtzee-game-state';
        let dice = [1, 2, 3, 4, 5]; // Current dice values
        let held = [false, false, false, false, false]; // Which dice are held
        let rollsLeft = 3;
        let currentTurn = 1;
        let gameOver = false;
        
        // Yahtzee scoring categories
        const CATEGORIES = {
            ones: { name: "Ones", score: null, type: "number", target: 1 },
            twos: { name: "Twos", score: null, type: "number", target: 2 },
            threes: { name: "Threes", score: null, type: "number", target: 3 },
            fours: { name: "Fours", score: null, type: "number", target: 4 },
            fives: { name: "Fives", score: null, type: "number", target: 5 },
            sixes: { name: "Sixes", score: null, type: "number", target: 6 },
            threeOfAKind: { name: "3 of a Kind", score: null, type: "special" },
            fourOfAKind: { name: "4 of a Kind", score: null, type: "special" },
            fullHouse: { name: "Full House", score: null, type: "special" },
            smallStraight: { name: "Small Straight", score: null, type: "special" },
            largeStraight: { name: "Large Straight", score: null, type: "special" },
            yahtzee: { name: "Yahtzee", score: null, type: "special" },
            chance: { name: "Chance", score: null, type: "special" }
        };

        const CATEGORY_KEYS = Object.keys(CATEGORIES);

        function getDefaultGameState() {
            return {
                dice: [1, 2, 3, 4, 5],
                held: [false, false, false, false, false],
                rollsLeft: 3,
                currentTurn: 1,
                gameOver: false,
                scores: CATEGORY_KEYS.reduce((accumulator, key) => {
                    accumulator[key] = null;
                    return accumulator;
                }, {})
            };
        }

        function serializeGameState() {
            return {
                dice: [...dice],
                held: [...held],
                rollsLeft,
                currentTurn,
                gameOver,
                scores: CATEGORY_KEYS.reduce((accumulator, key) => {
                    accumulator[key] = CATEGORIES[key].score;
                    return accumulator;
                }, {})
            };
        }

        function persistGameState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeGameState()));
            } catch (error) {
                console.warn('Unable to save Yahtzee state:', error);
            }
        }

        function applyGameState(state) {
            dice = [...state.dice];
            held = [...state.held];
            rollsLeft = state.rollsLeft;
            currentTurn = state.currentTurn;
            gameOver = state.gameOver;

            CATEGORY_KEYS.forEach((key) => {
                CATEGORIES[key].score = state.scores[key];
            });
        }

        function loadSavedGameState() {
            try {
                const rawState = localStorage.getItem(STORAGE_KEY);
                if (!rawState) {
                    return false;
                }

                const parsedState = JSON.parse(rawState);
                const hasValidDice = Array.isArray(parsedState?.dice) && parsedState.dice.length === 5 && parsedState.dice.every((value) => Number.isInteger(value) && value >= 1 && value <= 6);
                const hasValidHeld = Array.isArray(parsedState?.held) && parsedState.held.length === 5 && parsedState.held.every((value) => typeof value === 'boolean');
                const hasValidRolls = Number.isInteger(parsedState?.rollsLeft) && parsedState.rollsLeft >= 0 && parsedState.rollsLeft <= 3;
                const hasValidTurn = Number.isInteger(parsedState?.currentTurn) && parsedState.currentTurn >= 1 && parsedState.currentTurn <= CATEGORY_KEYS.length + 1;
                const hasValidGameOver = typeof parsedState?.gameOver === 'boolean';
                const hasValidScores = parsedState?.scores && typeof parsedState.scores === 'object' && CATEGORY_KEYS.every((key) => parsedState.scores[key] === null || Number.isInteger(parsedState.scores[key]));

                if (!hasValidDice || !hasValidHeld || !hasValidRolls || !hasValidTurn || !hasValidGameOver || !hasValidScores) {
                    return false;
                }

                applyGameState(parsedState);
                return true;
            } catch (error) {
                console.warn('Unable to load Yahtzee state:', error);
                return false;
            }
        }

        function syncScorecardUI() {
            document.querySelectorAll('.score-row[data-category]').forEach((row) => {
                const category = row.getAttribute('data-category');
                const score = CATEGORIES[category].score;
                if (score === null) {
                    row.classList.remove('filled');
                    row.querySelector('.score-value').textContent = '-';
                    row.style.color = '';
                    return;
                }

                row.classList.add('filled');
                row.querySelector('.score-value').textContent = score;
                row.style.color = '';
            });
        }

        function syncGameOverUI() {
            const rollButton = document.getElementById('rollButton');
            const gameOverModal = document.getElementById('gameOverModal');
            const shareStatus = document.getElementById('shareStatus');

            if (!gameOver) {
                gameOverModal.classList.remove('open');
                shareStatus.textContent = '';
                return;
            }

            rollButton.disabled = true;
            rollButton.textContent = 'Game Complete';
            const grandTotal = document.getElementById('grandTotal').querySelector('.score-value').textContent;
            document.getElementById('gameOverSummary').textContent = `Final score: ${grandTotal}`;
            gameOverModal.classList.add('open');
        }

        function refreshGameUI() {
            syncScorecardUI();
            updateDisplay();
            updateScores();
            syncGameOverUI();
        }

        // ===== DICE RENDERING =====
        function drawDie(canvas, value, isHeld) {
            const ctx = canvas.getContext('2d');
            const size = 80;
            
            // Clear canvas
            ctx.clearRect(0, 0, size, size);
            
            // Draw die background
            ctx.fillStyle = isHeld ? '#ffeb3b' : 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            
            const radius = 8;
            ctx.beginPath();
            ctx.roundRect(5, 5, size - 10, size - 10, radius);
            ctx.fill();
            ctx.stroke();
            
            // Draw dots with opacity based on whether dice can be clicked
            const canClick = rollsLeft < 3; // Can click after first roll
            ctx.fillStyle = canClick ? 'black' : 'rgba(0, 0, 0, 0.6)';
            const dotSize = 12; // Better size for visibility without touching
            const center = size / 2;
            const offset = 15;
            
            // Dot positions for each face
            const dots = {
                1: [[center, center]],
                2: [[center - offset, center - offset], [center + offset, center + offset]],
                3: [[center - offset, center - offset], [center, center], [center + offset, center + offset]],
                4: [[center - offset, center - offset], [center + offset, center - offset], 
                    [center - offset, center + offset], [center + offset, center + offset]],
                5: [[center - offset, center - offset], [center + offset, center - offset], [center, center],
                    [center - offset, center + offset], [center + offset, center + offset]],
                6: [[center - offset, center - offset], [center + offset, center - offset],
                    [center - offset, center], [center + offset, center],
                    [center - offset, center + offset], [center + offset, center + offset]]
            };
            
            if (dots[value]) {
                dots[value].forEach(([x, y]) => {
                    ctx.beginPath();
                    ctx.arc(x, y, dotSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        // ===== SCORING FUNCTIONS =====
        function calculateScore(category, diceValues) {
            const counts = [0, 0, 0, 0, 0, 0, 0]; // Index 0 unused, 1-6 for dice values
            diceValues.forEach(val => counts[val]++);
            
            switch (category) {
                case 'ones': case 'twos': case 'threes': case 'fours': case 'fives': case 'sixes':
                    const target = CATEGORIES[category].target;
                    return counts[target] * target;
                
                case 'threeOfAKind':
                    return counts.some(count => count >= 3) ? diceValues.reduce((a, b) => a + b, 0) : 0;
                
                case 'fourOfAKind':
                    return counts.some(count => count >= 4) ? diceValues.reduce((a, b) => a + b, 0) : 0;
                
                case 'fullHouse':
                    const hasThree = counts.some(count => count === 3);
                    const hasTwo = counts.some(count => count === 2);
                    return (hasThree && hasTwo) ? 25 : 0;
                
                case 'smallStraight':
                    // Must be exactly 1,2,3,4,5
                    return [1,2,3,4,5].every(num => counts[num] >= 1) ? 30 : 0;
                
                case 'largeStraight':
                    // Must be exactly 2,3,4,5,6
                    return [2,3,4,5,6].every(num => counts[num] >= 1) ? 40 : 0;
                
                case 'yahtzee':
                    return counts.some(count => count === 5) ? 50 : 0;
                
                case 'chance':
                    return diceValues.reduce((a, b) => a + b, 0);
                
                default:
                    return 0;
            }
        }

        function updateScores() {
            // Calculate potential scores for unfilled categories
            document.querySelectorAll('.score-row[data-category]').forEach(row => {
                const category = row.getAttribute('data-category');
                if (CATEGORIES[category].score === null) {
                    const potentialScore = calculateScore(category, dice);
                    row.querySelector('.score-value').textContent = potentialScore;
                    row.style.color = '#0066cc';
                }
            });
            
            // Update totals
            let upperTotal = 0;
            ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'].forEach(cat => {
                if (CATEGORIES[cat].score !== null) {
                    upperTotal += CATEGORIES[cat].score;
                }
            });
            
            let lowerTotal = 0;
            ['threeOfAKind', 'fourOfAKind', 'fullHouse', 'smallStraight', 'largeStraight', 'yahtzee', 'chance'].forEach(cat => {
                if (CATEGORIES[cat].score !== null) {
                    lowerTotal += CATEGORIES[cat].score;
                }
            });
            
            const bonus = upperTotal >= 63 ? 35 : 0;
            const grandTotal = upperTotal + bonus + lowerTotal;
            
            document.getElementById('upperTotal').querySelector('.score-value').textContent = upperTotal;
            document.getElementById('bonus').querySelector('.score-value').textContent = bonus;
            document.getElementById('lowerTotal').querySelector('.score-value').textContent = lowerTotal;
            document.getElementById('grandTotal').querySelector('.score-value').textContent = grandTotal;
            document.getElementById('totalScore').textContent = grandTotal;
        }

        function scoreToSquare(score, max) {
            if (score <= 0) return '🟥';
            if (max <= 1) return score >= 1 ? '🟩' : '🟥';
            const ratio = score / max;
            if (ratio <= 0.33) return '🟧';
            if (ratio <= 0.66) return '🟨';
            return '🟩';
        }

        function countToSquare(count) {
            if (count <= 0) return '🟥';
            if (count === 1) return '🟧';
            if (count === 2) return '🟨';
            return '🟩';
        }

        function buildShareText() {
            const upperSquares = [];
            const upperCats = ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'];
            upperCats.forEach((cat) => {
                const score = CATEGORIES[cat].score ?? 0;
                const face = CATEGORIES[cat].target;
                const count = face ? Math.floor(score / face) : 0;
                upperSquares.push(countToSquare(count));
            });

            const upperTotal = upperCats.reduce((sum, cat) => sum + (CATEGORIES[cat].score || 0), 0);
            const bonus = upperTotal >= 63 ? 35 : 0;
            upperSquares.push(bonus > 0 ? '🏆' : '🟥');

            const lowerSquares = [];
            const lowerCats = ['threeOfAKind', 'fourOfAKind', 'fullHouse', 'smallStraight', 'largeStraight', 'yahtzee'];
            lowerCats.forEach((cat) => {
                const score = CATEGORIES[cat].score ?? 0;
                lowerSquares.push(score > 0 ? '🟩' : '🟥');
            });

            const chanceScore = CATEGORIES.chance?.score ?? 0;
            lowerSquares.push(scoreToSquare(chanceScore, 30));

            const grandTotal = parseInt(document.getElementById('grandTotal').querySelector('.score-value').textContent, 10) || 0;
            return [
                'Yahtzee',
                upperSquares.join(''),
                lowerSquares.join(''),
                `Total score: ${grandTotal}`
            ].join('\n');
        }

        // ===== GAME LOGIC =====
        function rollDice() {
            if (rollsLeft <= 0) return;
            
            for (let i = 0; i < 5; i++) {
                if (!held[i]) {
                    dice[i] = Math.floor(Math.random() * 6) + 1;
                }
            }
            
            rollsLeft--;
            updateDisplay();
            updateScores();
            persistGameState();
        }

        function toggleHold(dieIndex) {
            if (rollsLeft === 3) return; // Can't hold on first roll
            held[dieIndex] = !held[dieIndex];
            updateDisplay();
            persistGameState();
        }

        function scoreCategory(category) {
            if (CATEGORIES[category].score !== null) return; // Already scored
            if (rollsLeft === 3) return; // Must roll first
            
            const score = calculateScore(category, dice);
            CATEGORIES[category].score = score;
            
            // Update UI
            const row = document.querySelector(`[data-category="${category}"]`);
            row.classList.add('filled');
            row.querySelector('.score-value').textContent = score;
            row.style.color = '';
            
            // Reset for next turn
            rollsLeft = 3;
            held = [false, false, false, false, false];
            currentTurn++;
            
            updateDisplay();
            updateScores();
            
            // Check if game is over
            if (Object.values(CATEGORIES).every(cat => cat.score !== null)) {
                gameOver = true;
                const rollButton = document.getElementById('rollButton');
                rollButton.disabled = true;
                rollButton.textContent = 'Game Complete';
                const grandTotal = document.getElementById('grandTotal').querySelector('.score-value').textContent;
                document.getElementById('gameOverSummary').textContent = `Final score: ${grandTotal}`;
                document.getElementById('gameOverModal').classList.add('open');
            }

            persistGameState();
        }

        function updateDisplay() {
            // Update dice
            for (let i = 0; i < 5; i++) {
                const canvas = document.getElementById(`die${i + 1}`);
                drawDie(canvas, dice[i], held[i]);
            }
            
            // Update roll counter
            document.getElementById('rollCount').textContent = 4 - rollsLeft;
            
            // Update button
            const button = document.getElementById('rollButton');
            if (rollsLeft <= 0) {
                button.textContent = 'Choose Category';
                button.disabled = true;
            } else {
                button.textContent = `Roll Dice (${rollsLeft} left)`;
                button.disabled = false;
            }
        }

        function newGame() {
            applyGameState(getDefaultGameState());
            refreshGameUI();
            persistGameState();
        }

        // ===== FULLSCREEN FOR MOBILE =====
        function hasFullscreenSupport() {
            return typeof document.documentElement.requestFullscreen === 'function';
        }

        function enterFullscreen() {
            if (hasFullscreenSupport()) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen request failed:', err);
                });
            }
        }

        function exitFullscreen() {
            if (document.fullscreenElement && document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        // ===== THEME MANAGEMENT =====
        const THEMES = ['system', 'light', 'dark'];
        const THEME_ICONS = { system: '🌓', light: '☀️', dark: '🌙' };
        let currentThemeIndex = 0;

        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            if (theme === 'system') {
                const systemTheme = getSystemTheme();
                document.documentElement.setAttribute('data-theme', systemTheme);
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            
            // Update theme-color meta tag for mobile status bar
            const themeColorMeta = document.querySelector('meta[name="theme-color"]');
            if (themeColorMeta) {
                const currentTheme = theme === 'system' ? getSystemTheme() : theme;
                if (currentTheme === 'dark') {
                    themeColorMeta.setAttribute('content', '#1a1a2e');
                } else {
                    themeColorMeta.setAttribute('content', '#667eea');
                }
            }
            
            document.getElementById('themeToggle').textContent = THEME_ICONS[theme];
            localStorage.setItem('yahtzee-theme', theme);
        }

        function toggleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % THEMES.length;
            applyTheme(THEMES[currentThemeIndex]);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('yahtzee-theme') || 'system';
            currentThemeIndex = THEMES.indexOf(savedTheme);
            applyTheme(savedTheme);
            
            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                if (THEMES[currentThemeIndex] === 'system') {
                    applyTheme('system');
                }
            });
        }

        function updateFullscreenButton() {
            const button = document.getElementById('fullscreenToggle');
            if (document.fullscreenElement) {
                button.textContent = '⛶'; // Exit fullscreen icon
                button.title = 'Exit fullscreen';
            } else {
                button.textContent = '⛶'; // Enter fullscreen icon
                button.title = 'Enter fullscreen';
            }
        }

        function syncFullscreenButtonVisibility() {
            const button = document.getElementById('fullscreenToggle');
            button.style.display = hasFullscreenSupport() ? 'flex' : 'none';
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                exitFullscreen();
            } else {
                enterFullscreen();
            }
        }

        // ===== EVENT LISTENERS =====
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize theme
            initTheme();

            loadSavedGameState();
            
            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            document.getElementById('newGameButton').addEventListener('click', newGame);

            syncFullscreenButtonVisibility();
            
            // Fullscreen toggle (mobile only)
            if (hasFullscreenSupport()) {
                document.getElementById('fullscreenToggle').addEventListener('click', toggleFullscreen);
                document.addEventListener('fullscreenchange', updateFullscreenButton);
                updateFullscreenButton();
            }

            window.addEventListener('resize', syncFullscreenButtonVisibility);
            
            // Dice click handlers
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`die${i}`).addEventListener('click', () => {
                    toggleHold(i - 1);
                });
            }
            
            // Roll button
            document.getElementById('rollButton').addEventListener('click', rollDice);
            
            // Score category clicks
            document.querySelectorAll('.score-row[data-category]').forEach(row => {
                row.addEventListener('click', () => {
                    const category = row.getAttribute('data-category');
                    scoreCategory(category);
                });
            });

            document.querySelectorAll('.pressable').forEach((element) => {
                element.addEventListener('contextmenu', (event) => {
                    event.preventDefault();
                });
            });

            document.querySelector('.dice-area').addEventListener('click', (event) => {
                if (gameOver && !document.getElementById('gameOverModal').classList.contains('open')) {
                    const rollButton = document.getElementById('rollButton');
                    if (event.target === rollButton) {
                        return;
                    }
                    document.getElementById('gameOverModal').classList.add('open');
                }
            });

            document.getElementById('viewScoreBtn').addEventListener('click', () => {
                document.getElementById('gameOverModal').classList.remove('open');
            });

            document.getElementById('playAgainBtn').addEventListener('click', () => {
                newGame();
            });

            document.getElementById('shareScoreBtn').addEventListener('click', async () => {
                const shareText = buildShareText();
                const text = `${shareText}\n${window.location.href}`;
                const shareStatus = document.getElementById('shareStatus');
                let copied = false;

                if (navigator.share) {
                    try {
                        await navigator.share({ text });
                    } catch (error) {
                        try {
                            await navigator.clipboard.writeText(text);
                            copied = true;
                        } catch (err) {
                            copied = false;
                        }
                    }
                } else {
                    try {
                        await navigator.clipboard.writeText(text);
                        copied = true;
                    } catch (error) {
                        copied = false;
                    }
                }

                if (copied) {
                    shareStatus.textContent = 'Copied to clipboard!';
                    setTimeout(() => {
                        shareStatus.textContent = '';
                    }, 2500);
                }
            });
            
            // Initial display
            refreshGameUI();
            persistGameState();
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                if (!document.getElementById('rollButton').disabled) {
                    rollDice();
                }
            }
            
            // Number keys to hold/unhold dice
            if (e.key >= '1' && e.key <= '5') {
                const dieIndex = parseInt(e.key) - 1;
                toggleHold(dieIndex);
            }
        });
    </script>
    <script src="parental.js"></script>
</body>
</html>
