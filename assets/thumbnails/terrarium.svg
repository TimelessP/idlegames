<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 320" role="img" aria-label="Tiny Terrarium thumbnail">
  <defs>
    <linearGradient id="tt-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b5046"/>
      <stop offset="100%" stop-color="#1f2a26"/>
    </linearGradient>
    <linearGradient id="tt-soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4a36"/>
      <stop offset="100%" stop-color="#1a221b"/>
    </linearGradient>
    <linearGradient id="tt-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Outer dark border -->
  <rect width="512" height="320" fill="#131815"/>

  <!-- Glass tank rectangle -->
  <rect x="32" y="36" width="448" height="252" rx="10" fill="url(#tt-sky)" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>

  <!-- Moon -->
  <circle cx="412" cy="86" r="20" fill="#fff0b0" opacity="0.95"/>
  <circle cx="420" cy="84" r="15" fill="#1f2a26" opacity="0.7"/>

  <!-- Soft fireflies / sparkles -->
  <circle cx="120" cy="110" r="2" fill="#fff7d8" opacity="0.85"/>
  <circle cx="180" cy="86" r="1.4" fill="#fff7d8" opacity="0.7"/>
  <circle cx="306" cy="120" r="2.2" fill="#d4a8ff" opacity="0.9"/>
  <circle cx="358" cy="148" r="1.8" fill="#d4a8ff" opacity="0.7"/>

  <!-- Ground silhouette (rolling moss) -->
  <path d="M32 250 C 110 230 170 258 240 244 C 320 228 390 256 480 240 L480 288 L32 288 Z" fill="url(#tt-soil)"/>
  <path d="M32 250 C 110 230 170 258 240 244 C 320 228 390 256 480 240" stroke="rgba(200,240,160,0.22)" stroke-width="1.2" fill="none"/>

  <!-- Log -->
  <rect x="84" y="226" width="78" height="14" rx="3" fill="#3a2a1c"/>
  <ellipse cx="84" cy="233" rx="5" ry="7" fill="#5a4030"/>
  <ellipse cx="162" cy="233" rx="5" ry="7" fill="#5a4030"/>
  <rect x="84" y="222" width="78" height="4" fill="#7a9460"/>

  <!-- Mushroom cluster -->
  <rect x="208" y="222" width="5" height="14" fill="#1a221a"/>
  <ellipse cx="210" cy="222" rx="14" ry="8" fill="#c4503a"/>
  <circle cx="204" cy="220" r="1.5" fill="#fff0d2" opacity="0.85"/>
  <circle cx="212" cy="218" r="1.5" fill="#fff0d2" opacity="0.85"/>
  <rect x="232" y="230" width="3" height="8" fill="#1a221a"/>
  <ellipse cx="234" cy="230" rx="8" ry="5" fill="#c4503a"/>

  <!-- Fern -->
  <g transform="translate(396,242)">
    <path d="M0 0 Q -10 -14 -16 -28" stroke="#446a3a" stroke-width="1.6" fill="none"/>
    <path d="M0 0 Q -3 -16 -5 -32" stroke="#446a3a" stroke-width="1.6" fill="none"/>
    <path d="M0 0 Q 3 -16 5 -32" stroke="#446a3a" stroke-width="1.6" fill="none"/>
    <path d="M0 0 Q 10 -14 16 -28" stroke="#446a3a" stroke-width="1.6" fill="none"/>
    <ellipse cx="-16" cy="-28" rx="3" ry="5" fill="#5a8048"/>
    <ellipse cx="-5" cy="-32" rx="3" ry="5" fill="#5a8048"/>
    <ellipse cx="5" cy="-32" rx="3" ry="5" fill="#5a8048"/>
    <ellipse cx="16" cy="-28" rx="3" ry="5" fill="#5a8048"/>
  </g>

  <!-- Glow moth (magical) -->
  <g transform="translate(280,150)">
    <ellipse cx="-2" cy="-3" rx="14" ry="10" fill="#d4a8ff" opacity="0.55"/>
    <ellipse cx="-2" cy="3" rx="13" ry="9" fill="#d4a8ff" opacity="0.55"/>
    <ellipse cx="3" cy="-2" rx="11" ry="8" fill="#f6e8b8" opacity="0.85"/>
    <ellipse cx="3" cy="2" rx="10" ry="7" fill="#f6e8b8" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="3" ry="9" fill="#3a2a3a"/>
  </g>

  <!-- Pearlspiral snail on log -->
  <g transform="translate(140,220)">
    <ellipse cx="0" cy="2" rx="11" ry="4" fill="#c2b69a"/>
    <circle cx="-2" cy="-2" r="8" fill="#8a7a5e"/>
    <path d="M -2 -2 m -5 0 a 5 5 0 1 0 10 0 a 4 4 0 1 0 -8 0 a 3 3 0 1 0 6 0" stroke="#e8dec0" stroke-width="1.2" fill="none"/>
    <line x1="6" y1="2" x2="9" y2="-3" stroke="#c2b69a" stroke-width="1.4"/>
    <circle cx="9" cy="-3" r="1" fill="#101"/>
  </g>

  <!-- Iron beetle -->
  <g transform="translate(360,238)">
    <ellipse cx="0" cy="0" rx="9" ry="5" fill="#3a4640"/>
    <ellipse cx="-2" cy="-1.5" rx="5" ry="2.4" fill="#88a070"/>
    <circle cx="6" cy="0" r="3" fill="#1c241f"/>
    <line x1="-3" y1="4" x2="-5" y2="7" stroke="#1c241f" stroke-width="1.2"/>
    <line x1="0" y1="4" x2="-2" y2="7" stroke="#1c241f" stroke-width="1.2"/>
    <line x1="3" y1="4" x2="1" y2="7" stroke="#1c241f" stroke-width="1.2"/>
  </g>

  <!-- Glass reflection -->
  <rect x="32" y="36" width="448" height="80" rx="10" fill="url(#tt-glass)"/>

  <!-- Title -->
  <text x="44" y="66" fill="#b8d490" font-size="28" font-family="system-ui, sans-serif" font-weight="700" letter-spacing="1.5">TINY TERRARIUM</text>
</svg>
