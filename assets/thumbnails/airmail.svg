<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a86b8"/>
      <stop offset="1" stop-color="#dfe7e8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d9b56"/>
      <stop offset="1" stop-color="#4f6a3a"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff5c8"/>
      <stop offset="0.6" stop-color="#ffe48a" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffe48a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="250" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="320" cy="60" r="60" fill="url(#sun)"/>
  <circle cx="320" cy="60" r="14" fill="#fff5c8"/>

  <!-- Distant clouds -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="60"  cy="55" rx="34" ry="10"/>
    <ellipse cx="78"  cy="50" rx="20" ry="8"/>
    <ellipse cx="180" cy="80" rx="40" ry="11"/>
    <ellipse cx="200" cy="75" rx="22" ry="8"/>
    <ellipse cx="280" cy="120" rx="32" ry="9"/>
  </g>

  <!-- Rolling hills -->
  <path d="M0,200 C50,170 90,180 140,165 C190,148 230,170 280,160 C330,150 370,170 400,165 L400,250 L0,250 Z" fill="url(#ground)"/>
  <path d="M0,215 C60,195 110,205 170,200 C230,195 290,210 360,205 C380,204 400,210 400,215 L400,250 L0,250 Z" fill="#4f6a3a" opacity="0.65"/>

  <!-- Tiny airfield strip -->
  <g transform="translate(110 222) rotate(-6)">
    <rect x="-44" y="-4" width="88" height="8" fill="#6d8a4c" stroke="#3e5328" stroke-width="0.6"/>
    <g fill="#f4ead0">
      <rect x="-40" y="-3" width="3" height="1.2"/>
      <rect x="-40" y="1.8" width="3" height="1.2"/>
      <rect x="37"  y="-3" width="3" height="1.2"/>
      <rect x="37"  y="1.8" width="3" height="1.2"/>
    </g>
  </g>

  <!-- Biplane (centred, three-quarter view, miniature) -->
  <g transform="translate(200 130) rotate(-8)">
    <!-- Tail shadow on lower wing for depth -->
    <ellipse cx="0" cy="32" rx="58" ry="6" fill="#000" opacity="0.18"/>
    <!-- Lower wing -->
    <rect x="-58" y="6" width="116" height="6" rx="1.5" fill="#e9c64a" stroke="#a37f1c" stroke-width="0.8"/>
    <!-- Roundel on lower wing -->
    <g transform="translate(-30 9)">
      <circle r="3.6" fill="#1c4f9c"/>
      <circle r="2.4" fill="#f4ead0"/>
      <circle r="1.2" fill="#c0303a"/>
    </g>
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="42" ry="8" fill="#e9c64a" stroke="#a37f1c" stroke-width="0.8"/>
    <!-- Cockpit -->
    <ellipse cx="-3" cy="-5" rx="9" ry="5" fill="#3a5468"/>
    <ellipse cx="-3" cy="-6" rx="7.5" ry="3.5" fill="#88a4b0" opacity="0.7"/>
    <!-- Engine cowling -->
    <rect x="32" y="-7" width="8" height="14" rx="1.5" fill="#2c2014"/>
    <!-- Propeller hub + blades -->
    <circle cx="42" cy="0" r="2.5" fill="#1c1108"/>
    <rect x="40.5" y="-22" width="3" height="44" rx="1" fill="#3a2a1c" opacity="0.85"/>
    <rect x="40.5" y="-22" width="3" height="44" rx="1" fill="#3a2a1c" opacity="0.55" transform="rotate(60 42 0)"/>
    <!-- Tail -->
    <polygon points="-42,-2 -52,-12 -50,-2" fill="#e9c64a" stroke="#a37f1c" stroke-width="0.7"/>
    <polygon points="-40,2 -52,4 -42,6" fill="#e9c64a" stroke="#a37f1c" stroke-width="0.7"/>
    <!-- Number on tail -->
    <text x="-46" y="0" font-family="Courier New,monospace" font-weight="bold" font-size="6" fill="#1c1108">9</text>

    <!-- Upper wing (slightly forward + above) -->
    <rect x="-58" y="-22" width="120" height="6.5" rx="1.5" fill="#e9c64a" stroke="#a37f1c" stroke-width="0.8"/>
    <!-- Roundel on upper wing -->
    <g transform="translate(28 -19)">
      <circle r="4" fill="#1c4f9c"/>
      <circle r="2.6" fill="#f4ead0"/>
      <circle r="1.3" fill="#c0303a"/>
    </g>
    <!-- Wing struts -->
    <line x1="-30" y1="-15.5" x2="-30" y2="6" stroke="#1c1108" stroke-width="1"/>
    <line x1="-12" y1="-15.5" x2="-12" y2="6" stroke="#1c1108" stroke-width="1"/>
    <line x1="14"  y1="-15.5" x2="14"  y2="6" stroke="#1c1108" stroke-width="1"/>
    <line x1="34"  y1="-15.5" x2="34"  y2="6" stroke="#1c1108" stroke-width="1"/>
    <!-- Crossed wires -->
    <line x1="-30" y1="-15.5" x2="-12" y2="6" stroke="#222" stroke-width="0.4"/>
    <line x1="-12" y1="-15.5" x2="-30" y2="6" stroke="#222" stroke-width="0.4"/>
    <line x1="14"  y1="-15.5" x2="34"  y2="6" stroke="#222" stroke-width="0.4"/>
    <line x1="34"  y1="-15.5" x2="14"  y2="6" stroke="#222" stroke-width="0.4"/>

    <!-- Landing gear -->
    <line x1="8"  y1="8"  x2="0"  y2="20" stroke="#1c1108" stroke-width="1.2"/>
    <line x1="14" y1="8"  x2="6"  y2="20" stroke="#1c1108" stroke-width="1.2"/>
    <ellipse cx="3" cy="22" rx="4" ry="2" fill="#111"/>

    <!-- Trailing letter (a tiny envelope on a string!) -->
    <g transform="translate(-78 -2)">
      <line x1="36" y1="0" x2="0" y2="6" stroke="#1c1108" stroke-width="0.4"/>
      <rect x="-12" y="0" width="14" height="9" fill="#f4ead0" stroke="#a37f1c" stroke-width="0.5"/>
      <polyline points="-12,0 -5,5 2,0" fill="none" stroke="#a37f1c" stroke-width="0.5"/>
      <rect x="-2" y="1" width="3" height="3" fill="#c0303a"/>
    </g>
  </g>

  <!-- Foreground tilt-shift hint: subtle blur band at bottom -->
  <rect x="0" y="230" width="400" height="20" fill="#3a4d24" opacity="0.35"/>
</svg>
